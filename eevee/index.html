/* ── roundRect 폴리필 ── */
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
        if (typeof r === "number") r = [r,r,r,r];
        if (Array.isArray(r) && r.length === 1) r = [r[0],r[0],r[0],r[0]];
        const [tl,tr,br,bl] = r;
        this.moveTo(x+tl,y);
        this.lineTo(x+w-tr,y); this.quadraticCurveTo(x+w,y,x+w,y+tr);
        this.lineTo(x+w,y+h-br); this.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
        this.lineTo(x+bl,y+h); this.quadraticCurveTo(x,y+h,x,y+h-bl);
        this.lineTo(x,y+tl); this.quadraticCurveTo(x,y,x+tl,y);
        this.closePath();
    };
}

/* ── 배경 캐시 (오프스크린 캔버스) ── */
let bgCache = null;
let bgCacheTod = null;
function invalidateBgCache() { bgCache = null; bgCacheTod = null; }

function resize() {
    const s = Math.min(window.innerWidth / CW, window.innerHeight / CH, 2);
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = CW * dpr; canvas.height = CH * dpr;
    canvas.style.width = (CW * s) + "px";
    canvas.style.height = (CH * s) + "px";
    ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
    invalidateBgCache();
}
window.addEventListener("resize", resize);
resize();

function getBgCache() {
    if (bgCache && bgCacheTod === state.timeOfDay) return bgCache;
    const off = document.createElement("canvas");
    off.width = CW; off.height = CH;
    const origCtx = ctx;
    ctx = off.getContext("2d");
    drawBackground();
    drawFloor();
    ctx = origCtx;
    bgCache = off;
    bgCacheTod = state.timeOfDay;
    return bgCache;
}

const FLOOR_TOP = 180, FLOOR_BOT = 520;
const FLOOR_H = FLOOR_BOT - FLOOR_TOP;
const FLOOR_PAD = 30;

function worldToScreen(wx, wy) {
    // wx: 0~1 (좌~우), wy: 0~1 (뒤~앞)
    const perspective = 0.6 + wy * 0.4; // 뒤쪽 좁고 앞쪽 넓음
    const sx = CW / 2 + (wx - 0.5) * (CW - FLOOR_PAD * 2) * perspective;
    const sy = FLOOR_TOP + wy * FLOOR_H;
    return { sx, sy };
}

function spriteSize(wy) {
    return 36 + wy * 18; // 뒤쪽 작고 앞쪽 큼
}

function weightedRandom(items) {
    const total = items.reduce((s,i) => s + i.weight, 0);
    let r = Math.random() * total;
    for (const item of items) { r -= item.weight; if (r <= 0) return item; }
    return items[items.length - 1];
}
function addItem(n, c=1) { state.inventory[n] = (state.inventory[n]||0) + c; }
function removeItem(n, c=1) { if (!state.inventory[n]) return false; state.inventory[n]-=c; if (state.inventory[n]<=0) delete state.inventory[n]; return true; }
function hasItem(n, c=1) { return (state.inventory[n]||0) >= c; }
function itemCount(n) { return state.inventory[n]||0; }
function totalEevees() { return state.farm.length + 1; }
function base8Complete() { return EVOS.slice(0,8).every(e => state.collected.has(e.id)); }
function allComplete() { return EVOS.every(e => state.collected.has(e.id)); }
function showMessage(text, dur=120) { state.message = { text, timer: dur }; }
function clamp(v,lo,hi) { return Math.max(lo,Math.min(hi,v)); }
function lerp(a,b,t) { return a + (b-a)*t; }
function friendshipMax() { return allComplete() ? 9999 : FRIENDSHIP.max; }

    const liked = FRUITS[Math.floor(Math.random() * FRUITS.length)];
    let disliked;
    do { disliked = FRUITS[Math.floor(Math.random() * FRUITS.length)]; } while (disliked === liked);
    state.farm.push({
        evoId,
        wx: Math.random() * 0.6 + 0.2,
        wy: Math.random() * 0.6 + 0.2,
        vx: 0, vy: 0,
        sprite: evo ? evo.img : "이브이.png",
        facing: 1,
        aiState: "walk",
        aiTimer: Math.random() * 200 + 100,
        activity: 5,          // 활동성 (0 ~ ACTIVITY_MAX)
        likedFruit: liked,
        dislikedFruit: disliked,
    });
}

function getEeveeSpeed(e) {
    const boost = e._activityBoost || 1;
    const ratio = clamp((e.activity || 0) / ACTIVITY_MAX, 0, 1);
    return lerp(ACTIVITY_MIN_SPEED, ACTIVITY_MAX_SPEED, ratio) * boost;
}

function addFarmItem(name) {
    state.farmItems.push({
        name,
        wx: Math.random() * 0.7 + 0.15,
        wy: Math.random() * 0.7 + 0.15,
        vx: (Math.random()-0.5)*0.01,
        vy: (Math.random()-0.5)*0.005,
    });
}

function updateEeveeAI(e, isNight) {
    const boost = e._activityBoost || 1;
    const actRatio = clamp(((e.activity || 0) * boost) / ACTIVITY_MAX, 0, 1);
    e._activityBoost = 1; // 매 프레임 리셋
    e.aiTimer--;
    if (e.aiTimer <= 0) {
        // 활동성 높으면 walk 많이, 낮으면 idle/sleep 많이
        const walkChance = isNight ? 0.15 + actRatio * 0.35 : 0.3 + actRatio * 0.5;
        const sleepChance = isNight ? 0.5 - actRatio * 0.3 : 0.05;
        const r = Math.random();
        if (r < sleepChance) e.aiState = "sleep";
        else if (r < sleepChance + (1 - sleepChance - walkChance)) e.aiState = "idle";
        else e.aiState = "walk";

        e.aiTimer = Math.random() * 200 + 100;
        if (e.aiState === "walk") {
            const angle = Math.random() * Math.PI * 2;
            const speed = typeof e.activity !== "undefined" ? getEeveeSpeed(e) : (Math.random() * 0.001 + 0.0005);
            e.vx = Math.cos(angle) * speed;
            e.vy = Math.sin(angle) * speed * 0.5;
        }
    }
    if (e.aiState === "walk") {
        e.wx += e.vx;
        e.wy += e.vy;
        e.facing = e.vx > 0 ? 1 : e.vx < 0 ? -1 : e.facing;
        e.wx = clamp(e.wx, 0.05, 0.95);
        e.wy = clamp(e.wy, 0.05, 0.95);
        if (e.wx <= 0.06 || e.wx >= 0.94) e.vx = -e.vx;
        if (e.wy <= 0.06 || e.wy >= 0.94) e.vy = -e.vy;
    }
}

function updateFarmEntities() {
    const isNight = state.timeOfDay === "night";

    // 스태미나 시스템 폐지됨 (출정 시스템으로 대체)

    // 리피아 광합성: 농장 대기 시 활동성 서서히 회복
    for (const e of state.farm) {
        const evo = EVOS.find(ev => ev.id === e.evoId);
        if (evo && evo.abilityTag === "leafeon" && !isOnExpedition(state.farm.indexOf(e))) {
            e.activity = Math.min(ACTIVITY_MAX, (e.activity || 0) + 0.005);
        }
    }

    // 현재 이브이 AI
    if (state.currentEevee) updateEeveeAI(state.currentEevee, isNight);

    // 수집된 이브이 AI
    for (const e of state.farm) updateEeveeAI(e, isNight);

    // 바닥 진화아이템 근처 진화이브이 활동성 1.5배 부스트
    for (const item of state.farmItems) {
        const isFruit = FRUITS.includes(item.name);
        const affinityEvo = EVO_ITEM_AFFINITY[item.name];
        const isRock = ["이끼바위조각","이끼바위","얼음바위조각","얼음바위"].includes(item.name);
        const isStone = ["물의돌","천둥의돌","불꽃의돌"].includes(item.name);
        for (const e of state.farm) {
            let match = false;
            if (affinityEvo && e.evoId === affinityEvo) match = true;
            if (e.evoId === "fighting" && !isFruit) match = true;   // 격투: 모든 아이템
            if (e.evoId === "ground" && isRock) match = true;       // 땅: 바위계열
            if (e.evoId === "steel" && isStone) match = true;       // 강철: 모든 돌
            if (!match) continue;
            const dx = item.wx - e.wx, dy = item.wy - e.wy;
            if (Math.sqrt(dx * dx + dy * dy) < 0.15) {
                e._activityBoost = 1.5;
            }
        }
    }

    // 비행: 낮에 부스트, 고스트: 밤에 부스트 (아이템 무관)
    for (const e of state.farm) {
        if (e.evoId === "flying" && !isNight) e._activityBoost = 1.5;
        if (e.evoId === "ghost" && isNight) e._activityBoost = 1.5;
    }

    // 이브이 간 충돌 밀어내기
    const allEevees = [...state.farm];
    if (state.currentEevee) allEevees.push(state.currentEevee);
    for (let i = 0; i < allEevees.length; i++) {
        for (let j = i + 1; j < allEevees.length; j++) {
            const a = allEevees[i], b = allEevees[j];
            const dx = b.wx - a.wx, dy = b.wy - a.wy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const minDist = 0.08;
            if (dist < minDist && dist > 0.001) {
                const nx = dx / dist, ny = dy / dist;
                const overlap = (minDist - dist) * 0.5;
                a.wx -= nx * overlap; a.wy -= ny * overlap;
                b.wx += nx * overlap; b.wy += ny * overlap;
                a.wx = clamp(a.wx, 0.05, 0.95); a.wy = clamp(a.wy, 0.05, 0.95);
                b.wx = clamp(b.wx, 0.05, 0.95); b.wy = clamp(b.wy, 0.05, 0.95);
            }
        }
    }

    // 아이템 간 충돌 (최대 30개까지만 체크)
    const itemLen = Math.min(state.farmItems.length, 30);
    for (let i = 0; i < itemLen; i++) {
        for (let j = i + 1; j < itemLen; j++) {
            const a = state.farmItems[i], b = state.farmItems[j];
            const dx = b.wx - a.wx, dy = b.wy - a.wy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const minDist = 0.04;
            if (dist < minDist && dist > 0.001) {
                const nx = dx / dist, ny = dy / dist;
                const overlap = (minDist - dist) * 0.5;
                a.wx -= nx * overlap; a.wy -= ny * overlap;
                b.wx += nx * overlap; b.wy += ny * overlap;
                // 속도 교환 + 반발
                const relV = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
                if (relV < 0) {
                    a.vx += nx * relV * 0.5; a.vy += ny * relV * 0.5;
                    b.vx -= nx * relV * 0.5; b.vy -= ny * relV * 0.5;
                }
            }
        }
    }

    // 바닥 아이템 물리 + 진화이브이 자동 섭취
    for (let fi = state.farmItems.length - 1; fi >= 0; fi--) {
        const item = state.farmItems[fi];
        item.wx += item.vx;
        item.wy += item.vy;
        item.vx *= 0.95;
        item.vy *= 0.95;
        if (item.wx <= 0.05 || item.wx >= 0.95) item.vx = -item.vx * 0.7;
        if (item.wy <= 0.05 || item.wy >= 0.95) item.vy = -item.vy * 0.7;
        item.wx = clamp(item.wx, 0.05, 0.95);
        item.wy = clamp(item.wy, 0.05, 0.95);

        let eaten = false;
        const isFruit = FRUITS.includes(item.name);

        const allEe = [...state.farm];
        if (state.currentEevee) allEe.push(state.currentEevee);

        for (const e of allEe) {
            const dx = item.wx - e.wx, dy = item.wy - e.wy;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 0.08) {
                const isFarmEevee = state.farm.includes(e);
                if (isFruit && isFarmEevee && e.aiState === "walk" && (e.activity || 0) < ACTIVITY_MAX) {
                    // 진화 이브이가 열매 자동 섭취
                    let delta = ACTIVITY_FRUIT_NEUTRAL;
                    let reaction = "neutral";
                    if (item.name === e.likedFruit) { delta = ACTIVITY_FRUIT_LIKED; reaction = "liked"; }
                    else if (item.name === e.dislikedFruit) { delta = ACTIVITY_FRUIT_DISLIKED; reaction = "disliked"; }
                    e.activity = clamp((e.activity || 0) + delta, 0, ACTIVITY_MAX);
                    const scr = worldToScreen(e.wx, e.wy);
                    state.feedbackAnim = { type: reaction, timer: 50, x: scr.sx, y: scr.sy - 20 };
                    state.farmItems.splice(fi, 1);
                    eaten = true;
                    break;
                } else if (!isFruit && isFarmEevee && e.aiState === "walk") {
                    // 진화 이브이가 관련 아이템 섭취 → 활동성 증가
                    const affinity = EVO_ITEM_AFFINITY[item.name];
                    const isRock = ["이끼바위조각","이끼바위","얼음바위조각","얼음바위"].includes(item.name);
                    const isStone = ["물의돌","천둥의돌","불꽃의돌"].includes(item.name);
                    let canEat = (affinity && e.evoId === affinity);
                    if (e.evoId === "fighting") canEat = true;
                    if (e.evoId === "ground" && isRock) canEat = true;
                    if (e.evoId === "steel" && isStone) canEat = true;
                    if (canEat) {
                        e.activity = clamp((e.activity || 0) + ACTIVITY_FRUIT_LIKED, 0, ACTIVITY_MAX);
                        const scr = worldToScreen(e.wx, e.wy);
                        state.feedbackAnim = { type: "liked", timer: 50, x: scr.sx, y: scr.sy - 20 };
                        state.farmItems.splice(fi, 1);
                        eaten = true;
                        break;
                    }
                }
                if (!eaten && dist > 0.001) {
                    // 밀어내기 (겹침 방지)
                    const nx = dx / dist, ny = dy / dist;
                    const push = 0.012;
                    item.vx += nx * push;
                    item.vy += ny * push;
                }
            }
        }
    }
}

/* ═══════════════════════════════════════════
   6. EVOLUTION CHECK
   ═══════════════════════════════════════════ */
function checkEvolution() {
    const ee = state.currentEevee;
    const tod = state.timeOfDay;
    for (const evo of EVOS) {
        if (state.collected.has(evo.id)) continue;
        if (evo.postGame && !base8Complete()) continue;
        let match = false;
        switch (evo.condition) {
            case "stone":
                match = state._deliveredItem === evo.stone;
                if (evo.postGame) match = match && ee.friendship >= 10;
                break;
            case "friendship_day": match = ee.friendship >= FRIENDSHIP.max && tod === "day"; break;
            case "friendship_night": match = ee.friendship >= FRIENDSHIP.max && tod === "night"; break;
            case "craft": match = state._deliveredItem === evo.craft; break;
            case "friendship_item": match = ee.friendship >= FRIENDSHIP.max && state._deliveredItem === evo.item; break;
            case "friendship_zero_night": match = ee.friendship <= 0 && tod === "night"; break;
            case "explore_count": match = ee.exploreCount >= 20 && ee.friendship >= 10; break;
            case "ground_stone": match = hasItem("부드러운모래") && state.skipCount >= 5; break;
            case "rock_craft": match = ee.repeatCount >= 5 && hasItem("이끼바위") && hasItem("얼음바위"); break;
            case "flying_feather": match = state._deliveredItem === "바람깃털"; break;
            case "four_stones":
                match = ["물의돌","불꽃의돌","천둥의돌","부드러운모래"].every(s => hasItem(s)) && ee.friendship >= FRIENDSHIP.max;
                break;
            case "dragon":
                match = state.collected.has("gmax") && state.collected.has("mega") && state._deliveredItem === "용의비늘" && ee.friendship >= 15;
                break;
        }
        if (match) {
            // 아이템은 feedItem에서 이미 제거됨 → 중복 제거 안 함
            return evo;
        }
    }
    return null;
}

function isLocationUnlocked(loc) {
    if (!loc.hidden) return true;
    if (loc.unlock === "battle") return state.unlockedByBattle && state.unlockedByBattle.has(loc.id);
    return false;
}

const LOCATIONS_PER_TURN = 3; // 턴당 제공되는 탐색지 수

function getAllAvailableLocations() {
    return LOCATIONS.filter(loc => {
        if (!isLocationUnlocked(loc)) return false;
        if (loc.time === "day" && state.timeOfDay !== "day") return false;
        if (loc.time === "night" && state.timeOfDay !== "night") return false;
        return true;
    });
}

function rollTurnLocations() {
    const all = getAllAvailableLocations();
    // 셔플 후 N개 선택
    for (let i = all.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [all[i], all[j]] = [all[j], all[i]];
    }
    state.turnLocations = all.slice(0, Math.min(LOCATIONS_PER_TURN, all.length));
}



/* ═══════════════════════════════════════════
   7. TURN LOGIC
   ═══════════════════════════════════════════ */
function triggerEvolution(evo) {
    state.collected.add(evo.id);
    state.evolvingEvo = evo;
    state.evolvingTimer = 0;
    state.scene = "evolving";
    state.panel = null;
    addFarmEevee(evo.id);

    // 기본 8종 완성 시 알림 + 스태미나 확장
    if (!state.base8Notified && base8Complete()) {
        state.base8Notified = true;
        state._base8Alert = true;
    }
}

function doRest() {
    if (base8Complete()) state.skipCount++;
    state.totalRests++;
    state.turnNumber++;
    // 현재 밤낮 기준으로 진화 체크 (전환 전!)
    const evo = checkEvolution();
    if (evo) {
        triggerEvolution(evo);
        // 진화 후 밤낮 전환 + 풀충전은 진화 완료 시 처리
        state._pendingDayNightFlip = true;
        return;
    }
    // 밤낮 전환
    state.timeOfDay = state.timeOfDay === "day" ? "night" : "day";
    state._deliveredItem = null;
    state.hintUsed = false;
    rollTurnLocations();
    invalidateBgCache();
    state.scene = "farm";
    saveGame();
}

function finishPostEvolution() {
    // 진화 완료 후 밤낮 전환 처리
    if (state._pendingDayNightFlip) {
        state.timeOfDay = state.timeOfDay === "day" ? "night" : "day";
        state._pendingDayNightFlip = false;
        invalidateBgCache();
    }
    // 이브이 자동 추가 제거 → 둥지에서 수동 소환
    state.currentEevee = null;
    state._deliveredItem = null;
    rollTurnLocations();
    saveGame();
}

// 둥지: 이브이 소환
const NEST_COST = 5; // 열매 5개
function canSummonEevee() {
    return !state.currentEevee;
}
function summonEevee() {
    if (!canSummonEevee()) return;
    // 열매 비용 (아무 열매나 합산)
    let totalFruit = 0;
    for (const f of FRUITS) totalFruit += itemCount(f);
    if (totalFruit < NEST_COST) {
        showMessage(`열매가 부족합니다 (${totalFruit}/${NEST_COST})`, 90);
        return;
    }
    // 열매 차감 (보유한 것부터 순서대로)
    let remaining = NEST_COST;
    for (const f of FRUITS) {
        if (remaining <= 0) break;
        const have = itemCount(f);
        if (have > 0) {
            const take = Math.min(have, remaining);
            removeItem(f, take);
            remaining -= take;
        }
    }
    resetCurrentEevee();
    state.scene = "new_eevee";
    state.newEeveeTimer = 0;
    state.currentEevee.wx = 0.4 + Math.random() * 0.2;
    state.currentEevee.wy = 1.15;
    showMessage("새 이브이가 왔다!", 90);
    saveGame();
}

function startGame() {
    state.turnNumber = 1;
    state._deliveredItem = null;
    rollTurnLocations();
    state.scene = "farm";
}

/* ═══════════════════════════════════════════
   7-1. SAVE / LOAD
   ═══════════════════════════════════════════ */
const SAVE_KEY = "eevee_farm_save";

function saveGame() {
    try {
        const data = {
            timeOfDay: state.timeOfDay,
            totalExplores: state.totalExplores,
            totalRests: state.totalRests,
            turnNumber: state.turnNumber,
            skipCount: state.skipCount,
            collected: [...state.collected],
            inventory: { ...state.inventory },
            currentEevee: state.currentEevee ? {
                friendship: state.currentEevee.friendship,
                likedFruit: state.currentEevee.likedFruit,
                dislikedFruit: state.currentEevee.dislikedFruit,
                knownLiked: state.currentEevee.knownLiked,
                knownDisliked: state.currentEevee.knownDisliked,
                stamina: state.currentEevee.stamina,
                exploreCount: state.currentEevee.exploreCount,
                lastLocation: state.currentEevee.lastLocation,
                repeatCount: state.currentEevee.repeatCount,
                visitedLocations: [...(state.currentEevee.visitedLocations || [])],
            } : null,
            farm: state.farm.map(e => ({
                evoId: e.evoId,
                activity: e.activity || 0,
                likedFruit: e.likedFruit,
                dislikedFruit: e.dislikedFruit,
            })),
            farmItems: state.farmItems.map(i => ({ name: i.name, wx: i.wx, wy: i.wy })),
            hintBoosts: state.hintBoosts || [],
            base8Notified: state.base8Notified,
            battleMaxStage: state.battleMaxStage || 0,
            battleStage: state.battleStage || 0,
            battleEnemy: state.battleEnemy || null,
            unlockedByBattle: [...(state.unlockedByBattle || [])],
            expeditions: (state.expeditions || []).map(e => ({ ...e })),
            expeditionSlots: state.expeditionSlots || 1,
            endingShown: state.endingShown || false,
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    } catch (e) { console.warn("세이브 실패:", e); }
}

function loadGame() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);

        state.timeOfDay = data.timeOfDay || "day";
        state.totalExplores = data.totalExplores || 0;
        state.totalRests = data.totalRests || 0;
        state.turnNumber = data.turnNumber || 0;
        state.skipCount = data.skipCount || 0;
        state.collected = new Set(data.collected || []);
        state.inventory = data.inventory || {};
        state.hintBoosts = data.hintBoosts || [];
        state.base8Notified = data.base8Notified || false;
        state.battleMaxStage = data.battleMaxStage || 0;
        state.battleStage = data.battleStage || 0;
        state.battleEnemy = data.battleEnemy || null;
        state.unlockedByBattle = new Set(data.unlockedByBattle || []);
        state.expeditions = data.expeditions || [];
        state.expeditionSlots = data.expeditionSlots || 1;
        state.endingShown = data.endingShown || false;

        // 현재 이브이 복원
        if (data.currentEevee) {
            const ce = data.currentEevee;
            state.currentEevee = {
                friendship: ce.friendship,
                likedFruit: ce.likedFruit,
                dislikedFruit: ce.dislikedFruit,
                knownLiked: ce.knownLiked,
                knownDisliked: ce.knownDisliked,
                stamina: ce.stamina,
                exploreCount: ce.exploreCount || 0,
                lastLocation: ce.lastLocation,
                repeatCount: ce.repeatCount || 0,
                visitedLocations: new Set(ce.visitedLocations || []),
                wx: 0.5, wy: 0.5, vx: 0, vy: 0,
                facing: 1, aiState: "idle", aiTimer: 80,
            };
        }

        // 농장 이브이 복원
        state.farm = (data.farm || []).map(e => {
            const evo = EVOS.find(ev => ev.id === e.evoId);
            const liked = e.likedFruit || FRUITS[Math.floor(Math.random() * FRUITS.length)];
            let disliked = e.dislikedFruit;
            if (!disliked) { do { disliked = FRUITS[Math.floor(Math.random() * FRUITS.length)]; } while (disliked === liked); }
            return {
                evoId: e.evoId,
                sprite: evo ? evo.img : "이브이.png",
                activity: e.activity || 0,
                likedFruit: liked,
                dislikedFruit: disliked,
                wx: 0.15 + Math.random() * 0.7,
                wy: 0.15 + Math.random() * 0.7,
                vx: 0, vy: 0,
                facing: Math.random() > 0.5 ? 1 : -1,
                aiState: "idle", aiTimer: 30 + Math.random() * 60,
            };
        });

        // 바닥 아이템 복원
        state.farmItems = (data.farmItems || []).map(i => ({
            name: i.name, wx: i.wx, wy: i.wy, vx: 0, vy: 0,
        }));

        // 탐색지 재배치
        rollTurnLocations();
        invalidateBgCache();
        state.scene = "farm";
        state.panel = null;
        state.popup = null;
        return true;
    } catch (e) {
        console.warn("로드 실패:", e);
        return false;
    }
}

function deleteSave() {
    localStorage.removeItem(SAVE_KEY);
}

function hasSave() {
    return !!localStorage.getItem(SAVE_KEY);
}

/* ═══════════════════════════════════════════
   7-2. BATTLE SYSTEM
   ═══════════════════════════════════════════ */

// 상성표: TYPE_ADVANTAGE[공격타입] = [유리한 대상 타입들]
const TYPE_ADVANTAGE = {
    "물": ["불","땅","바위"], "불": ["풀","얼음","강철"], "풀": ["물","땅","바위"],
    "전기": ["물","비행"], "에스퍼": ["격투","고스트"], "악": ["에스퍼","고스트"],
    "얼음": ["드래곤","비행","풀"], "격투": ["바위","강철","왕"], "고스트": ["에스퍼","페어리"],
    "드래곤": ["드래곤","왕","메가"], "땅": ["전기","불","강철"], "바위": ["불","비행","얼음"],
    "비행": ["풀","격투"], "강철": ["페어리","얼음","바위"], "페어리": ["드래곤","악","격투"],
    "왕": [], "메가": [],
};

// 적 타입 풀 (스테이지 적 타입 생성용)
const ENEMY_TYPES = ["물","불","풀","전기","에스퍼","악","얼음","격투","고스트","드래곤","땅","바위","비행","강철","페어리"];
const ENEMY_NAMES = {
    "물":"물의정령","불":"화염수호자","풀":"숲의파수꾼","전기":"번개사냥꾼","에스퍼":"마음의눈",
    "악":"어둠추적자","얼음":"서리감시자","격투":"강철주먹","고스트":"그림자유령","드래곤":"비늘군주",
    "땅":"대지의분노","바위":"바위거인","비행":"하늘칼날","강철":"철벽수비대","페어리":"요정여왕",
};

// 스테이지별 보스 생성
function generateEnemy(stage) {
    const type = ENEMY_TYPES[(stage - 1) % ENEMY_TYPES.length];
    const maxHp = Math.floor(50 + stage * 20 + Math.pow(stage, 1.3) * 5);
    return { type, name: ENEMY_NAMES[type] || type, stage, maxHp, hp: maxHp };
}

// 이브이 전투력 (= 데미지) 계산
function calcBattlePower(eevee) {
    const evo = EVOS.find(e => e.id === eevee.evoId);
    const type = evo ? evo.type : "무";
    let basePower = 10;
    if (type === "왕") basePower = 18;
    else if (type === "메가") basePower = 22;
    if (!evo) basePower = 6;
    if (state.endingShown) basePower += 5;
    const friendship = eevee.friendship || eevee.activity || 0;
    const power = basePower + friendship * 2;
    return { power, type };
}

// 상성 배율
function typeMultiplier(attackType, defendType) {
    const adv = TYPE_ADVANTAGE[attackType] || [];
    if (adv.includes(defendType)) return 1.5;
    const defAdv = TYPE_ADVANTAGE[defendType] || [];
    if (defAdv.includes(attackType)) return 0.6;
    return 1.0;
}

// 전투 실행 → 데미지 계산 (항상 데미지를 줌)
function executeBattle(allyEevee, enemy) {
    const ally = calcBattlePower(allyEevee);
    const evo = EVOS.find(e => e.id === allyEevee.evoId);
    const tag = evo ? evo.abilityTag : "";
    let mult = typeMultiplier(ally.type, enemy.type);

    // 고유 능력: 상성 보정
    if (tag === "battle_noweakness" && mult < 1) mult = 1.0;   // 왕: 불리 무시
    if (tag === "battle_alladvantage") mult = Math.max(mult, 1.5); // 메가: 항상 유리

    let baseDmg = ally.power * mult;

    // 고유 능력: 데미지 보정
    if (tag === "battle_dmg") baseDmg *= 1.3;                   // 부스터: +30%
    if (tag === "battle_guts") {                                 // 파이티아: 활동성 낮을수록 강함
        const act = allyEevee.activity || 0;
        baseDmg *= 1 + (1 - act / ACTIVITY_MAX) * 0.5;          // 활동성 0이면 +50%
    }
    if (tag === "battle_fixed") baseDmg += 20;                   // 드라키온: 고정 +20
    if (tag === "battle_curse") baseDmg += enemy.maxHp * 0.05;  // 레이시아: 최대HP 5%
    if (tag === "leafeon") baseDmg += enemy.maxHp * 0.03;       // 리피아: 최대HP 3%
    if (tag === "sylveon") baseDmg *= 1.2;                      // 님피아: 데미지 +20%

    // ±15% 랜덤
    let roll = 0.85 + Math.random() * 0.30;
    if (tag === "battle_minroll") roll = Math.max(roll, 0.95);   // 메탈리아: 하한 보장
    if (tag === "battle_crit" && Math.random() < 0.10) roll = 3.0; // 글레이시아: 10% 크리티컬 3배

    const damage = Math.max(1, Math.floor(baseDmg * roll));
    enemy.hp = Math.max(0, enemy.hp - damage);
    const killed = enemy.hp <= 0;
    return { damage, killed, allyPower: ally.power, multiplier: mult, allyType: ally.type, remainHp: enemy.hp, abilityName: evo ? evo.ability : "", crit: roll >= 2.5 };
}

// 전투 시작 (현재 보스가 없거나 처치됐으면 새 보스)
function startBattle() {
    if (!state.battleEnemy || state.battleEnemy.hp <= 0) {
        const stage = state.battleMaxStage + 1;
        state.battleStage = stage;
        state.battleEnemy = generateEnemy(stage);
    }
    state.battleScene = "select";
    state.battleAlly = null;
    state.battleResult = null;
    state.battleReward = null;
    state.panel = null; state.panelSlide = 0;
}

// 스테이지 클리어 보상 체크
const STAGE_REWARDS = {
    5: { type: "location", id: "den", text: "거대소굴 해금!" },
    10: { type: "slot", text: "탐색 슬롯 +1!" },
    15: { type: "location", id: "ruins", text: "고대유적 해금!" },
    20: { type: "location", id: "cave", text: "깊은동굴 해금!" },
    25: { type: "slot", text: "탐색 슬롯 +1!" },
    30: { type: "location", id: "valley", text: "용의계곡 해금!" },
    35: { type: "location", id: "sky", text: "하늘산등성이 해금!" },
};

function applyBattleReward(stage) {
    const reward = STAGE_REWARDS[stage];
    if (!reward) return null;
    if (reward.type === "location") {
        if (!state.unlockedByBattle) state.unlockedByBattle = new Set();
        state.unlockedByBattle.add(reward.id);
    } else if (reward.type === "slot") {
        state.expeditionSlots = (state.expeditionSlots || 1) + 1;
    }
    return reward.text;
}

// 출정 파견
function sendExpedition(locId, eeveeRef) {
    const loc = LOCATIONS.find(l => l.id === locId);
    if (!loc) return;
    if (state.expeditions.length >= state.expeditionSlots) {
        showMessage("파견 슬롯이 가득 찼습니다!", 90); return;
    }
    // 이브이 정보
    const eevee = eeveeRef === "current" ? state.currentEevee : state.farm[eeveeRef];
    const evo = eeveeRef === "current" ? null : EVOS.find(e => e.id === eevee.evoId);
    const evoType = evo ? evo.type : "";
    const tag = evo ? evo.abilityTag : "";

    // 시간 계산 (고유 능력 반영)
    let duration = (loc.dur || 30) * 1000;
    if (tag === "explore_fastest") duration *= 0.4;       // 에어리아: 60% 단축
    else if (tag === "explore_speed") duration *= 0.5;    // 쥬피썬더: 50% 단축
    const act = eevee.activity || 0;
    duration *= (1 - act / 200);

    state.expeditions.push({
        locId, eeveeRef, evoType, abilityTag: tag,
        startTime: Date.now(),
        duration: Math.floor(duration),
        eeveeImg: evo ? evo.img : "이브이.png",
        eeveeName: evo ? evo.name : "이브이",
    });

    // 탐색 카운터 업데이트
    state.totalExplores++;
    if (eevee.visitedLocations) eevee.visitedLocations.add(locId);
    if (eevee.exploreCount !== undefined) eevee.exploreCount++;
    if (eevee.lastLocation === locId && eevee.repeatCount !== undefined) eevee.repeatCount++;
    else if (eevee.repeatCount !== undefined) eevee.repeatCount = 1;
    if (eevee.lastLocation !== undefined) eevee.lastLocation = locId;

    // 활동성 소모 (님피아: 소모 없음)
    if (eevee.activity !== undefined && tag !== "sylveon") eevee.activity = Math.max(0, eevee.activity - 5);

    state.panel = null; state.panelSlide = 0;
    state.expeditionSelect = null;
    showMessage(`${loc.name}으로 출동!`, 60);
    saveGame();
}

// 출정 결과 계산
function resolveExpedition(exp) {
    const loc = LOCATIONS.find(l => l.id === exp.locId);
    if (!loc) return [];
    const tag = exp.abilityTag || "";

    const fruitPool = FRUITS.map(f => ({name: f, type: "fruit", weight: 1}));
    let itemPool = loc.items.filter(i => i.type !== "fruit");

    // 에브이 예지: 희귀 아이템 가중치 2배
    if (tag === "explore_rare") {
        itemPool = itemPool.map(i => i.weight <= 20 ? { ...i, weight: i.weight * 2 } : i);
    }

    const drops = [];
    const typeMatch = loc.attr === exp.evoType;

    // 블래키 야행성: 밤 탐색지에서 아이템 드롭 100%
    const isNightLoc = loc.time === "night";
    const itemChance = (tag === "explore_night" && isNightLoc) ? 1.0 : (typeMatch ? 0.65 : 0.40);

    if (itemPool.length > 0 && Math.random() < itemChance) {
        drops.push(weightedRandom(itemPool));
    }

    // 샤미드 수의장막: 열매 2개, 리피아 광합성: 열매 확률 90%
    const fruitCount = tag === "explore_fruit2" ? 2 : 1;
    const fruitChance = tag === "leafeon" ? 0.90 : 0.60;
    for (let fi = 0; fi < fruitCount; fi++) {
        if (Math.random() < fruitChance || drops.length === 0) {
            drops.push(weightedRandom(fruitPool));
        }
    }
    if (drops.length === 0) drops.push(weightedRandom(fruitPool));

    // 샌디온 발굴: 추가 아이템 1개
    if (tag === "explore_extra" && itemPool.length > 0) {
        drops.push(weightedRandom(itemPool));
    }
    return drops;
}

// 귀환 체크 (메인 루프에서 호출)
function checkExpeditionReturns() {
    const now = Date.now();
    const returned = [];
    state.expeditions = state.expeditions.filter(exp => {
        if (now >= exp.startTime + exp.duration) {
            returned.push(exp);
            return false;
        }
        return true;
    });
    for (const exp of returned) {
        const drops = resolveExpedition(exp);
        const loc = LOCATIONS.find(l => l.id === exp.locId);
        for (const drop of drops) {
            state.farmItems.push({
                name: drop.name,
                wx: Math.random() * 0.7 + 0.15,
                wy: Math.random() * 0.7 + 0.15,
                vx: 0, vy: 0,
            });
        }
        const dropNames = drops.map(d => `${itemEmoji(d.name)} ${d.name}`).join(", ");
        showMessage(`${exp.eeveeName} 귀환! ${dropNames}`, 180);
        saveGame();
    }
}

// 이브이가 파견 중인지 확인
function isOnExpedition(eeveeRef) {
    return state.expeditions.some(e => e.eeveeRef === eeveeRef);
}

// 구버전 호환: doExplore는 더 이상 직접 호출되지 않음
function doExplore(location) {
    // 출정 시스템으로 대체됨 - 이브이 선택 UI로 전환
    state.expeditionSelect = { locId: location.id, locName: location.name };
}

function feedItem(itemName) {
    if (!hasItem(itemName)) return;
    const ee = state.currentEevee;
    const isFruit = FRUITS.includes(itemName);

    if (isFruit) {
        removeItem(itemName);
        let reaction = "neutral";
        let delta = 0;
        if (itemName === ee.likedFruit) {
            const before = ee.friendship;
            ee.friendship = clamp(ee.friendship + FRIENDSHIP.liked, -5, friendshipMax() + 5);
            delta = ee.friendship - before;
            reaction = "liked"; ee.knownLiked = true;
        } else if (itemName === ee.dislikedFruit) {
            const before = ee.friendship;
            ee.friendship = clamp(ee.friendship + FRIENDSHIP.disliked, -5, friendshipMax() + 5);
            delta = ee.friendship - before;
            console.log(`[싫은열매] ${itemName}: 친밀도 ${before} → ${ee.friendship} (delta: ${delta})`);
            reaction = "disliked"; ee.knownDisliked = true;
        } else {
            // 보통 열매: 친밀도 +1
            const before3 = ee.friendship;
            ee.friendship = clamp(ee.friendship + 1, -5, friendshipMax() + 5);
            delta = ee.friendship - before3;
            reaction = "neutral";
        }
        const scr = worldToScreen(ee.wx, ee.wy);
        state.feedbackAnim = { type: reaction, timer: 70, x: scr.sx, y: scr.sy - 30, delta };
        state.panel = null; state.panelSlide = 0;
        // 친밀도 0 이하 + 밤 시 즉시 고스트 진화 체크
        if (ee.friendship <= 0 && state.timeOfDay === "night") {
            const evo = checkEvolution();
            if (evo) { triggerEvolution(evo); return; }
        }
    } else if (itemName === "태양조각" || itemName === "달조각") {
        removeItem(itemName);
        const isMatch = (itemName === "태양조각" && state.timeOfDay === "day") ||
                         (itemName === "달조각" && state.timeOfDay === "night");
        if (isMatch) {
            const before = ee.friendship;
            ee.friendship = clamp(ee.friendship + FRIENDSHIP.sun_day, -5, friendshipMax() + 5);
            const d = ee.friendship - before;
            const scr = worldToScreen(ee.wx, ee.wy);
            state.feedbackAnim = { type: "liked", timer: 70, x: scr.sx, y: scr.sy - 30, delta: d };
        } else {
            const scr = worldToScreen(ee.wx, ee.wy);
            state.feedbackAnim = { type: "neutral", timer: 70, x: scr.sx, y: scr.sy - 30 };
        }
        state.panel = null; state.panelSlide = 0;
        // 친밀도 max 시 즉시 진화 체크
        if (ee.friendship >= FRIENDSHIP.max) {
            const evo = checkEvolution();
            if (evo) { triggerEvolution(evo); return; }
        }
    } else {
        // 이미 진화 완료된 아이템 전달 거부
        const EVO_ITEMS = {
            "물의돌":"vaporeon","천둥의돌":"jolteon","불꽃의돌":"flareon",
            "이끼바위":"leafeon","얼음바위":"glaceon","리본":"sylveon",
            "다이버섯":"gmax","이브이나이트":"mega","용의비늘":"dragon","바람깃털":"flying",
        };
        if (EVO_ITEMS[itemName] && state.collected.has(EVO_ITEMS[itemName])) {
            showMessage("이미 이 아이템으로 진화를 완료했다!", 100);
            return;
        }
        // 친밀도 부족 시 전달 거부
        const friendReq = {"리본": FRIENDSHIP.max, "다이버섯": 10, "이브이나이트": 10, "용의비늘": 15};
        if (friendReq[itemName] && ee.friendship < friendReq[itemName]) {
            showMessage("이브이가 아직 이 아이템을 받아들일 준비가 안 된 것 같다...", 120);
            state.panel = null; state.panelSlide = 0;
            return;
        }
        state._deliveredItem = itemName;
        removeItem(itemName);
        showMessage(`${itemEmoji(itemName)} ${itemName}을(를) 이브이에게 전달했다!`);
        state.panel = null; state.panelSlide = 0;
        // 전달 직후 진화 체크 (돌/제작/리본 등)
        const evo = checkEvolution();
        if (evo) { triggerEvolution(evo); return; }
    }
}

function tryCraft(recipeName) {
    const r = RECIPES[recipeName];
    if (!r || !hasItem(r.material, r.count)) return;
    removeItem(r.material, r.count);
    addItem(recipeName);
    showMessage(`${itemEmoji(recipeName)} ${recipeName}을(를) 만들었다!`);
}

function feedFarmEevee(farmIdx, fruitName) {
    if (farmIdx < 0 || farmIdx >= state.farm.length) return;
    if (!hasItem(fruitName)) return;
    if (!FRUITS.includes(fruitName)) return;
    removeItem(fruitName);

    const e = state.farm[farmIdx];
    let delta = ACTIVITY_FRUIT_NEUTRAL;
    let reaction = "neutral";
    if (fruitName === e.likedFruit) { delta = ACTIVITY_FRUIT_LIKED; reaction = "liked"; }
    if (fruitName === e.dislikedFruit) { delta = ACTIVITY_FRUIT_DISLIKED; reaction = "disliked"; }
    e.activity = clamp((e.activity || 0) + delta, 0, ACTIVITY_MAX);

    const scr = worldToScreen(e.wx, e.wy);
    state.feedbackAnim = { type: reaction, timer: 70, x: scr.sx, y: scr.sy - 30 };
    state.selectedFarmEevee = null;
    state.panel = null; state.panelSlide = 0;
}

function dropItem(itemName) {
    if (!hasItem(itemName)) return;
    removeItem(itemName);
    addFarmItem(itemName);
}

        if (!state.collected.has("ghost")) hints.push("밤에 이브이의 친밀도가 0 이하로 떨어지면... 어둠의 진화가 일어날지도...");
        if (!state.collected.has("fighting") && ee.exploreCount >= 10) hints.push("이브이와 친해진 상태로 탐색을 많이 하면 강해질 것 같다...");
        if (!state.collected.has("ground")) hints.push("깊은동굴에서 찾을 수 있는 부드러운모래를 지닌 채로 휴식을 반복하면...");
        if (!state.collected.has("rock")) hints.push("같은 장소를 계속 탐색하면서 이끼바위와 얼음바위를 모두 갖고 있으면...");
        if (!state.collected.has("flying")) hints.push("하늘산등성이에서 찾을 수 있는 바람깃털을 이브이에게 전달하면...");
        if (!state.collected.has("steel")) hints.push("물의돌, 불꽃의돌, 천둥의돌, 부드러운모래를 모두 모으고 친밀도가 최대라면...");
    }
    const text = hints.length > 0 ? hints[Math.floor(Math.random() * hints.length)] : "이브이가 평화로워 보인다...";

    // 아이템 드롭 관련 힌트면 부스트 등록
    const boost = HINT_BOOST_MAP[text];
    if (boost && !state.hintBoosts.some(b => b.locId === boost.locId && b.itemName === boost.itemName)) {
        state.hintBoosts.push(boost);
    }

    state.popup = { type: "hint", text };
    state.popupTimer = 0;
}

/* ═══════════════════════════════════════════
   9. INPUT
   ═══════════════════════════════════════════ */
let clickX = -1, clickY = -1, clicked = false;

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx - rect.left) * (CW / rect.width), y: (cy - rect.top) * (CH / rect.height) };
}

let touchStartY = -1, touchDragging = false;

// 이브이 드래그 관련
let dragEevee = null;  // 드래그 중인 이브이 객체
let dragOffset = { wx: 0, wy: 0 };
let dragMoved = false;  // 실제로 드래그 이동했는지

function screenToWorld(sx, sy) {
    const wy = clamp((sy - FLOOR_TOP) / FLOOR_H, 0, 1);
    const perspective = 0.6 + wy * 0.4;
    const wx = (sx - CW / 2) / ((CW - FLOOR_PAD * 2) * perspective) + 0.5;
    return { wx: clamp(wx, 0.05, 0.95), wy: clamp(wy, 0.05, 0.95) };
}

function findEeveeAtScreen(sx, sy) {
    const allEe = [...state.farm];
    if (state.currentEevee) allEe.push(state.currentEevee);
    for (const e of allEe) {
        const scr = worldToScreen(e.wx, e.wy);
        const size = spriteSize(e.wy);
        if (Math.abs(sx - scr.sx) < size * 0.6 && Math.abs(sy - scr.sy) < size * 0.8) {
            return e;
        }
    }
    return null;
}

canvas.addEventListener("mousedown", e => {
    const p = getPos(e);
    clickX = p.x; clickY = p.y;
    if (state.scene === "farm" && !state.panel && !state.popup) {
        const ee = findEeveeAtScreen(p.x, p.y);
        if (ee) {
            dragEevee = ee;
            dragMoved = false;
            const w = screenToWorld(p.x, p.y);
            dragOffset.wx = ee.wx - w.wx;
            dragOffset.wy = ee.wy - w.wy;
        }
    }
});
canvas.addEventListener("mousemove", e => {
    if (!dragEevee) return;
    dragMoved = true;
    const p = getPos(e);
    const w = screenToWorld(p.x, p.y);
    dragEevee.wx = clamp(w.wx + dragOffset.wx, 0.05, 0.95);
    dragEevee.wy = clamp(w.wy + dragOffset.wy, 0.05, 0.95);
    dragEevee.vx = 0; dragEevee.vy = 0;
    dragEevee.aiState = "idle"; dragEevee.aiTimer = 60;
});
canvas.addEventListener("mouseup", () => {
    if (dragEevee) {
        dragEevee.aiTimer = 60;
        if (!dragMoved) clicked = true;
        dragEevee = null;
    } else { clicked = true; }
});
canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    const p = getPos(e);
    clickX = p.x; clickY = p.y;
    touchStartY = p.y; touchDragging = false;
    if (state.scene === "farm" && !state.panel && !state.popup) {
        const ee = findEeveeAtScreen(p.x, p.y);
        if (ee) {
            dragEevee = ee;
            dragMoved = false;
        const w = screenToWorld(p.x, p.y);
            dragOffset.wx = ee.wx - w.wx;
            dragOffset.wy = ee.wy - w.wy;
        }
    }
});
canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    if (dragEevee) {
        dragMoved = true;
        touchDragging = true;
        const p = getPos(e);
        const w = screenToWorld(p.x, p.y);
        dragEevee.wx = clamp(w.wx + dragOffset.wx, 0.05, 0.95);
        dragEevee.wy = clamp(w.wy + dragOffset.wy, 0.05, 0.95);
        dragEevee.vx = 0; dragEevee.vy = 0;
        dragEevee.aiState = "idle"; dragEevee.aiTimer = 60;
    } else if ((state.panel === "inventory" || state.panel === "dex") && touchStartY >= 0) {
        const p = getPos(e);
        const dy = touchStartY - p.y;
        if (Math.abs(dy) > 3) {
            touchDragging = true;
            if (state.panel === "inventory") state.invScroll += dy;
            else if (state.panel === "dex") state.dexScroll += dy;
            touchStartY = p.y;
        }
    }
});
canvas.addEventListener("touchend", e => {
    e.preventDefault();
    if (dragEevee) {
        dragEevee.aiTimer = 60;
        if (!dragMoved) clicked = true;
        dragEevee = null;
    } else if (!touchDragging) clicked = true;
    touchStartY = -1; touchDragging = false;
});
canvas.addEventListener("wheel", e => {
    if (state.panel === "inventory") { state.invScroll += e.deltaY * 0.5; e.preventDefault(); }
    else if (state.panel === "dex") { state.dexScroll += e.deltaY * 0.5; e.preventDefault(); }
}, { passive: false });

function consumeClick() {
    if (!clicked) return null;
    clicked = false;
    return { x: clickX, y: clickY };
}

/* ── 개발자 치트코드 (키 시퀀스: eevee) ── */
let cheatBuf = "";
document.addEventListener("keydown", e => {
    cheatBuf += e.key.toLowerCase();
    if (cheatBuf.length > 10) cheatBuf = cheatBuf.slice(-10);
    if (cheatBuf.endsWith("eevee") || cheatBuf.endsWith("ㄷㄷㅍㄷㄷ")) {
        cheatBuf = "";
        state.popup = { type: "cheat" };
        state.popupTimer = 0;
    }
});

function applyCheat(type) {
    const ee = state.currentEevee;
    if (type === "items") {
        // 모든 열매 100개
        for (const f of FRUITS) addItem(f, 100);
        // 진화용 아이템
        for (const name of ["물의돌","불꽃의돌","천둥의돌","리본","이끼바위조각","얼음바위조각","태양조각","달조각","다이버섯","이브이나이트","용의비늘","부드러운모래","바람깃털"]) addItem(name, 10);
        showMessage("🔧 모든 아이템 추가!", 90);
    } else if (type === "friendship_max") {
        if (ee) ee.friendship = FRIENDSHIP.max;
        showMessage("🔧 친밀도 MAX!", 90);
    } else if (type === "friendship_zero") {
        if (ee) ee.friendship = -1;
        showMessage("🔧 친밀도 → -1!", 90);
    } else if (type === "stamina") {
        // 전 이브이 활동성 MAX
        for (const e of state.farm) e.activity = ACTIVITY_MAX;
        showMessage("🔧 전체 활동성 MAX!", 90);
    } else if (type === "explore") {
        if (ee) { ee.exploreCount = 25; ee.repeatCount = 6; }
        state.skipCount = 15; state.totalRests = 10;
        showMessage("🔧 탐색/휴식 카운트 충전!", 90);
    } else if (type === "unlock_base8") {
        for (const evo of EVOS.slice(0, 8)) state.collected.add(evo.id);
        showMessage("🔧 기본 8종 해금!", 90);
    }
    state.popup = null;
}

function hitBox(cx, cy, bx, by, bw, bh) {
    return cx >= bx && cx <= bx + bw && cy >= by && cy <= by + bh;
}

/* ═══════════════════════════════════════════
   10. RENDERING
   ═══════════════════════════════════════════ */
let frame = 0;

/* ── 배경 ── */
function drawBackground() {
    const isNight = state.timeOfDay === "night";

    // 하늘
    const skyGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_TOP + 40);
    if (isNight) {
        skyGrad.addColorStop(0,"#050510");
        skyGrad.addColorStop(0.4,"#0a0a20");
        skyGrad.addColorStop(1,"#141430");
    } else {
        skyGrad.addColorStop(0,"#4A90D9");
        skyGrad.addColorStop(0.5,"#7EC8E3");
        skyGrad.addColorStop(1,"#C5E8F0");
    }
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, CW, FLOOR_TOP + 40);

    // 구름 (낮)
    if (!isNight) {
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        for (let i = 0; i < 4; i++) {
            const cx = ((i * 157 + frame * 0.05) % (CW + 100)) - 50;
            const cy = 30 + i * 25;
            ctx.beginPath();
            ctx.ellipse(cx, cy, 35 + i * 5, 12, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 20, cy - 5, 25, 10, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx - 15, cy + 2, 20, 8, 0, 0, Math.PI * 2); ctx.fill();
        }
    }

    // 별 (밤)
    if (isNight) {
        ctx.fillStyle = "#fff";
        for (let i = 0; i < 60; i++) {
            const sx = (i * 137 + 50) % CW;
            const sy = (i * 97 + 10) % (FLOOR_TOP - 30) + 10;
            const twinkle = 0.15 + Math.sin(frame * 0.02 + i * 2.7) * 0.25;
            ctx.globalAlpha = twinkle;
            const sr = i % 7 === 0 ? 2 : 1;
            ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        // 달 + 달빛
        ctx.fillStyle = "rgba(245,230,200,0.08)";
        ctx.beginPath(); ctx.arc(CW - 60, 50, 50, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#F5E6CC";
        ctx.beginPath(); ctx.arc(CW - 60, 50, 22, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#E8D8B8";
        ctx.beginPath(); ctx.arc(CW - 55, 45, 18, 0, Math.PI * 2); ctx.fill();
    } else {
        // 태양 + 광선
        ctx.fillStyle = "rgba(255,215,0,0.08)";
        ctx.beginPath(); ctx.arc(70, 50, 55, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "rgba(255,215,0,0.15)";
        ctx.beginPath(); ctx.arc(70, 50, 38, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#FFD700";
        ctx.beginPath(); ctx.arc(70, 50, 24, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#FFF176";
        ctx.beginPath(); ctx.arc(70, 50, 14, 0, Math.PI * 2); ctx.fill();
    }

    // 원경 산 (레이어드)
    ctx.fillStyle = isNight ? "#0e0e20" : "#6B9E6B";
    for (let i = 0; i < 6; i++) {
        const mx = i * 110 + 20;
        ctx.beginPath();
        ctx.ellipse(mx, FLOOR_TOP + 25, 90, 55, 0, Math.PI, 0);
        ctx.fill();
    }
    ctx.fillStyle = isNight ? "#151528" : "#7DB87D";
    for (let i = 0; i < 5; i++) {
        const mx = i * 130 + 60;
        ctx.beginPath();
        ctx.ellipse(mx, FLOOR_TOP + 22, 75, 40, 0, Math.PI, 0);
        ctx.fill();
    }

    // 나무 실루엣 (울타리 뒤)
    const treeColor = isNight ? "#0c1a10" : "#3E8B3E";
    const trunkColor = isNight ? "#1a1510" : "#6B4226";
    const trees = [50, 140, 350, 430];
    for (const tx of trees) {
        // 줄기
        ctx.fillStyle = trunkColor;
        ctx.fillRect(tx - 3, FLOOR_TOP - 15, 6, 20);
        // 잎
        ctx.fillStyle = treeColor;
        ctx.beginPath(); ctx.arc(tx, FLOOR_TOP - 25, 18, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(tx - 10, FLOOR_TOP - 18, 14, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(tx + 10, FLOOR_TOP - 18, 14, 0, Math.PI * 2); ctx.fill();
    }
}

/* ── 쿼터뷰 바닥 ── */
function drawFloor() {
    const isNight = state.timeOfDay === "night";

    // 바닥 (사다리꼴 - 원근)
    const topW = CW * 0.55, botW = CW * 0.95;
    const topL = (CW - topW) / 2, topR = topL + topW;
    const botL = (CW - botW) / 2, botR = botL + botW;

    const floorGrad = ctx.createLinearGradient(0, FLOOR_TOP, 0, FLOOR_BOT);
    if (isNight) { floorGrad.addColorStop(0,"#1a3020"); floorGrad.addColorStop(1,"#2a4030"); }
    else { floorGrad.addColorStop(0,"#5DAA68"); floorGrad.addColorStop(1,"#4CAF50"); }

    ctx.fillStyle = floorGrad;
    ctx.beginPath();
    ctx.moveTo(topL, FLOOR_TOP);
    ctx.lineTo(topR, FLOOR_TOP);
    ctx.lineTo(botR, FLOOR_BOT);
    ctx.lineTo(botL, FLOOR_BOT);
    ctx.closePath();
    ctx.fill();

    // 잔디 패치 (랜덤 색상 변화)
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(topL, FLOOR_TOP); ctx.lineTo(topR, FLOOR_TOP);
    ctx.lineTo(botR, FLOOR_BOT); ctx.lineTo(botL, FLOOR_BOT);
    ctx.closePath();
    ctx.clip();

    // 잔디 얼룩
    for (let i = 0; i < 25; i++) {
        const t = (i * 71 + 13) % 100 / 100; // wy
        const s = (i * 53 + 7) % 100 / 100;  // wx
        const gy = FLOOR_TOP + t * FLOOR_H;
        const perspective = 0.6 + t * 0.4;
        const gx = CW / 2 + (s - 0.5) * (CW - FLOOR_PAD * 2) * perspective;
        const patchSize = 15 + t * 20;
        ctx.fillStyle = isNight
            ? `rgba(${30 + i % 3 * 5},${55 + i % 4 * 5},${35 + i % 3 * 5},0.4)`
            : `rgba(${60 + i % 3 * 10},${150 + i % 5 * 10},${60 + i % 3 * 10},0.3)`;
        ctx.beginPath();
        ctx.ellipse(gx, gy, patchSize, patchSize * 0.4, (i * 0.5) % Math.PI, 0, Math.PI * 2);
        ctx.fill();
    }

    // 잔디 풀 꼬리 (작은 V 모양)
    for (let i = 0; i < 40; i++) {
        const t = (i * 37 + 19) % 100 / 100;
        const s = (i * 61 + 3) % 100 / 100;
        const gy = FLOOR_TOP + t * FLOOR_H;
        const perspective = 0.6 + t * 0.4;
        const gx = CW / 2 + (s - 0.5) * (CW - FLOOR_PAD * 2) * perspective;
        const grassH = 4 + t * 4;
        ctx.strokeStyle = isNight ? "rgba(80,140,80,0.3)" : "rgba(50,120,50,0.35)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(gx - 2, gy); ctx.lineTo(gx, gy - grassH); ctx.lineTo(gx + 2, gy);
        ctx.stroke();
    }

    // 작은 꽃 (낮만)
    if (!isNight) {
        const flowerColors = ["#FFE082","#F48FB1","#CE93D8","#FFF"];
        for (let i = 0; i < 12; i++) {
            const t = (i * 43 + 27) % 100 / 100;
            const s = (i * 67 + 11) % 100 / 100;
            const gy = FLOOR_TOP + t * FLOOR_H;
            const perspective = 0.6 + t * 0.4;
            const gx = CW / 2 + (s - 0.5) * (CW - FLOOR_PAD * 2) * perspective;
            const fsize = 2 + t * 2;
            ctx.fillStyle = flowerColors[i % flowerColors.length];
            ctx.beginPath(); ctx.arc(gx, gy, fsize, 0, Math.PI * 2); ctx.fill();
        }
    }

    // 돌멩이
    for (let i = 0; i < 6; i++) {
        const t = (i * 59 + 41) % 100 / 100;
        const s = (i * 83 + 17) % 100 / 100;
        const gy = FLOOR_TOP + t * FLOOR_H;
        const perspective = 0.6 + t * 0.4;
        const gx = CW / 2 + (s - 0.5) * (CW - FLOOR_PAD * 2) * perspective;
        ctx.fillStyle = isNight ? "rgba(60,60,50,0.5)" : "rgba(160,155,140,0.5)";
        ctx.beginPath();
        ctx.ellipse(gx, gy, 3 + t * 2, 2 + t * 1, i * 0.7, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();

    // 울타리 (가로대 2줄)
    const fenceColor = isNight ? "#3a2a1a" : "#A07030";
    const fenceDark = isNight ? "#2a1a0a" : "#7A5520";

    // 왼쪽 울타리
    for (let i = 0; i <= 5; i++) {
        const t = i / 5;
        const ly = FLOOR_TOP + t * FLOOR_H;
        const lx = lerp(topL, botL, t);
        // 기둥
        const postH = 16 + t * 6;
        ctx.fillStyle = fenceDark;
        ctx.fillRect(lx - 3, ly - postH, 5, postH + 2);
        ctx.fillStyle = fenceColor;
        ctx.fillRect(lx - 2, ly - postH, 3, postH);
    }
    // 왼쪽 가로대
    ctx.strokeStyle = fenceColor; ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i <= 5; i++) {
        const t = i / 5;
        const ly = FLOOR_TOP + t * FLOOR_H - 8 - t * 3;
        const lx = lerp(topL, botL, t);
        i === 0 ? ctx.moveTo(lx, ly) : ctx.lineTo(lx, ly);
    }
    ctx.stroke();
    ctx.beginPath();
    for (let i = 0; i <= 5; i++) {
        const t = i / 5;
        const ly = FLOOR_TOP + t * FLOOR_H - 14 - t * 4;
        const lx = lerp(topL, botL, t);
        i === 0 ? ctx.moveTo(lx, ly) : ctx.lineTo(lx, ly);
    }
    ctx.stroke();

    // 오른쪽 울타리
    for (let i = 0; i <= 5; i++) {
        const t = i / 5;
        const ry = FLOOR_TOP + t * FLOOR_H;
        const rx = lerp(topR, botR, t);
        const postH = 16 + t * 6;
        ctx.fillStyle = fenceDark;
        ctx.fillRect(rx - 2, ry - postH, 5, postH + 2);
        ctx.fillStyle = fenceColor;
        ctx.fillRect(rx - 1, ry - postH, 3, postH);
    }
    ctx.strokeStyle = fenceColor; ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i <= 5; i++) {
        const t = i / 5;
        const ry = FLOOR_TOP + t * FLOOR_H - 8 - t * 3;
        const rx = lerp(topR, botR, t);
        i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
    }
    ctx.stroke();
    ctx.beginPath();
    for (let i = 0; i <= 5; i++) {
        const t = i / 5;
        const ry = FLOOR_TOP + t * FLOOR_H - 14 - t * 4;
        const rx = lerp(topR, botR, t);
        i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
    }
    ctx.stroke();

    // 뒤쪽 울타리
    ctx.strokeStyle = fenceColor; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(topL, FLOOR_TOP - 8); ctx.lineTo(topR, FLOOR_TOP - 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(topL, FLOOR_TOP - 14); ctx.lineTo(topR, FLOOR_TOP - 14); ctx.stroke();
    for (let i = 0; i <= 6; i++) {
        const px = topL + (topW / 6) * i;
        ctx.fillStyle = fenceDark;
        ctx.fillRect(px - 2, FLOOR_TOP - 18, 4, 20);
        ctx.fillStyle = fenceColor;
        ctx.fillRect(px - 1, FLOOR_TOP - 17, 2, 18);
    }

    // 바닥 아래 (앞면 흙 - 레이어드)
    const dirtGrad = ctx.createLinearGradient(0, FLOOR_BOT, 0, FLOOR_BOT + 16);
    if (isNight) { dirtGrad.addColorStop(0,"#2a2018"); dirtGrad.addColorStop(1,"#1a1008"); }
    else { dirtGrad.addColorStop(0,"#8B7355"); dirtGrad.addColorStop(1,"#6B5335"); }
    ctx.fillStyle = dirtGrad;
    ctx.fillRect(botL, FLOOR_BOT, botW, 16);
    // 흙 디테일
    ctx.fillStyle = isNight ? "rgba(60,40,20,0.3)" : "rgba(120,90,50,0.3)";
    for (let i = 0; i < 10; i++) {
        const dx = botL + (i * 47 + 15) % Math.floor(botW);
        ctx.beginPath(); ctx.arc(dx, FLOOR_BOT + 6 + (i % 3) * 3, 3, 0, Math.PI * 2); ctx.fill();
    }
}

/* ── 스프라이트 ── */
// 스프라이트 기본 방향 (1=오른쪽, -1=왼쪽)
const SPRITE_DEFAULT_FACING = {
    "이브이.png": -1, "샤미드.png": -1, "쥬피썬더.png": -1, "부스터.png": -1,
    "에브이.png": 1, "블래키.png": -1, "리피아.png": -1, "글레이시아.png": -1,

    "이브이바위.png": -1, "이브이비행.png": -1, "이브이강철.png": -1,
};

function drawSprite(imgName, sx, sy, facing, size) {
    const img = images[imgName];
    if (!img || !img.complete) return;
    const w = size;
    const h = w * (img.height / img.width);
    const defaultDir = SPRITE_DEFAULT_FACING[imgName] || -1;
    ctx.save();
    ctx.translate(sx, sy);
    if (facing !== defaultDir) ctx.scale(-1, 1);
    ctx.drawImage(img, -w / 2, -h, w, h);
    ctx.restore();
}

/* ── 농장 엔티티 렌더 ── */
function drawFarmEntities() {
    // 모든 엔티티 수집 + wy 정렬
    const entities = [];

    // 현재 이브이 (파견 중이면 숨김)
    if (state.currentEevee && !isOnExpedition("current")) {
        const ce = state.currentEevee;
        entities.push({ type: "current", wx: ce.wx, wy: ce.wy, facing: ce.facing, sprite: "이브이.png", aiState: ce.aiState });
    }

    // 수집된 이브이 (파견 중이면 숨김)
    for (let fi = 0; fi < state.farm.length; fi++) {
        if (isOnExpedition(fi)) continue;
        const e = state.farm[fi];
        entities.push({ type: "farm", wx: e.wx, wy: e.wy, facing: e.facing, sprite: e.sprite, aiState: e.aiState, activity: e.activity || 0 });
    }

    // 바닥 아이템
    for (const item of state.farmItems) {
        entities.push({ type: "item", wx: item.wx, wy: item.wy, name: item.name });
    }

    // wy 기준 정렬 (뒤 → 앞)
    entities.sort((a, b) => a.wy - b.wy);

    for (const ent of entities) {
        const { sx, sy } = worldToScreen(ent.wx, ent.wy);
        const baseSize = spriteSize(ent.wy);
        const size = ent.type === "farm" ? baseSize * 1.2 : baseSize;

        if (ent.type === "item") {
            ctx.globalAlpha = 1;
            const isFruit = FRUITS.includes(ent.name);
            const isize = isFruit ? (10 + ent.wy * 8) : (14 + ent.wy * 10);
            // 그림자
            ctx.fillStyle = "#00000040";
            const shadowR = isFruit ? 8 : 11;
            ctx.beginPath(); ctx.ellipse(sx, sy + 4, shadowR, 3, 0, 0, Math.PI * 2); ctx.fill();
            // 아이템류 테두리
            if (!isFruit) {
                ctx.fillStyle = "rgba(100,180,255,0.15)";
                ctx.strokeStyle = "rgba(100,180,255,0.6)";
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(sx, sy - 2, isize * 0.55, 0, Math.PI * 2);
                ctx.fill(); ctx.stroke();
            }
            // 이모지
            ctx.font = `${isize}px system-ui`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillStyle = "#000";
            ctx.fillText(itemEmoji(ent.name), sx, sy - 1);
        } else {
            // 그림자
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.beginPath(); ctx.ellipse(sx, sy + 2, size * 0.35, size * 0.12, 0, 0, Math.PI * 2); ctx.fill();

            // 바운스
            let bounce = 0;
            if (ent.aiState === "walk") bounce = Math.sin(frame * 0.1 + ent.wx * 100) * 2;
            if (ent.aiState === "sleep") bounce = 1;

            drawSprite(ent.sprite, sx, sy - bounce, ent.facing, size);

            // 수면 z
            if (ent.aiState === "sleep") {
                ctx.fillStyle = "#fff";
                ctx.globalAlpha = 0.4 + Math.sin(frame * 0.03) * 0.2;
                ctx.font = `${10 + ent.wy * 4}px system-ui`;
                ctx.textAlign = "center";
                ctx.fillText("z", sx + size * 0.3, sy - size * 0.6 + Math.sin(frame * 0.02) * 4);
                ctx.globalAlpha = 1;
            }

            // 현재 이브이: 친밀도 바 (파랑/핑크) + 하트
            if (ent.type === "current") {
                const heartSize = 8;
                const barW = size * 1.2, barH = 4;
                const barX = sx - barW / 2 + heartSize + 2, barY = sy - size * 0.9;
                // 하트 아이콘
                ctx.fillStyle = "#FF69B4";
                ctx.font = `${heartSize}px system-ui`;
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("♥", barX - heartSize / 2 - 2, barY + barH / 2);
                // 바
                const adjBarW = barW - heartSize - 2;
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.fillRect(barX, barY, adjBarW, barH);
                const ratio = clamp(state.currentEevee.friendship / FRIENDSHIP.max, 0, 1);
                ctx.fillStyle = ratio >= 1 ? "#FF69B4" : "#4FC3F7";
                ctx.fillRect(barX, barY, adjBarW * ratio, barH);
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.lineWidth = 0.5;
                ctx.strokeRect(barX, barY, adjBarW, barH);
            }

            // 진화 이브이: 활동성 바 (주황)
            if (ent.type === "farm" && typeof ent.activity !== "undefined") {
                const barW = size * 1.0, barH = 3;
                const barX = sx - barW / 2, barY = sy - size * 0.85;
                ctx.fillStyle = "rgba(0,0,0,0.35)";
                ctx.fillRect(barX, barY, barW, barH);
                const ratio = clamp(ent.activity / ACTIVITY_MAX, 0, 1);
                ctx.fillStyle = ratio >= 0.7 ? "#FF9800" : ratio >= 0.3 ? "#FFB74D" : "#795548";
                ctx.fillRect(barX, barY, barW * ratio, barH);
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.lineWidth = 0.5;
                ctx.strokeRect(barX, barY, barW, barH);
            }
        }
    }

    // 피드백 애니메이션
    if (state.feedbackAnim) {
        const fb = state.feedbackAnim;
        fb.timer--;
        const alpha = clamp(fb.timer / 40, 0, 1);
        const yOff = (70 - fb.timer) * 0.7;
        ctx.globalAlpha = alpha;
        ctx.font = "24px system-ui";
        ctx.textAlign = "center";
        if (fb.type === "liked") {
            ctx.fillStyle = "#FF69B4"; ctx.fillText("♥", fb.x, fb.y - yOff);
            if (fb.delta) { ctx.font = "bold 14px system-ui"; ctx.fillText(`+${fb.delta}`, fb.x, fb.y - yOff + 20); }
        }
        else if (fb.type === "disliked") {
            ctx.fillStyle = "#FF4444"; ctx.fillText("💢", fb.x, fb.y - yOff);
            if (fb.delta) { ctx.font = "bold 14px system-ui"; ctx.fillText(`${fb.delta}`, fb.x, fb.y - yOff + 20); }
        }
        else if (fb.type === "neutral") {
            ctx.fillStyle = "#4FC3F7"; ctx.fillText("~", fb.x, fb.y - yOff);
            if (fb.delta) { ctx.font = "bold 14px system-ui"; ctx.fillText(`+${fb.delta}`, fb.x, fb.y - yOff + 20); }
        }
        else { ctx.fillStyle = "#aaa"; ctx.fillText("...", fb.x, fb.y - yOff); }
        ctx.globalAlpha = 1;
        if (fb.timer <= 0) state.feedbackAnim = null;
    }
}

    ctx.fillStyle = "rgba(0,0,0,0.45)";

    ctx.fill();

    ctx.textBaseline = "middle";
    ctx.font = "bold 13px system-ui";
    ctx.textAlign = "left";
    ctx.fillStyle = isNight ? "#B0BEC5" : "#FFD54F";
    ctx.fillText(isNight ? "🌙 밤" : "☀️ 낮", 10, 14);

    ctx.fillStyle = "#ddd";
    ctx.font = "12px system-ui";
    ctx.fillStyle = "#ddd"; ctx.font = "12px system-ui";

    // 전투 진행 표시
    ctx.fillStyle = "#aaa"; ctx.font = "11px system-ui"; ctx.textAlign = "left";
    if (state.battleMaxStage > 0) {
        ctx.fillText(`⚔ ${state.battleMaxStage}`, 10, 36);
    }
    // 파견 슬롯 표시
    if (state.expeditions && state.expeditions.length > 0) {
        ctx.fillText(`🏃 ${state.expeditions.length}/${state.expeditionSlots}`, 70, 36);
    }

    ctx.textAlign = "center";
    ctx.fillText(`${totalEevees()}마리`, CW / 2, 14);

    ctx.textAlign = "right";
    ctx.fillStyle = "#aaa";
    ctx.fillText(`턴 ${state.turnNumber}`, CW - 10, 14);

    // 탐색 출정 중 표시
    if (state.expeditions && state.expeditions.length > 0) {
        const now = Date.now();
        for (let i = 0; i < state.expeditions.length; i++) {
            const exp = state.expeditions[i];
            const loc = LOCATIONS.find(l => l.id === exp.locId);
            const elapsed = now - exp.startTime;
            const ratio = clamp(elapsed / exp.duration, 0, 1);
            const remaining = Math.max(0, Math.ceil((exp.duration - elapsed) / 1000));

            const ey = 56 + i * 28;
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            roundRect(8, ey, CW - 16, 24, 5); ctx.fill();

            // 이브이 이름 + 장소
            ctx.textAlign = "left"; ctx.fillStyle = "#ccc"; ctx.font = "10px system-ui";
            ctx.fillText(`🏃 ${exp.eeveeName} → ${loc ? loc.name : "?"}`, 14, ey + 9);

            // 남은 시간
            ctx.textAlign = "right"; ctx.fillStyle = "#aaa"; ctx.font = "10px system-ui";
            ctx.fillText(`${remaining}초`, CW - 14, ey + 9);

            // 프로그레스 바
            ctx.fillStyle = "#333"; ctx.fillRect(14, ey + 17, CW - 28, 3);
            ctx.fillStyle = "#4CAF50"; ctx.fillRect(14, ey + 17, (CW - 28) * ratio, 3);
        }
    }
}

function drawExplorePanel() {
    const startY = drawPanelBg();
    const py = startY;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    // 이브이 선택 단계
    if (state.expeditionSelect) {
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 16px system-ui";
        ctx.fillText(`${state.expeditionSelect.locName} 탐색`, CW / 2, py);
        ctx.fillStyle = "#aaa"; ctx.font = "12px system-ui";
        ctx.fillText("파견할 이브이를 선택하세요", CW / 2, py + 20);

        const allEe = [];
        if (state.currentEevee && !isOnExpedition("current")) allEe.push({ ref: "current", name: "이브이", img: "이브이.png", type: "무" });
        state.farm.forEach((e, i) => {
            if (isOnExpedition(i)) return;
            const evo = EVOS.find(ev => ev.id === e.evoId);
            if (evo) allEe.push({ ref: i, name: evo.name, img: evo.img, type: evo.type });
        });

        const loc = LOCATIONS.find(l => l.id === state.expeditionSelect.locId);
        for (let i = 0; i < allEe.length; i++) {
            const ee = allEe[i];
            const by = py + 38 + i * 46;
            if (by > CH - 50) break;
            const typeMatch = loc && loc.attr === ee.type;
            ctx.fillStyle = typeMatch ? "rgba(46,125,50,0.2)" : "rgba(50,50,80,0.6)";
            ctx.strokeStyle = typeMatch ? "#4CAF50" : "#444"; ctx.lineWidth = 1;
            roundRect(20, by, CW - 40, 40, 6); ctx.fill(); ctx.stroke();
            drawSprite(ee.img, 50, by + 24, 1, 26);
            ctx.textAlign = "left"; ctx.fillStyle = "#fff"; ctx.font = "bold 13px system-ui";
            ctx.fillText(ee.name, 72, by + 14);
            ctx.fillStyle = "#aaa"; ctx.font = "11px system-ui";
            ctx.fillText(`${ee.type}타입`, 72, by + 30);
            if (typeMatch) {
                ctx.textAlign = "right"; ctx.fillStyle = "#4CAF50"; ctx.font = "bold 10px system-ui";
                ctx.fillText("보너스!", CW - 30, by + 20);
            }
            ctx.textAlign = "center";
        }
        // 뒤로가기
        ctx.fillStyle = "#555"; roundRect(CW / 2 - 40, CH - 50, 80, 30, 6); ctx.fill();
        ctx.fillStyle = "#ccc"; ctx.font = "12px system-ui";
        ctx.fillText("뒤로", CW / 2, CH - 35);
        return;
    }

    // 장소 선택 단계
    ctx.fillStyle = "#FFD54F"; ctx.font = "bold 18px system-ui";
    ctx.fillText("탐색 출동", CW / 2, py);

    // 파견 상태
    ctx.fillStyle = "#aaa"; ctx.font = "12px system-ui";
    ctx.fillText(`파견 ${state.expeditions.length} / ${state.expeditionSlots}`, CW / 2, py + 20);

    // 진행 중인 파견 표시
    let curY = py + 35;
    for (const exp of state.expeditions) {
        const loc = LOCATIONS.find(l => l.id === exp.locId);
        const elapsed = Date.now() - exp.startTime;
        const ratio = Math.min(elapsed / exp.duration, 1);
        const remaining = Math.max(0, Math.ceil((exp.duration - elapsed) / 1000));

        ctx.fillStyle = "rgba(50,80,50,0.4)"; roundRect(20, curY, CW - 40, 32, 5); ctx.fill();
        ctx.textAlign = "left"; ctx.fillStyle = "#4CAF50"; ctx.font = "11px system-ui";
        ctx.fillText(`🏃 ${exp.eeveeName} → ${loc ? loc.name : "?"}`, 30, curY + 12);
        // 진행 바
        ctx.fillStyle = "#333"; ctx.fillRect(30, curY + 22, CW - 70, 4);
        ctx.fillStyle = "#4CAF50"; ctx.fillRect(30, curY + 22, (CW - 70) * ratio, 4);
        ctx.textAlign = "right"; ctx.fillStyle = "#aaa"; ctx.font = "10px system-ui";
        ctx.fillText(`${remaining}초`, CW - 30, curY + 14);
        curY += 38;
    }

    // 슬롯 꽉 찼으면 안내
    if (state.expeditions.length >= state.expeditionSlots) {

    // 탐색지 목록 (턴당 3곳)
    const locs = state.turnLocations || [];
    for (let i = 0; i < locs.length; i++) {
        const loc = locs[i];
        const style = LOC_STYLE[loc.id] || { emoji:"📍", color:"#888", bg:"rgba(80,80,80,0.15)" };

        ctx.strokeStyle = style.color; ctx.lineWidth = 1;
        roundRect(bx, by, bw, bh, 8); ctx.stroke();

        ctx.fillStyle = style.color + "33";
        ctx.beginPath(); ctx.arc(bx + 22, by + bh / 2, 14, 0, Math.PI * 2); ctx.fill();
        ctx.font = "16px system-ui"; ctx.textAlign = "center";
        ctx.fillText(style.emoji, bx + 22, by + bh / 2 + 1);

        ctx.fillStyle = "#fff"; ctx.font = "bold 13px system-ui"; ctx.textAlign = "left";
        ctx.fillText(loc.name, bx + 44, by + 14);
        ctx.fillStyle = style.color; ctx.font = "10px system-ui";
        ctx.fillText(loc.attr, bx + 44, by + 29);

        ctx.textAlign = "right"; ctx.fillStyle = "#999"; ctx.font = "11px system-ui";
        ctx.fillText(`${loc.dur || 30}초`, bx + bw - 10, by + bh / 2);
        ctx.textAlign = "center";
    }
}

function getInventorySections() {
    const items = Object.entries(state.inventory);
    const fruits = items.filter(([n]) => FRUITS.includes(n));
    const others = items.filter(([n]) => !FRUITS.includes(n));
    return { fruits, others };
}

function drawInventoryPanel() {
    const startY = drawPanelBg();
    const py = startY;

    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#FFD54F"; ctx.font = "bold 18px system-ui";
    ctx.fillText("가방", CW / 2, py);

    const { fruits, others } = getInventorySections();
    const craftable = Object.keys(RECIPES).filter(r => hasItem(RECIPES[r].material, RECIPES[r].count));
    const ee = state.currentEevee;

    const listTop = py + 20;
    const listBot = CH - 10;
    const COL_W = (CW - 50) / 2;
    const ITEM_H = 42;
    const HEADER_H = 24;
    const craftH = craftable.length * 38;

    // 총 높이 계산 (제작 + 좌우 컬럼 중 긴 쪽)
    const leftH = HEADER_H + fruits.length * ITEM_H;
    const rightH = HEADER_H + others.length * ITEM_H;
    const columnsH = Math.max(leftH, rightH);
    const totalH = craftH + columnsH;
    const maxScroll = Math.max(0, totalH - (listBot - listTop));
    state.invScroll = clamp(state.invScroll, 0, maxScroll);

    ctx.save();
    ctx.beginPath(); ctx.rect(0, listTop, CW, listBot - listTop); ctx.clip();

    let y = listTop - state.invScroll;

    // 제작
    for (const name of craftable) {
        const bx = 20, bw = CW - 40, bh = 32;
        if (y + bh > listTop - 40 && y < listBot) {
            ctx.fillStyle = "rgba(62,39,35,0.9)"; ctx.strokeStyle = "#FF8F00"; ctx.lineWidth = 1;
            roundRect(bx, y, bw, bh, 6); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#FF8F00"; ctx.font = "bold 12px system-ui"; ctx.textAlign = "center";
            ctx.fillText(`🔨 ${itemEmoji(name)} ${name} 제작 (${itemEmoji(RECIPES[name].material)}x${RECIPES[name].count})`, CW / 2, y + 16);
        }
        y += 38;
    }

    if (fruits.length === 0 && others.length === 0) {
        ctx.fillStyle = "#666"; ctx.font = "13px system-ui"; ctx.textAlign = "center";
        ctx.fillText("아이템이 없습니다", CW / 2, y + 40);
    }

    const colStartY = y;
    const leftX = 15;
    const rightX = leftX + COL_W + 20;

    // 열매 헤더
    ctx.fillStyle = "#8BC34A"; ctx.font = "bold 13px system-ui"; ctx.textAlign = "left";
    ctx.fillText("── 열매 ──", leftX + 10, colStartY + 12);

    // 아이템 헤더
    ctx.fillStyle = "#64B5F6"; ctx.font = "bold 13px system-ui"; ctx.textAlign = "left";
    ctx.fillText("── 아이템 ──", rightX + 10, colStartY + 12);

    // 열매 컬럼 (좌)
    for (let i = 0; i < fruits.length; i++) {
        const [name, count] = fruits[i];
        const bx = leftX, bw = COL_W, bh = 38;
        const by = colStartY + HEADER_H + i * ITEM_H;
        if (by + bh < listTop - 10) continue;
        if (by > listBot + 10) break;

        let borderColor = "#444";
        if (ee) {
            if (ee.knownLiked && name === ee.likedFruit) borderColor = "#4CAF50";
            else if (ee.knownDisliked && name === ee.dislikedFruit) borderColor = "#E53935";
        }

        ctx.fillStyle = "rgba(50,50,80,0.8)";
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = borderColor === "#444" ? 1 : 2.5;
        roundRect(bx, by, bw, bh, 5); ctx.fill(); ctx.stroke();

        ctx.textAlign = "left"; ctx.fillStyle = "#ddd"; ctx.font = "12px system-ui";
        ctx.fillText(`${itemEmoji(name)} ${name} x${count}`, bx + 6, by + 13);

        if (ee) {
            if (ee.knownLiked && name === ee.likedFruit) {
                ctx.fillStyle = "#4CAF50"; ctx.font = "bold 9px system-ui";
                ctx.fillText("♥좋아함", bx + 6, by + 28);
            } else if (ee.knownDisliked && name === ee.dislikedFruit) {
                ctx.fillStyle = "#E53935"; ctx.font = "bold 9px system-ui";
                ctx.fillText("💢싫어함", bx + 6, by + 28);
            }
        }

        // 버리기
        const dbx = bx + bw - 38, dbw = 34;
        ctx.fillStyle = "#555"; roundRect(dbx, by + 5, dbw, 26, 4); ctx.fill();
        ctx.fillStyle = "#ccc"; ctx.font = "bold 10px system-ui"; ctx.textAlign = "center";
        ctx.fillText("버리기", dbx + dbw / 2, by + 18);
    }

    // 아이템 컬럼 (우)
    for (let i = 0; i < others.length; i++) {
        const [name, count] = others[i];
        const bx = rightX, bw = COL_W, bh = 38;
        const by = colStartY + HEADER_H + i * ITEM_H;
        if (by + bh < listTop - 10) continue;
        if (by > listBot + 10) break;

        ctx.fillStyle = "rgba(50,50,80,0.8)";
        ctx.strokeStyle = "#555"; ctx.lineWidth = 1;
        roundRect(bx, by, bw, bh, 5); ctx.fill(); ctx.stroke();

        ctx.textAlign = "left"; ctx.fillStyle = "#ddd"; ctx.font = "12px system-ui";
        ctx.fillText(`${itemEmoji(name)} ${name} x${count}`, bx + 6, by + 13);

        // 버리기
        const dbx2 = bx + bw - 38, dbw2 = 34;
        ctx.fillStyle = "#555"; roundRect(dbx2, by + 5, dbw2, 26, 4); ctx.fill();
        ctx.fillStyle = "#ccc"; ctx.font = "bold 10px system-ui"; ctx.textAlign = "center";
        ctx.fillText("버리기", dbx2 + dbw2 / 2, by + 18);
    }

    ctx.restore();

    // 스크롤바
    if (maxScroll > 0) {
        const sbH = (listBot - listTop) * ((listBot - listTop) / totalH);
        const sbY = listTop + (state.invScroll / maxScroll) * ((listBot - listTop) - sbH);
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        roundRect(CW - 8, sbY, 4, sbH, 2); ctx.fill();
    }
}

function drawDexPanel() {
    const startY = drawPanelBg();
    const py = startY;

    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#FFD54F"; ctx.font = "bold 18px system-ui";
    ctx.fillText("진화 도감", CW / 2, py);

    const showPost = base8Complete();
    const list = showPost ? EVOS : EVOS.slice(0, 8);
    const cols = 4;
    const cellW = 100, cellH = 80;
    const gridW = cols * cellW;
    const offsetX = (CW - gridW) / 2;
    const rows = Math.ceil(list.length / cols);
    const contentH = rows * (cellH + 6);
    const listTop = py + 25;
    const listBot = CH - 25;
    const viewH = listBot - listTop;
    const maxScroll = Math.max(0, contentH - viewH);
    state.dexScroll = clamp(state.dexScroll, 0, maxScroll);

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, listTop, CW, viewH);
    ctx.clip();

    for (let i = 0; i < list.length; i++) {
        const evo = list[i];
        const col = i % cols, row = Math.floor(i / cols);
        const bx = offsetX + col * cellW + 4;
        const by = listTop + row * (cellH + 6) - state.dexScroll;
        const bw = cellW - 8, bh = cellH;

        if (by + bh < listTop || by > listBot) continue;

        ctx.fillStyle = state.collected.has(evo.id) ? "rgba(50,50,100,0.7)" : "rgba(30,30,50,0.7)";
        ctx.strokeStyle = state.collected.has(evo.id) ? "#6C63FF" : "#333";
        ctx.lineWidth = 1;
        roundRect(bx, by, bw, bh, 6); ctx.fill(); ctx.stroke();

        if (state.collected.has(evo.id)) {
            drawSprite(evo.img, bx + bw / 2, by + 46, 1, 32);
            ctx.fillStyle = "#ddd"; ctx.font = "bold 10px system-ui"; ctx.textAlign = "center";
            ctx.fillText(evo.name, bx + bw / 2, by + 68);
        } else {
            ctx.fillStyle = "#444"; ctx.font = "bold 22px system-ui"; ctx.textAlign = "center";
            ctx.fillText("?", bx + bw / 2, by + 40);
        }
    }

    ctx.restore();

    ctx.fillStyle = "#888"; ctx.font = "12px system-ui"; ctx.textAlign = "center";
    const total = showPost ? EVOS.length : 8;
    ctx.fillText(`${state.collected.size} / ${total}`, CW / 2, CH - 10);
}
