const CW = 480, CH = 720;
const canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");
const nickInput = document.getElementById("nickInput");
const KOR2ENG = {"ㅂ":"q","ㅈ":"w","ㄷ":"e","ㄱ":"r","ㅅ":"t","ㅛ":"y","ㅕ":"u","ㅑ":"i","ㅐ":"o","ㅔ":"p",
    "ㅁ":"a","ㄴ":"s","ㅇ":"d","ㄹ":"f","ㅎ":"g","ㅗ":"h","ㅓ":"j","ㅏ":"k","ㅣ":"l",
    "ㅋ":"z","ㅌ":"x","ㅊ":"c","ㅍ":"v","ㅠ":"b","ㅜ":"n","ㅡ":"m",
    "ㅃ":"Q","ㅉ":"W","ㄸ":"E","ㄲ":"R","ㅆ":"T","ㅒ":"O","ㅖ":"P"};
function kor2eng(str) {
    let result = "";
    for (const ch of str) {
        if (KOR2ENG[ch]) { result += KOR2ENG[ch]; }
        else if (/[a-zA-Z0-9]/.test(ch)) { result += ch; }
        // 완성형 한글 → 자모 분해 후 변환
        else if (ch >= '가' && ch <= '힣') {
            const code = ch.charCodeAt(0) - 0xAC00;
            const cho = Math.floor(code / 588);
            const jung = Math.floor((code % 588) / 28);
            const jong = code % 28;
            const CHO = "ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ";
            const JUNG = "ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ";
            const JONG = "ㄱㄲㄳㄴㄵㄶㄷㄹㄺㄻㄼㄽㄾㄿㅀㅁㅂㅄㅅㅆㅇㅈㅊㅋㅌㅍㅎ";
            if (KOR2ENG[CHO[cho]]) result += KOR2ENG[CHO[cho]];
            if (KOR2ENG[JUNG[jung]]) result += KOR2ENG[JUNG[jung]];
            if (jong > 0 && KOR2ENG[JONG[jong-1]]) result += KOR2ENG[JONG[jong-1]];
        }
    }
    return result.slice(0, 10);
}
nickInput.addEventListener("input", () => {
    nickInput.value = kor2eng(nickInput.value);
    if (state && state.popup && state.popup.type === "nickname_input") {
        state._nicknameBuffer = nickInput.value;
    }
});
nickInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && state._nicknameBuffer && state._nicknameBuffer.length >= 2) {
        state.playerName = state._nicknameBuffer;
        if (!state.playerId) state.playerId = generatePlayerId();
        state.popup = null;

        if (state.scene === "title") {
            resetCurrentEevee();
            state.scene = "farm";
            if (!state.monster) spawnMonster(1);
            saveGame();
        }

});
function positionNickInput() {
    // 팝업의 입력 필드 위치에 HTML input을 겹침
    const rect = canvas.getBoundingClientRect();
    const scale = rect.width / CW;
    const pw = 300, ph = 150;
    const px = (CW - pw) / 2;
    const py = BTN_Y - ph - 10;
    const fieldX = px + 30;
    const fieldY = py + 60;
    const fieldW = pw - 60;
    const fieldH = 34;
    nickInput.style.left = (rect.left + fieldX * scale) + "px";
    nickInput.style.top = (rect.top + fieldY * scale) + "px";
    nickInput.style.width = (fieldW * scale) + "px";
    nickInput.style.height = (fieldH * scale) + "px";
    nickInput.style.fontSize = (18 * scale) + "px";
}
function openNicknameInput() {
    state.popup = { type: "nickname_input" };
    state.popupTimer = 0;
    state._nicknameBuffer = "";
    nickInput.value = "";
    positionNickInput();
    setTimeout(() => { nickInput.focus(); }, 100);
}
function closeNicknameInput() {
    nickInput.style.top = "-100px";
    nickInput.blur();
}

/* ── roundRect 폴리필 ── */
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
        if (typeof r === "number") r = [r,r,r,r];
        if (Array.isArray(r) && r.length === 1) r = [r[0],r[0],r[0],r[0]];
        const [tl,tr,br,bl] = r;
        this.moveTo(x+tl,y);
        this.lineTo(x+w-tr,y); this.quadraticCurveTo(x+w,y,x+w,y+tr);
        this.lineTo(x+w,y+h-br); this.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
        this.lineTo(x+bl,y+h); this.quadraticCurveTo(x,y+h,x,y+h-bl);
        this.lineTo(x,y+tl); this.quadraticCurveTo(x,y,x+tl,y);
        this.closePath();
    };
}

/* ── 배경 캐시 (오프스크린 캔버스) ── */
let bgCache = null;
let bgCacheTod = null;
function invalidateBgCache() { bgCache = null; bgCacheTod = null; }

function resize() {
    const s = Math.min(window.innerWidth / CW, window.innerHeight / CH, 2);
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = CW * dpr; canvas.height = CH * dpr;
    canvas.style.width = (CW * s) + "px";
    canvas.style.height = (CH * s) + "px";
    ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
    invalidateBgCache();
}
window.addEventListener("resize", resize);
resize();

function getBgCache() {
    if (bgCache && bgCacheTod === state.timeOfDay) return bgCache;
    const off = document.createElement("canvas");
    off.width = CW; off.height = CH;
    const origCtx = ctx;
    ctx = off.getContext("2d");
    drawBackground();
    drawFloor();
    ctx = origCtx;
    bgCache = off;
    bgCacheTod = state.timeOfDay;
    return bgCache;
}

/* ── 쿼터뷰 농장 영역 ── */
const FLOOR_TOP = 180, FLOOR_BOT = 520;
const FLOOR_H = FLOOR_BOT - FLOOR_TOP;
const FLOOR_PAD = 30;

function worldToScreen(wx, wy) {
    // wx: 0~1 (좌~우), wy: 0~1 (뒤~앞)
    const perspective = 0.6 + wy * 0.4; // 뒤쪽 좁고 앞쪽 넓음
    const sx = CW / 2 + (wx - 0.5) * (CW - FLOOR_PAD * 2) * perspective;
    const sy = FLOOR_TOP + wy * FLOOR_H;
    return { sx, sy };
}

function spriteSize(wy) {
    return 36 + wy * 18; // 뒤쪽 작고 앞쪽 큼
}

    "바람깃털":"비행타입 진화에 필요","가속장치":"탐색 시간 50% 단축",
    "독바늘":"독타입 진화에 필요","벌레껍질":"벌레타입 진화에 필요",
};

/* ── 진화 가능 아이템 체크 ── */
function canEvolveWith(itemName) {
    const ee = state.currentEevee;
    if (!ee) return false;
    for (const evo of EVOS) {
        if (state.collected.has(evo.id)) continue;
        if (evo.postGame && !base8Complete()) continue;
        if (evo.condition === "stone" && evo.stone === itemName) return true;
        if (evo.condition === "craft" && evo.craft === itemName) return true;
        if (evo.condition === "friendship_item" && evo.item === itemName) return true;
        if (evo.condition === "flying_feather" && itemName === "바람깃털") return true;
        if (evo.condition === "dragon" && itemName === "용의비늘") return true;
        if (evo.condition === "poison_evo" && itemName === "독바늘") return true;
        if (evo.condition === "bug_evo" && itemName === "벌레껍질") return true;
    }
    return false;
}

function weightedRandom(items) {
    const total = items.reduce((s,i) => s + i.weight, 0);
    let r = Math.random() * total;
    for (const item of items) { r -= item.weight; if (r <= 0) return item; }
    return items[items.length - 1];
}
function addItem(n, c=1) {
    state.inventory[n] = (state.inventory[n]||0) + c;
    checkBagHighlight();
}
function checkBagHighlight() {
    // 제작 가능 체크
    const canCraft = Object.keys(RECIPES).some(r => hasItem(RECIPES[r].material, RECIPES[r].count));
    // 진화 가능 아이템 체크
    const hasEvoItem = Object.keys(state.inventory).some(n => (state.inventory[n] || 0) > 0 && canEvolveWith(n));
    state.bagHighlight = canCraft || hasEvoItem;
}
function removeItem(n, c=1) { if (!state.inventory[n]) return false; state.inventory[n]-=c; if (state.inventory[n]<=0) delete state.inventory[n]; return true; }
function hasItem(n, c=1) { return (state.inventory[n]||0) >= c; }
function itemCount(n) { return state.inventory[n]||0; }
function totalEevees() { return state.farm.length + (state.currentEevee ? 1 : 0); }
function base8Complete() { return EVOS.slice(0,8).every(e => state.collected.has(e.id)); }
function allComplete() { return EVOS.every(e => state.collected.has(e.id)); }
function showMessage(text, dur=120) { state.message = { text, timer: dur }; }
function clamp(v,lo,hi) { return Math.max(lo,Math.min(hi,v)); }
function lerp(a,b,t) { return a + (b-a)*t; }
function friendshipMax() { return FRIENDSHIP.max; }

const ACTIVITY_MAX_SPEED = 0.0015;  // 활동성 MAX일 때

// 진화 아이템 ↔ 진화 이브이 매핑 (바닥 아이템 근처 시 활동성 부스트)

    "태양조각": "espeon", "달조각": "umbreon",

function getEeveeSpeed(e) {
    const boost = e._activityBoost || 1;
    const ratio = clamp((e.activity || 0) / ACTIVITY_BASE_MAX, 0, 1); // 이동속도는 50 기준 cap
    const base = lerp(ACTIVITY_MIN_SPEED, ACTIVITY_MAX_SPEED, ratio) * boost;
    // 진화 이브이 spd 보너스 (이브이 기본 spd 55 기준, 초과분의 10%를 가산)
    const evo = e.evoId ? EVOS.find(ev => ev.id === e.evoId) : null;
    const spdBonus = evo && evo.spd ? Math.max(0, evo.spd - 55) * 0.00001 : 0;
    return base + spdBonus;
}

        vy: (Math.random()-0.5)*0.005,
    });
}

function updateEeveeAI(e, isNight, isFighting) {
    const boost = e._activityBoost || 1;
    const actRatio = clamp(((e.activity || 0) * boost) / getActivityMax(), 0, 1);
    e._activityBoost = 1;

    // 넉백 상태: 밀려나는 중에는 AI 무시, 관성으로 날아감
    if (e._knockback > 0) {
        e._knockback--;
        e.wx += e._kbVx || 0;
        e.wy += e._kbVy || 0;
        // 넉백 중 다른 이브이도 밀어냄
        const kbAll = [];
        if (state.currentEevee && !isOnExpedition("current")) kbAll.push(state.currentEevee);
        state.farm.forEach((f, i) => { if (!isOnExpedition(i)) kbAll.push(f); });
        for (const other of kbAll) {
            if (other === e) continue;
            const odx = e.wx - other.wx, ody = e.wy - other.wy;
            const od = Math.sqrt(odx * odx + ody * ody);
            if (od < 0.08 && od > 0.001) {
                const kbSpd = Math.sqrt((e._kbVx||0)**2 + (e._kbVy||0)**2);
                const spread = kbSpd * 0.6;
                other.wx += (odx / od) * spread;
                other.wy += (ody / od) * spread;
                other.wx = clamp(other.wx, 0.05, 0.95);
                other.wy = clamp(other.wy, 0.05, 0.95);
            }
        }
        // 감속
        e._kbVx *= 0.88;
        e._kbVy *= 0.88;
        e.wx = clamp(e.wx, 0.05, 0.95);
        e.wy = clamp(e.wy, 0.05, 0.95);
        e.aiState = "idle";
        return;
    }

    // 전투 중이면 몬스터를 향해 돌진
    if (isFighting && state.monster && state.monster.hp > 0) {
        e.aiState = "walk";
        const dx = state.monster.wx - e.wx;
        const dy = state.monster.wy - e.wy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const attackRange = 0.12; // 공격 사거리

        if (dist > attackRange) {
            // 돌진
            const speed = typeof e.activity !== "undefined" ? getEeveeSpeed(e) * 1.5 : 0.001;
            e.vx = (dx / dist) * speed;
            e.vy = (dy / dist) * speed * 0.7;
            e.wx += e.vx;
            e.wy += e.vy;
            e.facing = dx > 0 ? 1 : -1;
        } else {
            // 공격 범위 내 - 약간 흔들리며 공격 모션
            e.aiState = "attack";
            const jitter = Math.sin(frame * 0.15 + e.wx * 100) * 0.008;
            e.wx += jitter;
            e.wy += Math.sin(frame * 0.1 + e.wy * 80) * 0.003;
            e.facing = dx > 0 ? 1 : -1;
        }

        // 이브이끼리 충돌 밀어내기 (강화)
        const allFighters = [];
        if (state.currentEevee && !isOnExpedition("current")) allFighters.push(state.currentEevee);
        state.farm.forEach((f, i) => { if (!isOnExpedition(i)) allFighters.push(f); });
        for (const other of allFighters) {
            if (other === e) continue;
            const odx = e.wx - other.wx;
            const ody = e.wy - other.wy;
            const oDist = Math.sqrt(odx * odx + ody * ody);
            if (oDist < 0.09 && oDist > 0.001) {
                const push = 0.005;
                e.wx += (odx / oDist) * push;
                e.wy += (ody / oDist) * push;
                other.wx -= (odx / oDist) * push * 0.5;
                other.wy -= (ody / oDist) * push * 0.5;
            }
        }

        e.wx = clamp(e.wx, 0.05, 0.95);
        e.wy = clamp(e.wy, 0.05, 0.95);
        return;
    }

    // 몬스터 없거나 파견 중이면 기존 AI
    e.aiTimer--;
    if (e.aiTimer <= 0) {
        const walkChance = isNight ? 0.15 + actRatio * 0.35 : 0.3 + actRatio * 0.5;
        const sleepChance = isNight ? 0.5 - actRatio * 0.3 : 0.05;
        const r = Math.random();
        if (r < sleepChance) e.aiState = "sleep";
        else if (r < sleepChance + (1 - sleepChance - walkChance)) e.aiState = "idle";
        else e.aiState = "walk";

        e.aiTimer = Math.random() * 200 + 100;
        if (e.aiState === "walk") {
            const angle = Math.random() * Math.PI * 2;
            const speed = typeof e.activity !== "undefined" ? getEeveeSpeed(e) : (Math.random() * 0.001 + 0.0005);
            e.vx = Math.cos(angle) * speed;
            e.vy = Math.sin(angle) * speed * 0.5;
        }
    }
    if (e.aiState === "walk") {
        e.wx += e.vx;
        e.wy += e.vy;
        e.facing = e.vx > 0 ? 1 : e.vx < 0 ? -1 : e.facing;
        e.wx = clamp(e.wx, 0.05, 0.95);
        e.wy = clamp(e.wy, 0.05, 0.95);
        if (e.wx <= 0.06 || e.wx >= 0.94) e.vx = -e.vx;
        if (e.wy <= 0.06 || e.wy >= 0.94) e.vy = -e.vy;
    }
}

function updateFarmEntities() {
    const isNight = state.timeOfDay === "night";

    // 스태미나 시스템 폐지됨 (출정 시스템으로 대체)

    // 리피아 광합성: 농장 대기 시 활동성 서서히 회복
    for (let fi = 0; fi < state.farm.length; fi++) {
        const e = state.farm[fi];
        const evo = _getEvo(e.evoId);
        if (evo && evo.abilityTag === "leafeon" && !isOnExpedition(fi)) {
            e.activity = Math.min(getActivityMax(), (e.activity || 0) + 0.005);
        }
    }

    // 기본 이브이: 주변 이브이 활동성 미약 회복
    if (state.currentEevee && !isOnExpedition("current")) {
        for (let fi = 0; fi < state.farm.length; fi++) {
            if (isOnExpedition(fi)) continue;
            const other = state.farm[fi];
            const dx = state.currentEevee.wx - other.wx, dy = state.currentEevee.wy - other.wy;
            if (dx * dx + dy * dy < 0.04) {
                other.activity = Math.min(getActivityMax(), (other.activity || 0) + 0.001);
            }
        }
    }

    // 님피아 매력: 주변 이브이 활동성 소량 회복
    for (let fi = 0; fi < state.farm.length; fi++) {
        const e = state.farm[fi];
        const evo = _getEvo(e.evoId);
        if (evo && evo.abilityTag === "sylveon" && !isOnExpedition(fi)) {
            // 근처 이브이들 활동성 회복
            for (const other of state.farm) {
                if (other === e) continue;
                const dx = e.wx - other.wx, dy = e.wy - other.wy;
                if (dx * dx + dy * dy < 0.04) { // 반경 0.2
                    other.activity = Math.min(getActivityMax(), (other.activity || 0) + 0.003);
                }
            }
            if (state.currentEevee) {
                const dx = e.wx - state.currentEevee.wx, dy = e.wy - state.currentEevee.wy;
                if (dx * dx + dy * dy < 0.04) {
                    state.currentEevee.activity = Math.min(getActivityMax(), (state.currentEevee.activity || 0) + 0.003);
                }
            }
        }
    }

    // 현재 이브이 AI (파견 안 갔으면 전투)
    if (state.currentEevee && !isOnExpedition("current")) {
        updateEeveeAI(state.currentEevee, isNight, true);
    }

    // 수집된 이브이 AI
    for (let fi = 0; fi < state.farm.length; fi++) {
        const fighting = !isOnExpedition(fi);
        updateEeveeAI(state.farm[fi], isNight, fighting);
    }

    // 바닥 진화아이템 근처 진화이브이 활동성 1.5배 부스트
    for (const item of state.farmItems) {
        const isFruit = FRUITS.includes(item.name);
        const affinityEvo = EVO_ITEM_AFFINITY[item.name];
        const isRock = ["이끼바위조각","이끼바위","얼음바위조각","얼음바위"].includes(item.name);
        const isStone = ["물의돌","천둥의돌","불꽃의돌"].includes(item.name);
        for (const e of state.farm) {
            let match = false;
            if (affinityEvo && e.evoId === affinityEvo) match = true;
            if (e.evoId === "fighting" && !isFruit) match = true;   // 격투: 모든 아이템
            if (e.evoId === "ground" && isRock) match = true;       // 땅: 바위계열
            if (e.evoId === "steel" && isStone) match = true;       // 강철: 모든 돌
            if (!match) continue;
            const dx = item.wx - e.wx, dy = item.wy - e.wy;
            if (dx * dx + dy * dy < 0.0225) { // 0.15²
                e._activityBoost = 1.5;
            }
        }
    }

    // 비행: 낮에 부스트, 고스트: 밤에 부스트 (아이템 무관)
    for (const e of state.farm) {
        if (e.evoId === "flying" && !isNight) e._activityBoost = 1.5;
        if (e.evoId === "ghost" && isNight) e._activityBoost = 1.5;
    }

    // 이브이 간 충돌 밀어내기
    const allEevees = [...state.farm];
    if (state.currentEevee) allEevees.push(state.currentEevee);
    for (let i = 0; i < allEevees.length; i++) {
        for (let j = i + 1; j < allEevees.length; j++) {
            const a = allEevees[i], b = allEevees[j];
            const dx = b.wx - a.wx, dy = b.wy - a.wy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const minDist = 0.08;
            if (dist < minDist && dist > 0.001) {
                const nx = dx / dist, ny = dy / dist;
                const overlap = (minDist - dist) * 0.5;
                a.wx -= nx * overlap; a.wy -= ny * overlap;
                b.wx += nx * overlap; b.wy += ny * overlap;
                a.wx = clamp(a.wx, 0.05, 0.95); a.wy = clamp(a.wy, 0.05, 0.95);
                b.wx = clamp(b.wx, 0.05, 0.95); b.wy = clamp(b.wy, 0.05, 0.95);
            }
        }
    }

    // 아이템 간 충돌 (최대 30개까지만 체크)
    const itemLen = Math.min(state.farmItems.length, 30);
    for (let i = 0; i < itemLen; i++) {
        for (let j = i + 1; j < itemLen; j++) {
            const a = state.farmItems[i], b = state.farmItems[j];
            const dx = b.wx - a.wx, dy = b.wy - a.wy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const minDist = 0.04;
            if (dist < minDist && dist > 0.001) {
                const nx = dx / dist, ny = dy / dist;
                const overlap = (minDist - dist) * 0.5;
                a.wx -= nx * overlap; a.wy -= ny * overlap;
                b.wx += nx * overlap; b.wy += ny * overlap;
                // 속도 교환 + 반발
                const relV = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
                if (relV < 0) {
                    a.vx += nx * relV * 0.5; a.vy += ny * relV * 0.5;
                    b.vx -= nx * relV * 0.5; b.vy -= ny * relV * 0.5;
                }
            }
        }
    }

    // 바닥 아이템 물리 + 진화이브이 자동 섭취
    for (let fi = state.farmItems.length - 1; fi >= 0; fi--) {
        const item = state.farmItems[fi];
        item.wx += item.vx;
        item.wy += item.vy;
        item.vx *= 0.95;
        item.vy *= 0.95;
        if (item.wx <= 0.05 || item.wx >= 0.95) item.vx = -item.vx * 0.7;
        if (item.wy <= 0.05 || item.wy >= 0.95) item.vy = -item.vy * 0.7;
        item.wx = clamp(item.wx, 0.05, 0.95);
        item.wy = clamp(item.wy, 0.05, 0.95);

        let eaten = false;
        const isFruit = FRUITS.includes(item.name);

        const allEe = [...state.farm];
        if (state.currentEevee) allEe.push(state.currentEevee);

        for (const e of allEe) {
            const dx = item.wx - e.wx, dy = item.wy - e.wy;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 0.08) {
                const isFarmEevee = state.farm.includes(e);
                if (isFruit && isFarmEevee && e.aiState === "walk" && (e.activity || 0) < getActivityMax() && Math.random() < 0.15) {
                    // 진화 이브이가 열매 자동 섭취 (15% 확률)
                    let delta = ACTIVITY_FRUIT_NEUTRAL;
                    let reaction = "neutral";
                    if (item.name === e.likedFruit) { delta = ACTIVITY_FRUIT_LIKED; reaction = "liked"; }
                    else if (item.name === e.dislikedFruit) { delta = ACTIVITY_FRUIT_DISLIKED; reaction = "disliked"; }
                    e.activity = clamp((e.activity || 0) + delta, 0, getActivityMax());
                    const scr = worldToScreen(e.wx, e.wy);
                    state.feedbackAnim = { type: reaction, timer: 50, x: scr.sx, y: scr.sy - 20 };
                    state.farmItems.splice(fi, 1);
                    eaten = true;
                    queueSave();
                    break;
                } else if (!isFruit && isFarmEevee && e.aiState === "walk" && (e.activity || 0) < getActivityMax()) {
                    // 진화 이브이가 관련 아이템 섭취 → 활동성 증가
                    const affinity = EVO_ITEM_AFFINITY[item.name];
                    const isRock = ["이끼바위조각","이끼바위","얼음바위조각","얼음바위"].includes(item.name);
                    const isStone = ["물의돌","천둥의돌","불꽃의돌"].includes(item.name);
                    let canEat = (affinity && e.evoId === affinity);
                    if (e.evoId === "fighting") canEat = true;
                    if (e.evoId === "ground" && isRock) canEat = true;
                    if (e.evoId === "steel" && isStone) canEat = true;
                    if (canEat) {
                        e.activity = clamp((e.activity || 0) + ACTIVITY_FRUIT_LIKED, 0, getActivityMax());
                        const scr = worldToScreen(e.wx, e.wy);
                        state.feedbackAnim = { type: "liked", timer: 50, x: scr.sx, y: scr.sy - 20 };
                        state.farmItems.splice(fi, 1);
                        eaten = true;
                        queueSave();
                        break;
                    }
                }
                if (!eaten && dist > 0.001) {
                    // 밀어내기 (겹침 방지)
                    const nx = dx / dist, ny = dy / dist;
                    const push = 0.012;
                    item.vx += nx * push;
                    item.vy += ny * push;
                }
            }
        }
    }
}

/* ═══════════════════════════════════════════
   6. EVOLUTION CHECK
   ═══════════════════════════════════════════ */
function checkEvolution() {
    const ee = state.currentEevee;
    if (!ee) return null; // 이브이 없으면 진화 불가
    const tod = state.timeOfDay;
    for (const evo of EVOS) {
        if (state.collected.has(evo.id)) continue;
        if (evo.postGame && !base8Complete()) continue;
        let match = false;
        switch (evo.condition) {
            case "stone":
                match = state._deliveredItem === evo.stone;
                if (evo.postGame) match = match && ee.friendship >= FRIENDSHIP.max;
                break;
            case "friendship_day": match = ee.friendship >= FRIENDSHIP.max && tod === "day"; break;
            case "friendship_night": match = ee.friendship >= FRIENDSHIP.max && tod === "night"; break;
            case "craft": match = state._deliveredItem === evo.craft; break;
            case "friendship_item": match = ee.friendship >= FRIENDSHIP.max && state._deliveredItem === evo.item; break;
            case "friendship_zero_night": match = ee.friendship <= 0 && tod === "night"; break;
            case "explore_count": match = state.totalExplores >= 30 && ee.friendship >= FRIENDSHIP.max; break;
            case "ground_stone": match = hasItem("부드러운모래") && ee.friendship >= FRIENDSHIP.max && state.totalExplores >= 10; break;
            case "rock_craft": match = (state._globalRepeat || 0) >= 3 && ee.friendship >= FRIENDSHIP.max && hasItem("이끼바위") && hasItem("얼음바위"); break;
            case "flying_feather":
                // 에어리아: 친밀도 MAX + 바람깃털 전달 + 모든 지역 1회 이상 방문 (글로벌)
                const allLocs = LOCATIONS.filter(l => isLocationUnlocked(l));
                const globalVisited = new Set();
                const allEv = [...state.farm];
                if (state.currentEevee) allEv.push(state.currentEevee);
                for (const e of allEv) { if (e.visitedLocations) e.visitedLocations.forEach(v => globalVisited.add(v)); }
                const allVisited = allLocs.length > 0 && allLocs.every(l => globalVisited.has(l.id));
                match = state._deliveredItem === "바람깃털" && ee.friendship >= FRIENDSHIP.max && allVisited;
                break;
            case "four_stones":
                match = ["물의돌","불꽃의돌","천둥의돌","부드러운모래"].every(s => hasItem(s)) && ee.friendship >= FRIENDSHIP.max;
                break;
            case "dragon":
                match = state.collected.has("gmax") && state.collected.has("mega") && state._deliveredItem === "용의비늘" && ee.friendship >= FRIENDSHIP.max;
                break;
            case "poison_evo":
                match = state._deliveredItem === "독바늘" && ee.friendship >= FRIENDSHIP.max;
                break;
            case "bug_evo":
                match = state._deliveredItem === "벌레껍질" && ee.friendship >= FRIENDSHIP.max;
                break;
        }
        if (match) {
            // 아이템은 feedItem에서 이미 제거됨 → 중복 제거 안 함
            return evo;
        }
    }
    return null;
}

function isLocationUnlocked(loc) {
    if (loc.dexReq && state.collected.size < loc.dexReq) return false;
    return true;
}

const LOCATIONS_PER_TURN = 3; // 턴당 제공되는 탐색지 수

function getAllAvailableLocations() {
    return LOCATIONS.filter(loc => {
        if (!isLocationUnlocked(loc)) return false;
        if (loc.time === "day" && state.timeOfDay !== "day") return false;
        if (loc.time === "night" && state.timeOfDay !== "night") return false;
        return true;
    });
}

function rollTurnLocations() {
    const all = getAllAvailableLocations();
    // 셔플 후 N개 선택
    for (let i = all.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [all[i], all[j]] = [all[j], all[i]];
    }
    state.turnLocations = all.slice(0, Math.min(LOCATIONS_PER_TURN, all.length));
}



/* ═══════════════════════════════════════════
   7. TURN LOGIC
   ═══════════════════════════════════════════ */
function triggerEvolution(evo) {
    state.collected.add(evo.id);
    state.evolvingEvo = evo;
    state.evolvingTimer = 0;
    state.scene = "evolving";
    state.panel = null;
    addFarmEevee(evo.id);

    // 기본 8종 완성 시 알림 + 스태미나 확장
    if (!state.base8Notified && base8Complete()) {
        state.base8Notified = true;
        state._base8Alert = true;
    }
}

// 실시간 밤낮 전환 (3분 주기)
const DAY_NIGHT_INTERVAL = 80 * 1000; // 80초(밀리초)
let lastDayNightCheck = Date.now();
function updateDayNight() {
    const now = Date.now();
    if (now - lastDayNightCheck < DAY_NIGHT_INTERVAL) return;
    lastDayNightCheck = now;
    // 전환 전 시간대로 진화 체크 (밤 조건 등)
    const evoBefore = checkEvolution();
    if (evoBefore) { triggerEvolution(evoBefore); }
    // 밤낮 전환
    state.timeOfDay = state.timeOfDay === "day" ? "night" : "day";
    invalidateBgCache();
    rollTurnLocations();
    state.hintUsed = false;
    state.exploreRefresh = Math.min(getRefreshMax(), (state.exploreRefresh || 0) + 1); // 밤낮 전환 +1
    state._deliveredItem = null;
    showMessage(state.timeOfDay === "day" ? "☀️ 낮이 되었다!" : "🌙 밤이 되었다!", 90);
    // 전환 후 시간대로도 진화 체크 (낮 조건 등)
    if (!evoBefore) {
        const evoAfter = checkEvolution();
        if (evoAfter) triggerEvolution(evoAfter);
    }
    saveGame();
}

function finishPostEvolution() {
    // 이브이 자동 추가 제거 → 둥지에서 수동 소환
    state.currentEevee = null;
    state._deliveredItem = null;
    saveGame();
}

// 둥지: 이브이 소환
function getNestCost() { return 2 + state.collected.size * 2; } // 기본 2 + 도감당 2개
function getExpSlots() {
    const c = state.collected.size;
    if (c >= 12) return 4;
    if (c >= 8) return 3;
    if (c >= 5) return 2;
    return 1;
}
function canSummonEevee() {
    return !state.currentEevee;
}
function summonEevee() {
    if (!canSummonEevee()) return;
    // 열매 비용 (아무 열매나 합산)
    let totalFruit = 0;
    for (const f of FRUITS) totalFruit += itemCount(f);
    if (totalFruit < getNestCost()) {
        showMessage(`열매가 부족합니다 (${totalFruit}/${getNestCost()})`, 90);
        return;
    }
    // 열매 차감 (랜덤 선택)
    let remaining = getNestCost();
    while (remaining > 0) {
        const available = FRUITS.filter(f => itemCount(f) > 0);
        if (available.length === 0) break;
        const pick = available[Math.floor(Math.random() * available.length)];
        removeItem(pick);
        remaining--;
    }
    resetCurrentEevee();
    state.scene = "new_eevee";
    state.newEeveeTimer = 0;
    state.currentEevee.wx = 0.4 + Math.random() * 0.2;
    state.currentEevee.wy = 1.15;
    showMessage("새 이브이가 왔다!", 90);
    saveGame();
}

function startGame() {
    state._deliveredItem = null;
    rollTurnLocations();
    state.scene = "farm";
}

/* ═══════════════════════════════════════════
   7-1. SAVE / LOAD
   ═══════════════════════════════════════════ */
const SAVE_KEY = "eevee_farm_save";

let _saveQueued = false;
function queueSave() {
    if (_saveQueued) return;
    _saveQueued = true;
    setTimeout(() => { _saveQueued = false; saveGame(); }, 500);
}
function saveGame() {
    try {
        const data = {
            timeOfDay: state.timeOfDay,
            totalExplores: state.totalExplores,
            collected: [...state.collected],
            inventory: { ...state.inventory },
            currentEevee: state.currentEevee ? {
                friendship: state.currentEevee.friendship,
                activity: state.currentEevee.activity || 0,
                likedFruit: state.currentEevee.likedFruit,
                dislikedFruit: state.currentEevee.dislikedFruit,
                knownLiked: state.currentEevee.knownLiked,
                knownDisliked: state.currentEevee.knownDisliked,
                exploreCount: state.currentEevee.exploreCount,
                lastLocation: state.currentEevee.lastLocation,
                repeatCount: state.currentEevee.repeatCount,
                visitedLocations: [...(state.currentEevee.visitedLocations || [])],
            } : null,
            farm: state.farm.map(e => ({
                evoId: e.evoId,
                activity: e.activity || 0,
                likedFruit: e.likedFruit,
                dislikedFruit: e.dislikedFruit,
                visitedLocations: [...(e.visitedLocations || [])],
            })),
            farmItems: state.farmItems.map(i => ({ name: i.name, wx: i.wx, wy: i.wy })),
            hintUsed: state.hintUsed || false,
            hintBoosts: state.hintBoosts || [],
            base8Notified: state.base8Notified,
            monsterMaxStage: state.monsterMaxStage || 0,
            monsterStage: state.monsterStage || 0,
            monster: state.monster || null,
            unlockedByBattle: [...(state.unlockedByBattle || [])],
            expeditions: (state.expeditions || []).map(e => ({ ...e })),
            // expeditionSlots는 getExpSlots()로 동적 계산
            endingShown: state.endingShown || false,
            playerName: state.playerName || "",
            playerId: state.playerId || "",
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    } catch (e) { console.warn("세이브 실패:", e); }
}

function loadGame() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);

        state.timeOfDay = data.timeOfDay || "day";
        state.totalExplores = data.totalExplores || 0;
        state.collected = new Set(data.collected || []);
        state.inventory = data.inventory || {};
        state.hintUsed = data.hintUsed || false;
        state.hintBoosts = data.hintBoosts || [];
        state.base8Notified = data.base8Notified || false;
        state.monsterMaxStage = data.monsterMaxStage || 0;
        state.monsterStage = data.monsterStage || data.monsterMaxStage || 0;
        state.monster = data.monster || null;
        // 몬스터 타이머 리셋 (로드 시 제한시간 새로 부여)
        if (state.monster) {
            state.monsterTimer = Date.now();
            const bc = Math.floor((state.monsterMaxStage || 0) / 10);
            state.monsterTimeLimit = (60 + bc * 5) * 1000 * (state.monster.isBoss ? 1.5 : 1);
        }
        state.unlockedByBattle = new Set(data.unlockedByBattle || []);
        state.expeditions = data.expeditions || [];
        // expeditionSlots는 getExpSlots()로 동적 계산
        state.endingShown = data.endingShown || false;
        state.playerName = data.playerName || "";
        state.playerId = data.playerId || "";

        // 현재 이브이 복원
        if (data.currentEevee) {
            const ce = data.currentEevee;
            state.currentEevee = {
                friendship: clamp(ce.friendship, -5, FRIENDSHIP.max + 5),
                activity: Math.min(ce.activity || 5, ACTIVITY_BASE_MAX),
                likedFruit: ce.likedFruit,
                dislikedFruit: ce.dislikedFruit,
                knownLiked: ce.knownLiked,
                knownDisliked: ce.knownDisliked,
                exploreCount: ce.exploreCount || 0,
                lastLocation: ce.lastLocation,
                repeatCount: ce.repeatCount || 0,
                visitedLocations: new Set(ce.visitedLocations || []),
                wx: 0.5, wy: 0.5, vx: 0, vy: 0,
                facing: 1, aiState: "idle", aiTimer: 80,
            };
        }

        // 농장 이브이 복원
        state.farm = (data.farm || []).map(e => {
            const evo = EVOS.find(ev => ev.id === e.evoId);
            const liked = e.likedFruit || FRUITS[Math.floor(Math.random() * FRUITS.length)];
            let disliked = e.dislikedFruit;
            if (!disliked) { do { disliked = FRUITS[Math.floor(Math.random() * FRUITS.length)]; } while (disliked === liked); }
            return {
                evoId: e.evoId,
                sprite: evo ? evo.img : "이브이.png",
                activity: Math.min(e.activity || 0, ACTIVITY_BASE_MAX),
                likedFruit: liked,
                dislikedFruit: disliked,
                visitedLocations: new Set(e.visitedLocations || []),
                wx: 0.15 + Math.random() * 0.7,
                wy: 0.15 + Math.random() * 0.7,
                vx: 0, vy: 0,
                facing: Math.random() > 0.5 ? 1 : -1,
                aiState: "idle", aiTimer: 30 + Math.random() * 60,
            };
        });

        // 중복 기본이브이 보정: farm에 evoId=null이 있으면서 currentEevee도 있으면 farm쪽 제거
        if (state.currentEevee) {
            const nullCount = state.farm.filter(e => !e.evoId).length;
            if (nullCount > 0) {
                const idx = state.farm.findIndex(e => !e.evoId);
                if (idx !== -1) state.farm.splice(idx, 1);
            }
        }

        // 바닥 아이템 복원
        state.farmItems = (data.farmItems || []).map(i => ({
            name: i.name, wx: i.wx, wy: i.wy, vx: 0, vy: 0,
        }));

        // 탐색지 재배치
        rollTurnLocations();
        invalidateBgCache();
        lastDayNightCheck = Date.now(); // 밤낮 타이머 리셋
        state.scene = "farm";
        state.panel = null;
        state.popup = null;
        return true;
    } catch (e) {
        console.warn("로드 실패:", e);
        return false;
    }
}

function deleteSave() {
    localStorage.removeItem(SAVE_KEY);
    // state 초기화
    state.scene = "title";
    state.panel = null; state.panelSlide = 0;
    state.popup = null; state.popupTimer = 0;

function hasSave() {

}

function generatePlayerId() {

}

function submitScore() {

    const body = {
        name: state.playerName,
        id: state.playerId,
        stage: state.monsterMaxStage,
        collected: state.collected.size,
    };

        method: "POST",
        body: JSON.stringify(body),
    }).catch(e => console.warn("리더보드 업로드 실패:", e));

function fetchLeaderboard() {
    // 로딩 팝업 표시
    state.popup = { type: "leaderboard_loading" };
    state.popupTimer = 0;
    fetch(LB_URL)
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                state.leaderboard = data.data.slice(0, 10);
                state.popup = { type: "leaderboard" };
                state.popupTimer = 0;
            } else {
                state.popup = null;
                showMessage("리더보드 조회 실패", 90);

        })
        .catch(e => {
            state.popup = null;
            showMessage("리더보드 조회 실패", 90);
            console.warn(e);
        });
}

const TYPE_ADVANTAGE = {

    "드래곤": ["드래곤"], "땅": ["전기","불","강철"], "바위": ["불","비행","얼음"],

// 적 타입 풀 (스테이지 적 타입 생성용)

// 체력 낮고 속도 낮은 순으로 배치 (초반 4종 해금, 보스 클리어마다 +1종)
const UB_MONSTERS = [

// 재앙의보물 (10스테이지마다 보스)
const BOSS_MONSTERS = [
    { name:"총지엔",   img:"mon/총지엔.png",   types:["악","풀"],    spd:85 },
    { name:"파오젠",   img:"mon/파오젠.png",   types:["악","얼음"],  spd:135 },
    { name:"딩루",     img:"mon/딩루.png",     types:["악","땅"],    spd:45 },
    { name:"위유이",   img:"mon/위유이.png",   types:["악","불"],    spd:100 },
];

// 몬스터 생성
function spawnMonster(stage) {
    const isBoss = stage % 10 === 0;
    let mon;
    const prevName = state.monster ? state.monster.name : "";
    if (isBoss) {
        const pool = BOSS_MONSTERS.filter(m => m.name !== prevName);
        mon = pool[Math.floor(Math.random() * pool.length)];
    } else {
        // 보스 클리어 수에 따라 해금 (초반 4종 + 보스 클리어당 1종)
        const bossClears = Math.floor((state.monsterMaxStage || 0) / 10);
        const unlocked = Math.min(4 + bossClears, UB_MONSTERS.length);
        const available = UB_MONSTERS.slice(0, unlocked);
        const pool = available.filter(m => m.name !== prevName);
        mon = pool[Math.floor(Math.random() * pool.length)];
    }
    const hpMult = isBoss ? 3.0 : 1.0;
    const maxHp = Math.floor((30 + stage * 25 + Math.pow(stage, 1.6) * 5) * hpMult);
    state.monster = {
        name: mon.name, img: mon.img, types: mon.types,
        stage, maxHp, hp: maxHp, isBoss,
        spd: mon.spd || 60,
        wx: 0.2 + Math.random() * 0.6,
        wy: 0.15 + Math.random() * 0.5,
        targetItem: null, // 목표 열매 인덱스
        _slowTimer: 0, _pushCooldown: 0,
    };
    state.monsterStage = stage;
    state.monsterSpawnAnim = 90;
    state.monsterTimer = Date.now();
    const bossClears = Math.floor((state.monsterMaxStage || 0) / 10);
    state.monsterTimeLimit = (60 + bossClears * 5) * 1000 * (isBoss ? 1.5 : 1); // ms
}

// 다중 타입 상성 계산 (몬스터가 2타입일 수 있음)
function calcTypeMultVsMonster(attackType, monsterTypes) {
    let mult = 1.0;
    for (const dt of monsterTypes) {
        const adv = TYPE_ADVANTAGE[attackType] || [];
        if (adv.includes(dt)) mult *= 1.4;
        const defAdv = TYPE_ADVANTAGE[dt] || [];
        if (defAdv.includes(attackType)) mult *= 0.65;
    }
    return mult;
}

// 이브이 DPS 계산 (초당 데미지)
const _evoCache = {};
function _getEvo(id) { return _evoCache[id] || (_evoCache[id] = EVOS.find(e => e.id === id) || null); }

function calcEeveeDPS(eevee) {
    const evo = _getEvo(eevee.evoId);
    const type = evo ? evo.type : "무";
    const tag = evo ? evo.abilityTag : "";
    let basePower = 1.0;
    if (tag === "battle_noweakness") basePower = 1.8;  // 거다이브
    else if (tag === "battle_alladvantage") basePower = 2.2; // 메가브이
    if (!evo) basePower = 0.5; // 기본 이브이
    if (state.endingShown) basePower += 0.5;

    const act = Math.min(eevee.activity || 0, ACTIVITY_BASE_MAX);
    let dps = basePower + act * 0.3;

    // 상성 보정 (다중 타입)
    if (state.monster && state.monster.types) {
        let mult = calcTypeMultVsMonster(type, state.monster.types);
        if (tag === "battle_noweakness" && mult < 1) mult = 1.0;
        if (tag === "battle_alladvantage") mult = Math.max(mult, 1.5);
        dps *= mult;
    }

    // 고유 능력
    if (tag === "battle_dmg") dps *= 1.3;
    if (tag === "battle_combo") dps *= 1 + Math.min((eevee._comboStacks || 0) * 0.02, 0.5); // 파이티아: 콤보 누적
    if (tag === "battle_sturdy") dps *= 1.15; // 록키온: DPS +15%
    if (tag === "battle_fixed") dps += 2;
    // maxHp 비례 능력: 상한 캡 (기본 DPS의 3배까지)
    const hpCap = dps * 3;
    if (tag === "battle_curse" && state.monster) dps += Math.min(state.monster.maxHp * 0.005, hpCap);
    if (tag === "leafeon" && state.monster) dps += Math.min(state.monster.maxHp * 0.003, hpCap);
    if (tag === "sylveon") dps *= 1.2;
    if (tag === "battle_dot" && state.monster) dps += Math.min(state.monster.maxHp * 0.01, hpCap); // 바이퍼스: 매초 최대HP 1%
    if (tag === "battle_swarm") dps *= 1 + getFighterCount() * 0.05; // 하이버: 마리당 +5%

    return dps;
}

function typeMultiplier(attackType, defendType) {
    const adv = TYPE_ADVANTAGE[attackType] || [];
    if (adv.includes(defendType)) return 1.5;
    const defAdv = TYPE_ADVANTAGE[defendType] || [];
    if (defAdv.includes(attackType)) return 0.6;
    return 1.0;
}

// 농장 전투 업데이트 (매 프레임 호출)
function updateFarmBattle() {
    // 게임오버 연출 중
    if (state.gameOverAnim > 0) {
        state.gameOverAnim--;
        if (state.gameOverAnim <= 0) {
            // 리셋 후 재시작 (마지막 보스 클리어 이후부터)
            spawnMonster((state.monsterMaxStage || 0) + 1);
        }
        return;
    }
    if (!state.monster) {
        spawnMonster((state.monsterMaxStage || 0) + 1);
        return;
    }
    // 등장 애니메이션 중
    if (state.monsterSpawnAnim > 0) {
        state.monsterSpawnAnim--;
        return;
    }
    // 처치 연출 중
    if (state.monsterKillAnim > 0) {
        state.monsterKillAnim--;
        if (state.monsterKillAnim <= 0) {
            // 처치 연출 완료 → 다음 몬스터
            if (state.monsterReward) {
                showMessage(`🎉 ${state.monsterReward}`, 180);
                state.monsterReward = null;
            }
            spawnMonster(state.monsterMaxStage + 1);
            saveGame();
        }
        return;
    }

    const mon = state.monster;
    const mw = mon.wx, mh = mon.wy;

    // ── 몬스터 AI: 가장 가까운 열매를 향해 이동 ──
    const stageBonus = 1 + Math.min(mon.stage * 0.01, 0.5); // 스테이지당 +1%, 최대 +50%
    const slowMult = (mon._slowTimer > 0) ? 0.4 : 1.0; // 글레이시아 슬로우
    const monSpeed = (mon.spd / 80000) * 1.2 * stageBonus * (mon.isBoss ? 0.7 : 1.0) * slowMult;
    let targetX = 0.5, targetY = 0.5;
    let foundFruit = false;
    if (state.farmItems.length > 0) {
        // 가장 가까운 열매 찾기
        let minDist = Infinity;
        for (const item of state.farmItems) {
            if (!FRUITS.includes(item.name)) continue;
            const d = Math.sqrt((item.wx - mw) ** 2 + (item.wy - mh) ** 2);
            if (d < minDist) { minDist = d; targetX = item.wx; targetY = item.wy; foundFruit = true; }
        }
    }
    if (!foundFruit) {
        // 열매 없으면 넓게 배회
        targetX = 0.5 + Math.sin(frame * 0.003 + mon.stage * 7) * 0.35;
        targetY = 0.4 + Math.cos(frame * 0.004 + mon.stage * 5) * 0.25;
    }
    const mdx = targetX - mw, mdy = targetY - mh;
    const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
    if (mDist > 0.01) {
        mon.wx += (mdx / mDist) * monSpeed;
        mon.wy += (mdy / mDist) * monSpeed * 0.7; // y축은 더 느리게 (원근감)
    }
    mon.wx = clamp(mon.wx, 0.08, 0.92);
    mon.wy = clamp(mon.wy, 0.08, 0.85);

    // 몬스터와 열매 충돌 = 공격 (접촉 시 HP 깎기 + 밀어내기)
    for (let fi = state.farmItems.length - 1; fi >= 0; fi--) {
        const item = state.farmItems[fi];
        if (!FRUITS.includes(item.name)) continue;
        const fdx = item.wx - mon.wx, fdy = item.wy - mon.wy;
        const d = Math.sqrt(fdx * fdx + fdy * fdy);
        if (d < 0.05) {
            if (item.hp == null) item.hp = 2;
            if (item._hitCooldown == null) item._hitCooldown = 0;
            if (item._hitCooldown > 0) { item._hitCooldown--; }
            // 충돌 시 밀어내기 (열매가 튕겨남)
            if (d > 0.001) {
                const pushF = 0.02;
                item.vx += (fdx / d) * pushF;
                item.vy += (fdy / d) * pushF;
            }
            // 쿨다운 지나면 데미지 (항상 1 고정)
            if (item._hitCooldown <= 0) {
                item.hp -= 1;
                item._hitCooldown = 45; // 0.75초 쿨다운
                item.damaged = true; // 반짝이 이펙트 제거용
                if (item.hp <= 0) {
                    // 삭제 이펙트 추가
                    const scr = worldToScreen(item.wx, item.wy);
                    if (!state.fruitDestroyFx) state.fruitDestroyFx = [];
                    state.fruitDestroyFx.push({ x: scr.sx, y: scr.sy, timer: 45, emoji: itemEmoji(item.name) });
                    state.farmItems.splice(fi, 1);
                    // 열매 파괴 시 몬스터 최대체력 10% 회복
                    mon.hp = Math.min(mon.hp + mon.maxHp * 0.1, mon.maxHp);
                }
            }
        }
    }

    // ── 몬스터가 이브이를 밀어냄 (넉백, 쿨다운 있음) ──
    const allEe = [];
    if (state.currentEevee && !isOnExpedition("current")) allEe.push(state.currentEevee);
    state.farm.forEach((e, i) => { if (!isOnExpedition(i)) allEe.push(e); });

    if (!mon._pushCooldown) mon._pushCooldown = 0;
    if (mon._pushCooldown > 0) {
        mon._pushCooldown--;
    } else {
        const pushRadius = 0.14;
        let pushed = false;
        for (const ee of allEe) {
            if (ee._knockback > 0) continue;
            const evo = _getEvo(ee.evoId);
            const eeTag = evo ? evo.abilityTag : "";
            // 록키온: 넉백 무효
            if (eeTag === "battle_sturdy") continue;
            const edx = ee.wx - mon.wx, edy = ee.wy - mon.wy;
            const eDist = Math.sqrt(edx * edx + edy * edy);
            if (eDist < pushRadius && eDist > 0.001) {
                let kbPower = 0.07;
                // 거다이브: 넉백 50% 감소
                if (eeTag === "battle_noweakness") kbPower *= 0.5;
                ee._kbVx = (edx / eDist) * kbPower;
                ee._kbVy = (edy / eDist) * kbPower * 0.7;
                ee._knockback = 30;
                pushed = true;
            }
        }
        if (pushed) mon._pushCooldown = mon.isBoss ? 180 : 120;
    }

    // ── 근접 이브이만 DPS 계산 ──
    const atkRange = 0.15;
    let totalDPS = 0;
    let hasGlaceon = false;
    for (const ee of allEe) {
        const edx = ee.wx - mon.wx, edy = ee.wy - mon.wy;
        const inRange = edx * edx + edy * edy < atkRange * atkRange;
        if (inRange) {
            totalDPS += calcEeveeDPS(ee);
            const evo = _getEvo(ee.evoId);
            const eeTag = evo ? evo.abilityTag : "";
            // 파이티아: 콤보 누적 (공격 범위 내 매 프레임 +1)
            if (eeTag === "battle_combo") ee._comboStacks = Math.min((ee._comboStacks || 0) + 0.05, 25);
            // 글레이시아: 슬로우 체크
            if (eeTag === "battle_slow") hasGlaceon = true;
        } else {
            // 범위 밖이면 콤보 리셋
            const evo = _getEvo(ee.evoId);
            if (evo && evo.abilityTag === "battle_combo") ee._comboStacks = 0;
        }
    }
    // 글레이시아 절대영도: 15% 확률로 보스 이동속도 감소 (매 초)
    if (hasGlaceon && frame % 60 === 0 && Math.random() < 0.15) {
        mon._slowTimer = 120; // 2초간 감속
    }
    if (mon._slowTimer > 0) mon._slowTimer--;

    // 몬스터 생존 타이머
    const monsterElapsed = Date.now() - state.monsterTimer;
    if (monsterElapsed >= state.monsterTimeLimit) {
        // 게임오버!
        triggerGameOver();
        return;
    }

    if (totalDPS <= 0) return;

    const dmgPerFrame = totalDPS / 60;
    mon.hp -= dmgPerFrame;

    if (frame % 30 === 0 && totalDPS > 0) state.monsterHitAnim = 8;
    if (state.monsterHitAnim > 0) state.monsterHitAnim--;

    // 몬스터 처치
    if (state.monster.hp <= 0) {
        state.monster.hp = 0;
        state.monsterMaxStage = state.monsterStage;
        state.exploreRefresh = Math.min(getRefreshMax(), (state.exploreRefresh || 0) + 1); // 처치 시 +1
        state.monsterReward = applyMonsterReward(state.monsterStage);
        state.monsterKillAnim = state.monster.isBoss ? 600 : 420;
        // 스테이지 갱신 시 리더보드 업로드
        submitScore();
        saveGame();
        // 다음 몬스터는 killAnim 끝난 후 spawn
    }
}

// 처치 연출 끝 → 다음 몬스터

// 스테이지 보상
const STAGE_REWARDS = {
};

function applyMonsterReward(stage) {
    const mon = state.monster;
    const dropX = mon ? mon.wx : 0.5, dropY = mon ? mon.wy : 0.5;

    // 가속장치: 20% 확률 드롭 (보스는 50%)
    const accelChance = (mon && mon.isBoss) ? 0.3 : 0.1;
    const gotAccel = Math.random() < accelChance;
    if (gotAccel) {
        state.farmItems.push({ name:"가속장치", wx: dropX + (Math.random()-0.5)*0.1, wy: dropY + 0.05, vx: (Math.random()-0.5)*0.005, vy: 0.002 });
    }

    // 보스 처치 시 열매 추가 드롭
    if (mon && mon.isBoss) {
        for (let i = 0; i < 3; i++) {
            const fruit = FRUITS[Math.floor(Math.random() * FRUITS.length)];
            state.farmItems.push({ name: fruit, wx: dropX + (Math.random()-0.5)*0.15, wy: dropY + (Math.random()-0.5)*0.1, vx: (Math.random()-0.5)*0.008, vy: (Math.random()-0.5)*0.005 });
        }
    }

    const reward = STAGE_REWARDS[stage];
    const accelMsg = gotAccel ? " + 가속장치!" : "";
    if (!reward) return mon && mon.isBoss ? `보스 처치!${accelMsg} 열매x3!` : (gotAccel ? "가속장치 획득!" : null);
    if (reward.type === "location") {
        if (!state.unlockedByBattle) state.unlockedByBattle = new Set();
        state.unlockedByBattle.add(reward.id);
    } else if (reward.type === "slot") {
        // 슬롯은 getExpSlots()로 도감 기준 자동 계산 — 보상은 메시지만
    }
    return `${reward.text}${accelMsg}`;
}

// 총 DPS 계산 (표시용)
function triggerGameOver() {
    state._gameOverRecord = state.monsterStage; // 도달 기록 저장
    state.gameOverAnim = 300;
    submitScore();
    // 농장 바닥 아이템 + 진행 중 탐색 취소
    state.farmItems = [];
    state.expeditions = [];
    state.expeditionPicked = [];
    state.expeditionSelect = null;
    // 마지막 보스 클리어 스테이지부터 다시
    const lastBossClear = Math.floor((state.monsterMaxStage || 0) / 10) * 10;
    state.monsterMaxStage = lastBossClear;
    state.monsterStage = lastBossClear;
    state.monster = null;
    // 이브이는 유지, 해금된 탐색지/슬롯도 유지
    saveGame();
}

function getTotalDPS() {
    if (!state.monster) return 0;
    const r = 0.15;
    let total = 0;
    if (state.currentEevee && !isOnExpedition("current")) {
        const dx = state.currentEevee.wx - state.monster.wx, dy = state.currentEevee.wy - state.monster.wy;
        if (dx*dx+dy*dy < r*r) total += calcEeveeDPS(state.currentEevee);
    }
    state.farm.forEach((e, i) => {
        if (isOnExpedition(i)) return;
        const dx = e.wx - state.monster.wx, dy = e.wy - state.monster.wy;
        if (dx*dx+dy*dy < r*r) total += calcEeveeDPS(e);
    });
    return total;
}
function getFighterCount() {
    let c = 0;
    if (state.currentEevee && !isOnExpedition("current")) c++;
    state.farm.forEach((e, i) => { if (!isOnExpedition(i)) c++; });
    return c;
}
function getExplorerCount() {
    return state.expeditions.length;
}

// 출정 파견
function sendExpedition(locId, eeveeRefs) {
    // eeveeRefs: 배열 ["current", 2, 5] 또는 단일값 → 배열 변환
    if (!Array.isArray(eeveeRefs)) eeveeRefs = [eeveeRefs];
    const loc = LOCATIONS.find(l => l.id === locId);
    if (!loc) return;
    if (state.expeditions.length >= getExpSlots()) {
        showMessage("파견 슬롯이 가득 찼습니다!", 90); return;
    }

    // 각 이브이 정보 수집
    const members = eeveeRefs.map(ref => {
        const eevee = ref === "current" ? state.currentEevee : state.farm[ref];
        const evo = ref === "current" ? null : EVOS.find(e => e.id === eevee.evoId);
        return { ref, eevee, evo, type: evo ? evo.type : "", tag: evo ? evo.abilityTag : "", act: eevee.activity || 0 };
    });

    // 시간 계산 (가장 빠른 능력 적용 + 협동 보너스)
    const stageMult = 1 + (state.monsterStage || 0) * 0.06;
    let duration = (loc.dur || 30) * 1000 * stageMult;

    // 각 이브이 능력 중 최고 시간단축 적용
    let bestSpeedMult = 1.0;
    for (const m of members) {
        if (m.tag === "explore_fastest") bestSpeedMult = Math.min(bestSpeedMult, 0.4);
        else if (m.tag === "explore_speed") bestSpeedMult = Math.min(bestSpeedMult, 0.5);
    }
    duration *= bestSpeedMult;

    // 최고 활동성 기반 단축
    const maxAct = Math.max(...members.map(m => m.act));
    duration *= (1 - maxAct / 200);

    // 협동 보너스: 2마리 -30%, 3마리 -50%
    if (members.length >= 3) duration *= 0.5;
    else if (members.length >= 2) duration *= 0.7;

    // 몬스터 제한시간의 80% 이내로 cap
    if (state.monsterTimeLimit > 0) {
        const maxDur = state.monsterTimeLimit * 0.8; // 제한시간의 80% (둘다 ms)
        duration = Math.min(duration, maxDur);
    }

    const names = members.map(m => m.evo ? m.evo.name : "이브이");

    state.expeditions.push({
        locId,
        eeveeRefs: eeveeRefs, // 배열
        members: members.map(m => ({ ref: m.ref, type: m.type, tag: m.tag, img: m.evo ? m.evo.img : "이브이.png", name: m.evo ? m.evo.name : "이브이" })),
        startTime: Date.now(),
        duration: Math.floor(duration),
        eeveeName: names.join("+"),
    });

    // 각 이브이 탐색 카운터 + 활동성 소모
    for (const m of members) {
        state.totalExplores++;
        if (m.eevee.visitedLocations) m.eevee.visitedLocations.add(locId);
        if (m.eevee.exploreCount !== undefined) m.eevee.exploreCount++;
        if (m.eevee.lastLocation === locId && m.eevee.repeatCount !== undefined) m.eevee.repeatCount++;
        else if (m.eevee.repeatCount !== undefined) m.eevee.repeatCount = 1;
        if (m.eevee.lastLocation !== undefined) m.eevee.lastLocation = locId;
    }
    // 글로벌 연속탐색 (록키온 조건용)
    if (state._lastExpLocation === locId) {
        state._globalRepeat = (state._globalRepeat || 0) + 1;
    } else {
        state._globalRepeat = 1;
    }
    state._lastExpLocation = locId;

    for (const m of members) { // 활동성 소모 루프 재시작을 위해 아래 코드 유지
        // 활동성 소모 (님피아: 소모 없음)
        if (m.eevee.activity !== undefined && m.tag !== "sylveon") {
            m.eevee.activity = Math.max(0, m.eevee.activity - 3);
        }
    }

    state.panel = null; state.panelSlide = 0;
    state.expeditionSelect = null;
    showMessage(`${loc.name}으로 ${members.length}마리 출동!`, 60);
    saveGame();
}

// 출정 결과 계산 (멤버별 각각 드롭)
function resolveExpedition(exp) {
    const loc = LOCATIONS.find(l => l.id === exp.locId);
    if (!loc) return [];
    const members = exp.members || [{ ref: exp.eeveeRef, type: exp.evoType || "", tag: exp.abilityTag || "" }];
    const fruitPool = FRUITS.map(f => ({name: f, type: "fruit", weight: 1}));
    const baseItemPool = loc.items.filter(i => i.type !== "fruit");
    const isNightLoc = loc.time === "night";
    const allDrops = [];

    for (const m of members) {
        const tag = m.tag || "";
        let itemPool = [...baseItemPool];
        if (tag === "explore_rare") itemPool = itemPool.map(i => i.weight <= 20 ? { ...i, weight: i.weight * 2 } : i);

        const typeMatch = loc.attr === m.type;
        const itemChance = (tag === "explore_night" && isNightLoc) ? 1.0 : (typeMatch ? 0.55 : 0.35);

        // 아이템 드롭
        if (itemPool.length > 0 && Math.random() < itemChance) {
            allDrops.push(weightedRandom(itemPool));
        }

        // 열매 드롭
        const fruitCount = tag === "explore_fruit2" ? 2 : 1;
        const fruitChance = tag === "explore_fruit2" ? 1.0 : (tag === "leafeon" ? 0.75 : 0.45);
        for (let fi = 0; fi < fruitCount; fi++) {
            if (Math.random() < fruitChance) allDrops.push(weightedRandom(fruitPool));
        }

        // 샌디온 발굴
        if (tag === "explore_extra" && itemPool.length > 0) allDrops.push(weightedRandom(itemPool));
    }

    // 최소 1개 보장
    if (allDrops.length === 0) allDrops.push(weightedRandom(fruitPool));
    return allDrops;
}

// 귀환 체크 (메인 루프에서 호출)
function checkExpeditionReturns() {
    if (state.gameOverAnim > 0) return; // 게임오버 중 귀환 차단
    const now = Date.now();
    const returned = [];
    state.expeditions = state.expeditions.filter(exp => {
        if (now >= exp.startTime + exp.duration) {
            returned.push(exp);
            return false;
        }
        return true;
    });
    for (const exp of returned) {
        // 각 멤버 활동성/친밀도 귀환 보상
        const refs = exp.eeveeRefs || [exp.eeveeRef];
        const mems = exp.members || [{ tag: exp.abilityTag || "" }];
        for (let mi = 0; mi < refs.length; mi++) {
            const retEevee = refs[mi] === "current" ? state.currentEevee : state.farm[refs[mi]];
            const mtag = mems[mi] ? mems[mi].tag : "";
            const actGain = mtag === "sylveon" ? 3 : 1;
            if (retEevee) {
                retEevee.activity = clamp((retEevee.activity || 0) + actGain, 0, getActivityMax());
                if (retEevee.friendship !== undefined) {
                    retEevee.friendship = clamp(retEevee.friendship + 1, -5, friendshipMax() + 5);
                }
                // 귀환 위치 랜덤 재배치 (열매와 겹치지 않게)
                retEevee.wx = 0.1 + Math.random() * 0.4; // 왼쪽 절반에 배치
                retEevee.wy = 0.15 + Math.random() * 0.6;
            }
        }
        const drops = resolveExpedition(exp);
        for (const drop of drops) {
            if (FRUITS.includes(drop.name)) {
                // 열매 → 농장 바닥
                state.farmItems.push({
                    name: drop.name,
                    wx: Math.random() * 0.7 + 0.15,
                    wy: Math.random() * 0.7 + 0.15,
                    vx: 0, vy: 0,
                });
            } else {
                // 아이템 → 가방 직행
                addItem(drop.name);
            }
        }
        const dropNames = drops.map(d => `${itemEmoji(d.name)}`).join(" ");
        // 귀환 결과 토스트
        showMessage(`${exp.eeveeName} 귀환! ${dropNames}`, 150);
        state.exploreRefresh = Math.min(getRefreshMax(), (state.exploreRefresh || 0) + 1); // 귀환 시 +1
        saveGame();
    }
}

// 이브이가 파견 중인지 확인
// 협동 파견 최대 인원
function getRefreshMax() {
    const c = state.collected.size;
    if (c >= 12) return 5;
    if (c >= 8) return 4;
    return 3;
}

function getCoopMax() {
    const c = state.collected.size;
    if (c >= 14) return 3;
    if (c >= 8) return 2;
    return 1;
}

let _expCache = null; let _expCacheFrame = -1;
function isOnExpedition(eeveeRef) {
    if (_expCacheFrame !== frame) {
        _expCache = new Set();
        for (const e of state.expeditions) {
            if (e.eeveeRefs) e.eeveeRefs.forEach(r => _expCache.add(r));
            else if (e.eeveeRef !== undefined) _expCache.add(e.eeveeRef);
        }
        _expCacheFrame = frame;
    }
    return _expCache.has(eeveeRef);
}

function feedItem(itemName) {
    if (!hasItem(itemName)) return;
    const ee = state.currentEevee;
    const isFruit = FRUITS.includes(itemName);
    const isShard = itemName === "태양조각" || itemName === "달조각";

    // 친밀도 MAX + 활동성 MAX → 열매/조각 전달 불가
    if ((isFruit || isShard) && ee.friendship >= FRIENDSHIP.max && (ee.activity || 0) >= getActivityMax()) {
        showMessage("이미 최대치입니다!", 60);
        return;
    }

    if (isFruit) {
        removeItem(itemName);
        let reaction = "neutral";
        let delta = 0;
        if (itemName === ee.likedFruit) {
            ee.friendship = clamp(ee.friendship + FRIENDSHIP.liked, -5, friendshipMax() + 5);
            const before = ee.activity || 0;
            ee.activity = clamp(before + ACTIVITY_FRUIT_LIKED, 0, getActivityMax());
            delta = ee.activity - before;
            reaction = "liked"; ee.knownLiked = true;
        } else if (itemName === ee.dislikedFruit) {
            ee.friendship = clamp(ee.friendship + FRIENDSHIP.disliked, -5, friendshipMax() + 5);
            const before = ee.activity || 0;
            ee.activity = clamp(before + ACTIVITY_FRUIT_DISLIKED, 0, getActivityMax());
            delta = ee.activity - before;
            reaction = "disliked"; ee.knownDisliked = true;
        } else {
            // 보통 열매: 활동성 +2
            const before3 = ee.activity || 0;
            ee.activity = clamp(before3 + ACTIVITY_FRUIT_NEUTRAL, 0, getActivityMax());
            delta = ee.activity - before3;
            reaction = "neutral";
        }
        const scr = worldToScreen(ee.wx, ee.wy);
        state.feedbackAnim = { type: reaction, timer: 70, x: scr.sx, y: scr.sy - 30, delta };
        state.panel = null; state.panelSlide = 0;
        // 친밀도 변화 시 즉시 진화 체크 (에브이/블래키/고스트 등)
        const evo = checkEvolution();
        if (evo) { triggerEvolution(evo); return; }
    } else if (itemName === "태양조각" || itemName === "달조각") {
        removeItem(itemName);
        const isMatch = (itemName === "태양조각" && state.timeOfDay === "day") ||
                         (itemName === "달조각" && state.timeOfDay === "night");
        if (isMatch) {
            ee.friendship = clamp(ee.friendship + FRIENDSHIP.sun_day, -5, friendshipMax() + 5);
            const before = ee.activity || 0;
            ee.activity = clamp(before + ACTIVITY_FRUIT_LIKED * 2, 0, getActivityMax());
            const d = ee.activity - before;
            const scr = worldToScreen(ee.wx, ee.wy);
            state.feedbackAnim = { type: "liked", timer: 70, x: scr.sx, y: scr.sy - 30, delta: d };
        } else {
            const scr = worldToScreen(ee.wx, ee.wy);
            state.feedbackAnim = { type: "neutral", timer: 70, x: scr.sx, y: scr.sy - 30 };
        }
        state.panel = null; state.panelSlide = 0;
        // 친밀도 max 시 즉시 진화 체크
        if (ee.friendship >= FRIENDSHIP.max) {
            const evo = checkEvolution();
            if (evo) { triggerEvolution(evo); return; }
        }
    } else {
        // 전달 가능한 아이템 목록 (진화 아이템만)
        const EVO_ITEMS = {
            "물의돌":"vaporeon","천둥의돌":"jolteon","불꽃의돌":"flareon",
            "이끼바위":"leafeon","얼음바위":"glaceon","리본":"sylveon",
            "다이버섯":"gmax","이브이나이트":"mega","용의비늘":"dragon","바람깃털":"flying",
            "독바늘":"poison","벌레껍질":"bug",
        };
        if (!EVO_ITEMS[itemName]) {
            showMessage("이브이에게 전달할 수 없는 아이템입니다", 90);
            return;
        }
        if (state.collected.has(EVO_ITEMS[itemName])) {
            showMessage("이미 이 아이템으로 진화를 완료했다!", 100);
            return;
        }
        // 친밀도 부족 시 전달 거부
        const friendReq = {"리본": FRIENDSHIP.max, "다이버섯": FRIENDSHIP.max, "이브이나이트": FRIENDSHIP.max, "용의비늘": FRIENDSHIP.max, "독바늘": FRIENDSHIP.max, "벌레껍질": FRIENDSHIP.max, "바람깃털": FRIENDSHIP.max};
        if (friendReq[itemName] && ee.friendship < friendReq[itemName]) {
            showMessage("이브이가 아직 이 아이템을 받아들일 준비가 안 된 것 같다...", 120);
            state.panel = null; state.panelSlide = 0;
            return;
        }
        state._deliveredItem = itemName;
        removeItem(itemName);
        showMessage(`${itemEmoji(itemName)} ${itemName}을(를) 이브이에게 전달했다!`);
        state.panel = null; state.panelSlide = 0;
        // 전달 직후 진화 체크 (돌/제작/리본 등)
        const evo = checkEvolution();
        checkBagHighlight();
        if (evo) { triggerEvolution(evo); return; }
    }
    saveGame();
}

function tryCraft(recipeName) {
    const r = RECIPES[recipeName];
    if (!r || !hasItem(r.material, r.count)) return;
    removeItem(r.material, r.count);
    addItem(recipeName);
    showMessage(`${itemEmoji(recipeName)} ${recipeName}을(를) 만들었다!`);
    saveGame();
}

function feedFarmEevee(farmIdx, itemName) {
    if (farmIdx < 0 || farmIdx >= state.farm.length) return;
    if (!hasItem(itemName)) return;
    const e = state.farm[farmIdx];
    const isFruit = FRUITS.includes(itemName);
    const isShard = itemName === "태양조각" || itemName === "달조각";
    if (!isFruit && !isShard) return;
    // 활동성 MAX → 전달 불가
    if ((e.activity || 0) >= getActivityMax()) {
        showMessage("이미 활동성이 최대치입니다!", 60);
        return;
    }
    removeItem(itemName);

    if (isShard) {
        // 태양/달 조각: 친밀도 증가
        const isMatch = (itemName === "태양조각" && state.timeOfDay === "day") ||
                         (itemName === "달조각" && state.timeOfDay === "night");
        if (isMatch) {
            const before = e.activity || 0;
            e.activity = clamp(before + ACTIVITY_FRUIT_LIKED * 2, 0, getActivityMax());
            const scr = worldToScreen(e.wx, e.wy);
            state.feedbackAnim = { type: "liked", timer: 70, x: scr.sx, y: scr.sy - 30, delta: e.activity - before };
        } else {
            const scr = worldToScreen(e.wx, e.wy);
            state.feedbackAnim = { type: "neutral", timer: 70, x: scr.sx, y: scr.sy - 30 };
        }
    } else {
        // 열매: 활동성 변화
        let delta = ACTIVITY_FRUIT_NEUTRAL;
        let reaction = "neutral";
        if (itemName === e.likedFruit) { delta = ACTIVITY_FRUIT_LIKED; reaction = "liked"; }
        if (itemName === e.dislikedFruit) { delta = ACTIVITY_FRUIT_DISLIKED; reaction = "disliked"; }
        e.activity = clamp((e.activity || 0) + delta, 0, getActivityMax());
        const scr = worldToScreen(e.wx, e.wy);
        state.feedbackAnim = { type: reaction, timer: 70, x: scr.sx, y: scr.sy - 30 };
    }
    state.selectedFarmEevee = null;
    state.panel = null; state.panelSlide = 0;
    saveGame();
}

function dropItem(itemName) {
    if (!hasItem(itemName)) return;
    removeItem(itemName);
    addFarmItem(itemName);
    saveGame();
}

    let text;
    if (hints.length > 0 && Math.random() < 0.7) {
        text = hints[Math.floor(Math.random() * hints.length)];
    } else {
        text = tips[Math.floor(Math.random() * tips.length)];
    }

    // 아이템 드롭 관련 힌트면 부스트 등록
    const boost = HINT_BOOST_MAP[text];
    if (boost && !state.hintBoosts.some(b => b.locId === boost.locId && b.itemName === boost.itemName)) {
