function drawPopup() {
    if (!state.popup) return;
    state.popupTimer++;
    const p = state.popup;
    // 팝업 타입별 크기
    const isFeedCurrent = p.type === "feed_current";
    const isFeedFarm = p.type === "feed_farm";
    let pw = 300, ph = 140;
    if (isFeedCurrent) {
        const invFruits = Object.keys(state.inventory).filter(n => FRUITS.includes(n));
        const invOthers = Object.keys(state.inventory).filter(n => !FRUITS.includes(n));
        const frRows = Math.ceil(invFruits.length / 3);
        const otRows = Math.ceil(invOthers.length / 3);
        pw = 320;
        ph = 50; // title + friendship
        if (invFruits.length > 0) ph += 20 + frRows * 36;
        if (invOthers.length > 0) ph += 20 + otRows * 36;
        ph += 10;
    } else if (isFeedFarm) {
        const af = [...FRUITS, "태양조각", "달조각"].filter(f => hasItem(f));
        const fruitRows = Math.ceil(af.length / 3);
        ph = af.length > 0 ? 90 + fruitRows * 36 : 130;
    } else if (p.type === "hint") {
        ctx.font = "14px system-ui";
        const hintMaxW = 270;
        let hintLines = 1, testLine = "";
        for (const ch of p.text) {
            testLine += ch;
            if (ctx.measureText(testLine).width > hintMaxW) { hintLines++; testLine = ch; }
        }
        ph = 110 + Math.max(0, hintLines - 1) * 18;
    } else if (p.type === "cheat") {
        pw = 280; ph = 296;
    } else if (p.type === "confirm_reset") {
        pw = 300; ph = 130;
    } else if (p.type === "nickname_input") {
        pw = 300; ph = 150;
    } else if (p.type === "leaderboard" || p.type === "leaderboard_loading") {
        pw = 340; ph = p.type === "leaderboard_loading" ? 100 : 360;
    }
    const px = (CW - pw) / 2;
    const py = (isFeedCurrent || isFeedFarm) ? Math.max(10, (CH - ph) / 2) : BTN_Y - ph - 10;

    // 배경 딤
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(0, 0, CW, CH);

    // 팝업 박스
    ctx.fillStyle = "rgba(30,30,55,0.95)";
    ctx.strokeStyle = "#7B73FF";
    ctx.lineWidth = 2;
    roundRect(px, py, pw, ph, 12);
    ctx.fill(); ctx.stroke();

    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    if (p.type === "exploring") {
        // 팝업 크기
        const epw = 340, eph = 260;
        const epx = (CW - epw) / 2, epy = (CH - eph) / 2 - 30;

        // 배경 딤
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(0, 0, CW, CH);

        // 팝업 박스
        ctx.fillStyle = "rgba(25,25,45,0.95)";
        ctx.strokeStyle = "#7B73FF"; ctx.lineWidth = 2;
        roundRect(epx, epy, epw, eph, 12); ctx.fill(); ctx.stroke();

        // 지역 미니 뷰 (팝업 상단에 작은 풍경)
        ctx.save();
        ctx.beginPath(); ctx.roundRect(epx + 10, epy + 10, epw - 20, 100, 8); ctx.clip();
        ctx.translate(epx + 10, epy + 10);
        ctx.scale((epw - 20) / CW, 100 / (CH - 180));
        drawLocationScene(p.locationId, p.attr);
        ctx.restore();

        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        const EXPLORE_DURATION = 75;
        const cx = epx + epw / 2;

        if (state.popupTimer < EXPLORE_DURATION) {
            // 진행 중
            ctx.fillStyle = "#fff"; ctx.font = "bold 15px system-ui";
            ctx.fillText(`${p.locationName} 탐색 중...`, cx, epy + 130);

            // 진행 바
            const barW = epw - 60, barH = 6;
            const bx = epx + 30, by = epy + 148;
            ctx.fillStyle = "#333"; ctx.fillRect(bx, by, barW, barH);
            ctx.fillStyle = "#FFD54F";
            ctx.fillRect(bx, by, barW * (state.popupTimer / EXPLORE_DURATION), barH);
            ctx.strokeStyle = "#555"; ctx.lineWidth = 0.5; ctx.strokeRect(bx, by, barW, barH);

            // 이브이 걷기
            const eeveeX = cx - 40 + (state.popupTimer / EXPLORE_DURATION) * 80;
            const bounce = Math.sin(state.popupTimer * 0.15) * 2;
            drawSprite("이브이.png", eeveeX, epy + 195 + bounce, 1, 36);

            // 점 애니메이션
            const dots = ".".repeat(Math.floor(state.popupTimer / 15) % 4);
            ctx.fillStyle = "#888"; ctx.font = "14px system-ui";
            ctx.fillText(dots, cx + 75, epy + 130);
        } else {
            // 결과
            ctx.fillStyle = "#FFD54F"; ctx.font = "bold 16px system-ui";
            ctx.fillText(`${p.locationName} 탐색 완료!`, cx, epy + 128);

            ctx.fillStyle = "#fff"; ctx.font = "bold 20px system-ui";
            ctx.fillText(p.itemName, cx, epy + 165);

            const typeColors = {fruit:"#66BB6A",stone:"#FFD54F",shard:"#CE93D8",material:"#90A4AE",special:"#F48FB1"};
            ctx.fillStyle = typeColors[p.itemType] || "#fff"; ctx.font = "12px system-ui";
            const typeNames = {fruit:"열매",stone:"진화석",shard:"조각",material:"재료",special:"특수"};
            ctx.fillText(typeNames[p.itemType] || "", cx, epy + 192);

            const alpha = Math.sin(frame * 0.05) * 0.3 + 0.7;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = "#888"; ctx.font = "13px system-ui";
            ctx.fillText("터치하여 계속", cx, epy + eph - 18);
            ctx.globalAlpha = 1;
        }
        return;
    }

    if (p.type === "hint") {
        drawSprite("이브이.png", px + pw / 2, py + 45, 1, 40);
        ctx.fillStyle = "#E0E0E0"; ctx.font = "14px system-ui";
        // 텍스트 줄바꿈 처리
        const maxW = pw - 30;
        const words = p.text.split("");
        let lines = [""];
        for (const ch of words) {
            const test = lines[lines.length - 1] + ch;
            if (ctx.measureText(test).width > maxW) lines.push(ch);
            else lines[lines.length - 1] = test;
        }
        const lineH = 18;
        const startY = py + 80 - (lines.length - 1) * lineH / 2;
        for (let i = 0; i < lines.length; i++) {
            ctx.fillText(lines[i], px + pw / 2, startY + i * lineH);
        }
        ctx.fillStyle = "#777"; ctx.font = "12px system-ui";
        ctx.fillText("터치하여 계속", px + pw / 2, startY + lines.length * lineH + 10);
    } else if (p.type === "feed_current") {
        const ee = state.currentEevee;
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 15px system-ui";
        ctx.fillText("이브이에게 아이템 주기", px + pw / 2, py + 22);
        ctx.fillStyle = "#4FC3F7"; ctx.font = "11px system-ui";
        ctx.fillText(`친밀도: ${Math.round(ee.friendship)} / ${FRIENDSHIP.max}`, px + pw / 2, py + 40);
        // 열매와 아이템 분리
        const invFruits = Object.entries(state.inventory).filter(([n]) => FRUITS.includes(n));
        const invOthers = Object.entries(state.inventory).filter(([n]) => !FRUITS.includes(n));
        const cols = 3;
        let curY = py + 50;
        // ── 열매 섹션 ──
        if (invFruits.length > 0) {
            ctx.fillStyle = "#8BC34A"; ctx.font = "bold 11px system-ui";
            ctx.fillText("── 열매 ──", px + pw / 2, curY + 10);
            curY += 20;
            for (let i = 0; i < invFruits.length; i++) {
                const [name, count] = invFruits[i];
                const col = i % cols, row = Math.floor(i / cols);
                const fbx = px + 10 + col * 100, fby = curY + row * 36, fbw = 92, fbh = 30;
                let border = "#555";
                if (ee.knownLiked && name === ee.likedFruit) border = "#4CAF50";
                else if (ee.knownDisliked && name === ee.dislikedFruit) border = "#E53935";
                ctx.fillStyle = "rgba(50,50,90,0.9)"; ctx.strokeStyle = border; ctx.lineWidth = border === "#555" ? 1 : 2;
                roundRect(fbx, fby, fbw, fbh, 5); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#fff"; ctx.font = "11px system-ui";
                ctx.fillText(`${itemEmoji(name)} x${count}`, fbx + fbw / 2, fby + 11);
                // 설명
                ctx.fillStyle = "#888"; ctx.font = "8px system-ui";
                ctx.fillText(ITEM_DESC[name] || "", fbx + fbw / 2, fby + 23);
            }
            curY += Math.ceil(invFruits.length / cols) * 36;
        }
        // ── 아이템 섹션 ──
        if (invOthers.length > 0) {
            ctx.fillStyle = "#FFD54F"; ctx.font = "bold 11px system-ui";
            ctx.fillText("── 아이템 ──", px + pw / 2, curY + 10);
            curY += 20;
            for (let i = 0; i < invOthers.length; i++) {
                const [name, count] = invOthers[i];
                const col = i % cols, row = Math.floor(i / cols);
                const fbx = px + 10 + col * 100, fby = curY + row * 36, fbw = 92, fbh = 30;
                const evoItem = canEvolveWith(name);
                // 진화 가능 아이템: 반짝이 테두리
                if (evoItem) {
                    const glow = Math.sin(frame * 0.08) * 0.4 + 0.6;
                    ctx.fillStyle = `rgba(255,215,0,${glow * 0.15})`;
                    ctx.strokeStyle = `rgba(255,215,0,${glow})`; ctx.lineWidth = 2.5;
                } else {
                    ctx.fillStyle = "rgba(50,50,90,0.9)"; ctx.strokeStyle = "#555"; ctx.lineWidth = 1;
                }
                roundRect(fbx, fby, fbw, fbh, 5); ctx.fill(); ctx.stroke();
                ctx.fillStyle = evoItem ? "#FFD54F" : "#fff"; ctx.font = "11px system-ui";
                ctx.fillText(`${itemEmoji(name)} x${count}`, fbx + fbw / 2, fby + 11);
                // 설명
                ctx.fillStyle = evoItem ? "#FFD54F" : "#888"; ctx.font = "8px system-ui";
                ctx.fillText(ITEM_DESC[name] || "", fbx + fbw / 2, fby + 23);
                // 진화 가능 마크
                if (evoItem) {
                    ctx.fillStyle = "#FFD54F"; ctx.font = "bold 7px system-ui";
                    ctx.fillText("✨진화", fbx + fbw - 8, fby + 6);
                }
            }
        }
    } else if (p.type === "feed_farm") {
        const e = state.farm[p.farmIdx];
        const evo = EVOS.find(ev => ev.id === e.evoId);
        const ename = evo ? evo.name : "이브이";
        // 스프라이트
        drawSprite(e.sprite, px + 30, py + 30, 1, 28);
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 14px system-ui";
        ctx.textAlign = "left";
        ctx.fillText(ename, px + 50, py + 20);
        ctx.fillStyle = "#aaa"; ctx.font = "11px system-ui";
        ctx.fillText(`${evo ? evo.type : ""} 타입`, px + 50, py + 36);
        // 활동성 바
        ctx.textAlign = "center";
        const actR = clamp((e.activity || 0) / getActivityMax(), 0, 1);
        ctx.fillStyle = "#444"; ctx.fillRect(px + 15, py + 52, pw - 30, 6);
        ctx.fillStyle = actR >= 1 ? "#4FC3F7" : actR >= 0.7 ? "#FF9800" : actR >= 0.3 ? "#FFB74D" : "#795548";
        ctx.fillRect(px + 15, py + 52, (pw - 30) * actR, 6);
        ctx.strokeStyle = "#555"; ctx.lineWidth = 0.5; ctx.strokeRect(px + 15, py + 52, pw - 30, 6);
        ctx.fillStyle = "#999"; ctx.font = "10px system-ui";
        ctx.fillText(`활동성 ${Math.round(e.activity || 0)} / ${getActivityMax()}`, px + pw / 2, py + 70);
        // 열매 + 조각 버튼들
        const availFruits = [...FRUITS, "태양조각", "달조각"].filter(f => hasItem(f));
        if (availFruits.length > 0) {
            const cols = 3;
            for (let i = 0; i < availFruits.length; i++) {
                const name = availFruits[i];
                const col = i % cols, row = Math.floor(i / cols);
                const fbx = px + 15 + col * 92, fby = py + 82 + row * 36, fbw = 85, fbh = 30;
                ctx.fillStyle = "rgba(50,50,90,0.9)"; ctx.strokeStyle = "#555"; ctx.lineWidth = 1;
                roundRect(fbx, fby, fbw, fbh, 5); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#fff"; ctx.font = "11px system-ui";
                ctx.fillText(`${itemEmoji(name)} x${itemCount(name)}`, fbx + fbw / 2, fby + 11);
                ctx.fillStyle = "#888"; ctx.font = "8px system-ui";
                ctx.fillText(ITEM_DESC[name] || "", fbx + fbw / 2, fby + 23);
            }
        } else {
            ctx.fillStyle = "#666"; ctx.font = "12px system-ui";
            ctx.fillText("줄 수 있는 열매가 없습니다", px + pw / 2, py + 100);
        }
    } else if (p.type === "cheat") {
        ctx.fillStyle = "#FF5722"; ctx.font = "bold 15px system-ui";
        ctx.fillText("🔧 DEV CHEAT 🔧", px + pw / 2, py + 22);
        const btns = [
            { label: "모든 아이템 추가", type: "items" },
            { label: "친밀도 MAX", type: "friendship_max" },
            { label: "친밀도 → -1", type: "friendship_zero" },
            { label: "전체 활동성 MAX", type: "stamina" },
            { label: "탐색 카운트 충전", type: "explore" },
            { label: "기본 8종 해금", type: "unlock_base8" },
            { label: "전체 19종 해금", type: "unlock_all" },
        ];
        for (let i = 0; i < btns.length; i++) {
            const bx = px + 15, by = py + 38 + i * 36, bw = pw - 30, bh = 30;
            ctx.fillStyle = "rgba(50,50,90,0.9)"; ctx.strokeStyle = "#FF5722"; ctx.lineWidth = 1;
            roundRect(bx, by, bw, bh, 5); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#fff"; ctx.font = "13px system-ui";
            ctx.fillText(btns[i].label, bx + bw / 2, by + bh / 2);
        }
    } else if (p.type === "confirm_reset") {
        ctx.fillStyle = "#FF5722"; ctx.font = "bold 16px system-ui";
        ctx.fillText("처음부터 시작할까요?", px + pw / 2, py + 30);
        ctx.fillStyle = "#aaa"; ctx.font = "13px system-ui";
        ctx.fillText("모든 진행 상황이 삭제됩니다", px + pw / 2, py + 55);
        // 확인
        const ybw = (pw - 50) / 2, yby = py + 80, ybh = 34;
        const ybx = px + 20;
        ctx.fillStyle = "#c0392b"; roundRect(ybx, yby, ybw, ybh, 6); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "bold 14px system-ui";
        ctx.fillText("삭제하고 시작", ybx + ybw / 2, yby + ybh / 2);
        // 취소
        const nbx = px + pw - 20 - ybw;
        ctx.fillStyle = "#555"; roundRect(nbx, yby, ybw, ybh, 6); ctx.fill();
        ctx.fillStyle = "#ddd";
        ctx.fillText("취소", nbx + ybw / 2, yby + ybh / 2);
    } else if (p.type === "nickname_input") {
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 16px system-ui";
        ctx.fillText("닉네임 입력", px + pw / 2, py + 25);
        ctx.fillStyle = "#aaa"; ctx.font = "12px system-ui";
        ctx.fillText("영문/숫자 2~10자", px + pw / 2, py + 48);

        // 입력 필드
        const buf = state._nicknameBuffer || "";
        ctx.fillStyle = "#111"; roundRect(px + 30, py + 60, pw - 60, 34, 6); ctx.fill();
        ctx.strokeStyle = "#6C63FF"; ctx.lineWidth = 2;
        roundRect(px + 30, py + 60, pw - 60, 34, 6); ctx.stroke();
        ctx.fillStyle = "#fff"; ctx.font = "bold 18px system-ui";
        ctx.fillText(buf + (frame % 40 < 20 ? "|" : ""), px + pw / 2, py + 77);

        // 확인 버튼
        const canConfirm = buf.length >= 2;
        ctx.fillStyle = canConfirm ? "#3a7d44" : "#333";
        roundRect(px + pw / 2 - 50, py + 108, 100, 30, 6); ctx.fill();
        ctx.fillStyle = canConfirm ? "#fff" : "#666"; ctx.font = "bold 14px system-ui";
        ctx.fillText("시작!", px + pw / 2, py + 123);
    } else if (p.type === "leaderboard_loading") {
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 16px system-ui";
        ctx.fillText("🏆 리더보드", px + pw / 2, py + 30);
        ctx.fillStyle = "#aaa"; ctx.font = "13px system-ui";
        const dots = ".".repeat(Math.floor(frame / 20) % 4);
        ctx.fillText(`로딩 중${dots}`, px + pw / 2, py + 60);
    } else if (p.type === "leaderboard") {
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 16px system-ui";
        ctx.fillText("🏆 리더보드", px + pw / 2, py + 22);

        const lb = state.leaderboard || [];
        if (lb.length === 0) {
            ctx.fillStyle = "#666"; ctx.font = "13px system-ui";
            ctx.fillText("기록이 없습니다", px + pw / 2, py + 100);
        } else {
            for (let i = 0; i < lb.length && i < 10; i++) {
                const row = lb[i];
                const ry = py + 42 + i * 28;
                const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i+1}.`;
                ctx.fillStyle = i < 3 ? "rgba(255,215,0,0.1)" : "rgba(50,50,80,0.3)";
                roundRect(px + 10, ry, pw - 20, 24, 4); ctx.fill();

                ctx.textAlign = "left"; ctx.fillStyle = "#fff"; ctx.font = "bold 12px system-ui";
                ctx.fillText(`${medal} ${row.name}`, px + 18, ry + 12);
                ctx.textAlign = "right"; ctx.fillStyle = "#4FC3F7"; ctx.font = "bold 12px system-ui";
                ctx.fillText(`Lv.${row.stage}`, px + pw - 60, ry + 12);
                ctx.fillStyle = "#aaa"; ctx.font = "10px system-ui";
                ctx.fillText(`${row.collected}종`, px + pw - 18, ry + 12);
                ctx.textAlign = "center";
            }
        }
        // 닫기
        ctx.fillStyle = "#aaa"; ctx.font = "12px system-ui";
        ctx.fillText("터치하여 닫기", px + pw / 2, py + ph - 15);
    }
}

/* ── 농장 몬스터 렌더링 ── */


function drawMonster() {
    // 게임오버 연출
    if (state.gameOverAnim > 0) {
        const t = 300 - state.gameOverAnim;
        ctx.fillStyle = `rgba(139,0,0,${Math.min(t / 60, 0.6)})`;
        ctx.fillRect(0, 0, CW, CH);
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        if (t > 30) {
            ctx.fillStyle = "#fff"; ctx.font = "bold 24px system-ui";
            ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
            ctx.strokeText("농장이 파괴되었다!", CW / 2, CH / 2 - 20);
            ctx.fillText("농장이 파괴되었다!", CW / 2, CH / 2 - 20);
        }
        if (t > 80) {
            ctx.fillStyle = "#FF9800"; ctx.font = "14px system-ui";
            ctx.fillText("농장의 열매가 모두 사라졌습니다", CW / 2, CH / 2 + 20);
            const restartLv = Math.floor((state.monsterMaxStage || 0) / 10) * 10 + 1;
            ctx.fillText(`몬스터 Lv.${restartLv}부터 다시 시작합니다`, CW / 2, CH / 2 + 42);
        }
        if (t > 150) {
            ctx.fillStyle = "#aaa"; ctx.font = "bold 14px system-ui";
            ctx.fillText(`도달 기록: Lv.${state._gameOverRecord || 0}`, CW / 2, CH / 2 + 80);
        }
        return;
    }
    if (!state.monster) return;
    const m = state.monster;
    const mScr = worldToScreen(state.monster.wx, state.monster.wy);
    const mx = mScr.sx, my = mScr.sy;
    const monSize = m.isBoss ? 90 : 72;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    // 등장 연출 (하늘에서 떨어짐)
    if (state.monsterSpawnAnim > 0) {
        const t = 60 - state.monsterSpawnAnim;
        const dropY = t < 30 ? lerp(-80, my - monSize / 2, t / 30) : my - monSize / 2;
        const img = images[m.img];
        if (img && img.complete) {
            ctx.drawImage(img, mx - monSize / 2, dropY, monSize, monSize);
        }
        // 착지 이펙트
        if (t >= 28 && t < 40) {
            const et = t - 28;
            ctx.globalAlpha = Math.max(0, 1 - et / 12);
            // 먼지 구름
            ctx.fillStyle = "rgba(200,180,150,0.6)";
            for (let i = 0; i < 6; i++) {
                const ex = mx - 40 + i * 16 + Math.sin(i * 3 + et) * 5;
                const ey = my + 5 + et * 1.5;
                ctx.beginPath(); ctx.arc(ex, ey, 8 + et * 0.5, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1;
            // 화면 흔들림 효과 (간접)
            ctx.fillStyle = "#fff";
            ctx.globalAlpha = Math.max(0, 0.3 - et * 0.03);
            ctx.fillRect(0, 0, CW, CH);
            ctx.globalAlpha = 1;
        }
        // 이름 표시
        if (t > 35) {
            ctx.globalAlpha = clamp((t - 35) / 10, 0, 1);
            ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
            ctx.fillStyle = m.isBoss ? "#FFD54F" : "#FF5722";
            ctx.font = `bold ${m.isBoss ? 16 : 13}px system-ui`;
            ctx.strokeText(`${m.isBoss ? "⚠ BOSS " : ""}Lv.${m.stage} ${m.name}`, mx, my - monSize / 2 - 15);
            ctx.fillText(`${m.isBoss ? "⚠ BOSS " : ""}Lv.${m.stage} ${m.name}`, mx, my - monSize / 2 - 15);
            ctx.globalAlpha = 1;
        }
        return;
    }

    // 처치 연출 (전체 시간 중 처음 90프레임만 연출, 이후 대기)
    if (state.monsterKillAnim > 0) {
        const totalKill = m.isBoss ? 600 : 420;
        const elapsed = totalKill - state.monsterKillAnim; // 0부터 증가

        if (elapsed < 60) {
            // 페이드아웃 + 낙하
            const img = images[m.img];
            ctx.globalAlpha = Math.max(0, 1 - elapsed / 30);
            if (img && img.complete) {
                ctx.drawImage(img, mx - monSize / 2, my - monSize / 2 + elapsed * 0.5, monSize, monSize);
            }
            ctx.globalAlpha = 1;

            // 폭발 파티클
            if (elapsed < 30) {
                for (let i = 0; i < 8; i++) {
                    const a = (i / 8) * Math.PI * 2 + elapsed * 0.1;
                    const r = elapsed * 3;
                    ctx.fillStyle = ["#FF5722","#FFD54F","#FF9800","#fff"][i % 4];
                    ctx.globalAlpha = Math.max(0, 1 - elapsed / 30);
                    ctx.beginPath(); ctx.arc(mx + Math.cos(a) * r, my + Math.sin(a) * r, 5, 0, Math.PI * 2); ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
        }

        // 처치 텍스트 (계속 표시)
        if (elapsed > 15) {
            ctx.globalAlpha = clamp((elapsed - 15) / 15, 0, 1);
            ctx.fillStyle = "#FFD54F"; ctx.font = "bold 22px system-ui";
            ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
            ctx.strokeText("처치!", mx, my - 20);
            ctx.fillText("처치!", mx, my - 20);
            if (elapsed > 40) {
                ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
                ctx.fillStyle = "#ddd"; ctx.font = "13px system-ui";
                const dots = ".".repeat(Math.floor((elapsed - 40) / 30) % 4);
                ctx.strokeText(`다음 몬스터 대기 중${dots}`, mx, my + 10);
                ctx.fillText(`다음 몬스터 대기 중${dots}`, mx, my + 10);
                // 스킵 버튼 (버튼바 위)
                const skipW = 140, skipH = 34;
                const skipX = CW / 2 - skipW / 2, skipY = BTN_Y - 86;
                const pulse = 0.8 + Math.sin(frame * 0.1) * 0.2;
                ctx.globalAlpha = pulse;
                ctx.fillStyle = "rgba(50,50,90,0.9)";
                ctx.strokeStyle = "#7B73FF"; ctx.lineWidth = 2;
                roundRect(skipX, skipY, skipW, skipH, 8); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#fff"; ctx.font = "bold 13px system-ui";
                ctx.fillText("▶ 바로 소환", CW / 2, skipY + skipH / 2);
                ctx.globalAlpha = 1;
            }
            ctx.globalAlpha = 1;
        }
        return;
    }

    // 전투 중 이펙트 (간헐적 불꽃)
    const dps = getTotalDPS();
    if (dps > 0) {
        // 간헐적 불꽃/충격파
        if (frame % 45 < 8) {
            const sparkT = frame % 45;
            ctx.globalAlpha = Math.max(0, 1 - sparkT / 8);
            ctx.fillStyle = "#FFD54F";
            const spx = mx - 30 + Math.sin(frame * 0.7) * 25;
            const spy = my - 10 + Math.cos(frame * 0.5) * 15;
            ctx.font = "16px system-ui";
            ctx.fillText("✦", spx, spy);
            ctx.globalAlpha = 1;
        }
    }

    // 그림자
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.ellipse(mx, my + monSize / 2 - 5, monSize * 0.4, monSize * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();

    // 몬스터 스프라이트
    const shake = state.monsterHitAnim > 0 ? Math.sin(state.monsterHitAnim * 2) * 5 : 0;
    const breathe = Math.sin(frame * 0.03) * 2;
    const img = images[m.img];
    if (img && img.complete) {
        ctx.drawImage(img, mx - monSize / 2 + shake, my - monSize / 2 + breathe, monSize, monSize);
    }

    // 보스 아우라
    if (m.isBoss) {
        ctx.strokeStyle = `rgba(255,87,34,${0.3 + Math.sin(frame * 0.05) * 0.15})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(mx, my, monSize / 2 + 8 + Math.sin(frame * 0.04) * 3, 0, Math.PI * 2); ctx.stroke();
    }

    // HP 바
    const hpRatio = Math.max(0, m.hp / m.maxHp);
    const barW = 110, barH = 10, barX = mx - barW / 2, barY = my - monSize / 2 - 20;
    ctx.fillStyle = "#222"; roundRect(barX, barY, barW, barH, 4); ctx.fill();
    ctx.fillStyle = hpRatio > 0.5 ? "#4CAF50" : hpRatio > 0.2 ? "#FF9800" : "#F44336";
    roundRect(barX, barY, barW * hpRatio, barH, 4); ctx.fill();
    ctx.strokeStyle = "#555"; ctx.lineWidth = 0.5;
    roundRect(barX, barY, barW, barH, 4); ctx.stroke();
    ctx.fillStyle = "#fff"; ctx.font = "bold 9px system-ui";
    ctx.fillText(`${Math.ceil(m.hp)}/${m.maxHp}`, mx, barY + barH / 2);

    // Lv + 이름 + 타입 (아웃라인)
    ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
    ctx.fillStyle = m.isBoss ? "#FFD54F" : "#FF5722";
    ctx.font = `bold ${m.isBoss ? 11 : 10}px system-ui`;
    ctx.strokeText(`${m.isBoss ? "⚠" : ""}Lv.${m.stage} ${m.name}`, mx, barY - 22);
    ctx.fillText(`${m.isBoss ? "⚠" : ""}Lv.${m.stage} ${m.name}`, mx, barY - 22);
    ctx.fillStyle = "#aaa"; ctx.font = "9px system-ui";
    ctx.strokeText(m.types.join("/"), mx, barY - 10);
    ctx.fillText(m.types.join("/"), mx, barY - 10);

    // DPS
    if (dps > 0) {
        ctx.fillStyle = "#FF5722"; ctx.font = "bold 9px system-ui";
        ctx.fillText(`DPS ${dps.toFixed(1)}`, mx, my + monSize / 2 + 10);
    }

    // 남은 시간 표시
    if (state.monsterTimeLimit > 0) {
        const elapsed = Date.now() - state.monsterTimer;
        const remain = Math.max(0, Math.ceil((state.monsterTimeLimit - elapsed) / 1000));
        const ratio = elapsed / state.monsterTimeLimit;
        const urgent = ratio > 0.8;
        ctx.fillStyle = urgent ? "#FF1744" : ratio > 0.5 ? "#FFD54F" : "#fff";
        ctx.font = `bold ${urgent ? 14 : 11}px system-ui`;
        ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
        ctx.strokeText(`⏱${remain}초`, mx, my + monSize / 2 + 22);
        ctx.fillText(`⏱${remain}초`, mx, my + monSize / 2 + 22);
    }
}

/* ── 열매 삭제 이펙트 ── */
function drawFruitDestroyFx() {
    if (!state.fruitDestroyFx || state.fruitDestroyFx.length === 0) return;
    for (let i = state.fruitDestroyFx.length - 1; i >= 0; i--) {
        const fx = state.fruitDestroyFx[i];
        fx.timer--;
        const t = 1 - fx.timer / 45; // 0→1 (45프레임 = 0.75초)
        // 파편 파티클
        for (let p = 0; p < 8; p++) {
            const a = (p / 8) * Math.PI * 2;
            const r = t * 40;
            const px = fx.x + Math.cos(a) * r;
            const py = fx.y + Math.sin(a) * r - t * 20;
            ctx.globalAlpha = Math.max(0, 1 - t * 0.8);
            ctx.fillStyle = ["#FF5722","#FFD54F","#FF9800","#8BC34A","#fff","#F44336","#E91E63","#FFEB3B"][p];
            ctx.beginPath(); ctx.arc(px, py, 5 - t * 3, 0, Math.PI * 2); ctx.fill();
        }
        // 이모지 위로 올라가며 페이드
        ctx.globalAlpha = Math.max(0, 1 - t);
        ctx.font = `${Math.max(4, 20 * (1 - t * 0.5))}px system-ui`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(fx.emoji, fx.x, fx.y - t * 25);
        // 💥 텍스트
        if (t < 0.5) {
            ctx.globalAlpha = Math.max(0, 1 - t * 2);
            ctx.font = "bold 16px system-ui";
            ctx.fillStyle = "#FF5722";
            ctx.fillText("💥", fx.x, fx.y - 20);
        }
        if (fx.timer <= 0) state.fruitDestroyFx.splice(i, 1);
    }
    ctx.globalAlpha = 1;
}

/* ── 메시지 토스트 ── */
function drawMessage() {
    if (!state.message) return;
    state.message.timer--;
    const alpha = clamp(state.message.timer / 30, 0, 1);
    ctx.globalAlpha = alpha;
    const tw = ctx.measureText(state.message.text).width;
    const mw = Math.min(CW - 40, tw + 40);
    const mx = (CW - mw) / 2;
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    roundRect(mx, 50, mw, 36, 8);
    ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "13px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(state.message.text, CW / 2, 68);
    ctx.globalAlpha = 1;
    if (state.message.timer <= 0) state.message = null;
}

/* ── 진화 연출 (전체화면) ── */
function drawEvolving() {
    const evo = state.evolvingEvo;
    state.evolvingTimer++;

    ctx.fillStyle = "#0a0a1a"; ctx.fillRect(0, 0, CW, CH);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    if (state.evolvingTimer < 60) {
        const flash = Math.sin(state.evolvingTimer * 0.3) * 0.5 + 0.5;
        ctx.globalAlpha = flash;
        drawSprite("이브이.png", CW / 2, CH / 2, 1, 60 + state.evolvingTimer * 0.3);
        ctx.globalAlpha = 1;
        ctx.fillStyle = "#fff"; ctx.font = "bold 20px system-ui";
        ctx.fillText("...?!", CW / 2, CH / 2 + 60);
    } else {
        const alpha = clamp((state.evolvingTimer - 60) / 20, 0, 1);
        ctx.globalAlpha = alpha;
        drawSprite(evo.img, CW / 2, CH / 2, 1, 80);
        ctx.globalAlpha = 1;
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 26px system-ui";
        ctx.fillText(`${evo.name}(으)로 진화!`, CW / 2, CH / 2 + 110);
        ctx.fillStyle = "#aaa"; ctx.font = "15px system-ui";
        ctx.fillText(`${evo.type} 타입`, CW / 2, CH / 2 + 100);

        if (state.evolvingTimer >= 120) {
            const a = Math.sin(frame * 0.05) * 0.3 + 0.7;
            ctx.globalAlpha = a;
            ctx.fillStyle = "#fff"; ctx.font = "16px system-ui";
            ctx.fillText("터치하여 계속", CW / 2, CH / 2 + 150);
            ctx.globalAlpha = 1;
        }
    }
}

/* ── 타이틀 ── */
function drawEnding() {
    state.endingTimer++;
    ctx.fillStyle = "#0a0a1a"; ctx.fillRect(0, 0, CW, CH);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    // 타이틀
    const alpha = clamp(state.endingTimer / 40, 0, 1);
    ctx.globalAlpha = alpha;

    ctx.fillStyle = "#FFD54F"; ctx.font = "bold 28px system-ui";
    ctx.fillText("★ 축하합니다! ★", CW / 2, 80);

    ctx.fillStyle = "#ddd"; ctx.font = "16px system-ui";
    ctx.fillText("모든 이브이 진화형을 수집했습니다!", CW / 2, 115);

    // 이브이 행진
    const evoCount = EVOS.length;
    for (let i = 0; i < evoCount && i < state.endingTimer / 3; i++) {

    // 리더보드
    if (state.endingTimer > 60) {
        const boardAlpha = clamp((state.endingTimer - 60) / 30, 0, 1);
        ctx.globalAlpha = boardAlpha;

        const by = 330;
        ctx.fillStyle = "rgba(30,30,55,0.9)";
        ctx.strokeStyle = "#FFD54F"; ctx.lineWidth = 2;
        roundRect(50, by, CW - 100, 180, 12); ctx.fill(); ctx.stroke();

        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 18px system-ui";
        ctx.fillText("📊 기록", CW / 2, by + 30);

        ctx.fillStyle = "#ddd"; ctx.font = "15px system-ui";
        ctx.textAlign = "left";
        const lx = 90, rx = CW - 90;

        ctx.fillText("🔍 총 탐색 횟수", lx, by + 65);
        ctx.textAlign = "right"; ctx.fillStyle = "#4FC3F7";
        ctx.fillText(`${state.totalExplores}회`, rx, by + 65);

        ctx.textAlign = "left"; ctx.fillStyle = "#ddd";
        ctx.fillText("⚔️ 최고 스테이지", lx, by + 95);
        ctx.textAlign = "right"; ctx.fillStyle = "#FF5722";
        ctx.fillText(`Lv.${state.monsterMaxStage}`, rx, by + 95);

        ctx.textAlign = "left"; ctx.fillStyle = "#ddd";
        ctx.fillText("🐾 수집한 이브이", lx, by + 155);
        ctx.textAlign = "right"; ctx.fillStyle = "#FF69B4";
        ctx.fillText(`${state.collected.size}종`, rx, by + 155);
    }

    // 계속 버튼
    if (state.endingTimer > 100) {
        const a = Math.sin(frame * 0.05) * 0.3 + 0.7;
        ctx.globalAlpha = a;
        ctx.fillStyle = "#fff"; ctx.font = "15px system-ui"; ctx.textAlign = "center";
        ctx.fillText("터치하여 농장으로 돌아가기", CW / 2, CH - 50);
    }
    ctx.globalAlpha = 1;
}

/* ── roundRect helper ── */
function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
}

/* ═══════════════════════════════════════════
   11. INPUT HANDLING
   ═══════════════════════════════════════════ */
function handleInput() {
    const click = consumeClick();
    if (!click) return;
    const { x, y } = click;

    // 처치 대기 중 스킵 버튼 (버튼바 위)
    if (state.monsterKillAnim > 0 && state.monster) {
        const totalKill = state.monster.isBoss ? 600 : 420;
        const elapsed = totalKill - state.monsterKillAnim;
        if (elapsed > 40) {
            const skipW = 140, skipH = 34;
            const skipX = CW / 2 - skipW / 2, skipY = BTN_Y - 86;
            if (hitBox(x, y, skipX, skipY, skipW, skipH)) {
                state.monsterKillAnim = 1;
                return;
            }
        }
    }

    // 팝업 우선
    if (state.popup) {
        if (state.popup.type === "feed_current") {
            const invFruits = Object.entries(state.inventory).filter(([n]) => FRUITS.includes(n));
            const invOthers = Object.entries(state.inventory).filter(([n]) => !FRUITS.includes(n));
            const frRows = Math.ceil(invFruits.length / 3);
            const otRows = Math.ceil(invOthers.length / 3);
            const pw = 320;
            let ph = 50;
            if (invFruits.length > 0) ph += 20 + frRows * 36;
            if (invOthers.length > 0) ph += 20 + otRows * 36;
            ph += 10;
            const px = (CW - pw) / 2, py = Math.max(10, (CH - ph) / 2);
            const cols = 3;
            let curY = py + 50;
            // 열매 클릭 → 팝업 유지
            if (invFruits.length > 0) {
                curY += 20;
                for (let i = 0; i < invFruits.length; i++) {
                    const [name] = invFruits[i];
                    const col = i % cols, row = Math.floor(i / cols);
                    const fbx = px + 10 + col * 100, fby = curY + row * 36, fbw = 92, fbh = 30;
                    if (hitBox(x, y, fbx, fby, fbw, fbh)) {
                        feedItem(name);
                        return;
                    }
                }
                curY += Math.ceil(invFruits.length / cols) * 36;
            }
            // 아이템 클릭 → 팝업 닫기
            if (invOthers.length > 0) {
                curY += 20;
                for (let i = 0; i < invOthers.length; i++) {
                    const [name] = invOthers[i];
                    const col = i % cols, row = Math.floor(i / cols);
                    const fbx = px + 10 + col * 100, fby = curY + row * 36, fbw = 92, fbh = 30;
                    if (hitBox(x, y, fbx, fby, fbw, fbh)) {
                        feedItem(name);
                        state.popup = null;
                        return;
                    }
                }
            }
            if (!hitBox(x, y, px, py, pw, ph)) { state.popup = null; }
            return;
        }
        if (state.popup.type === "feed_farm") {
            const availFruits = [...FRUITS, "태양조각", "달조각"].filter(f => hasItem(f));
            const fruitRows = Math.ceil(availFruits.length / 3);
            const pw = 300, ph = availFruits.length > 0 ? 90 + fruitRows * 36 : 130;
            const px = (CW - pw) / 2, py = Math.max(10, (CH - ph) / 2);
            if (availFruits.length > 0) {
                const cols = 3;
                for (let i = 0; i < availFruits.length; i++) {
                    const col = i % cols, row = Math.floor(i / cols);
                    const fbx = px + 15 + col * 92, fby = py + 82 + row * 36, fbw = 85, fbh = 30;
                    if (hitBox(x, y, fbx, fby, fbw, fbh)) {
                        feedFarmEevee(state.popup.farmIdx, availFruits[i]);
                        return;
                    }
                }
            }
            if (!hitBox(x, y, px, py, pw, ph)) { state.popup = null; state.selectedFarmEevee = null; }
            return;
        }
        if (state.popup.type === "cheat") {
            const pw = 280, ph = 260;
            const px = (CW - pw) / 2, py = BTN_Y - ph - 10;
            const types = ["items","friendship_max","friendship_zero","stamina","explore","unlock_base8","unlock_all"];
            for (let i = 0; i < types.length; i++) {
                const bx = px + 15, by = py + 38 + i * 36, bw = pw - 30, bh = 30;
                if (hitBox(x, y, bx, by, bw, bh)) {
                    applyCheat(types[i]);
                    return;
                }
            }
            if (!hitBox(x, y, px, py, pw, ph)) { state.popup = null; }
            return;
        }
        if (state.popup.type === "confirm_reset") {
            const pw = 300, ph = 130;
            const px = (CW - pw) / 2, py = BTN_Y - ph - 10;
            const ybw = (pw - 50) / 2, yby = py + 80, ybh = 34;
            const ybx = px + 20;
            const nbx = px + pw - 20 - ybw;
            if (hitBox(x, y, ybx, yby, ybw, ybh)) {
                // 삭제하고 시작
                deleteSave();
                openNicknameInput();
            } else if (hitBox(x, y, nbx, yby, ybw, ybh)) {
                state.popup = null;
            }
            return;
        }
        if (state.popup.type === "exploring") {
            if (state.popupTimer >= 75) {
                state.popup = null;
            }
            return;
        }
        if (state.popup.type === "nickname_input") {
            const pw = 300, ph = 150;
            const px = (CW - pw) / 2, py = BTN_Y - ph - 10;
            const buf = state._nicknameBuffer || "";
            if (buf.length >= 2 && hitBox(x, y, px + pw / 2 - 50, py + 108, 100, 30)) {
                state.playerName = buf;
                if (!state.playerId) state.playerId = generatePlayerId();
                state.popup = null;
                closeNicknameInput();
                if (state.scene === "title") {
                    resetCurrentEevee();
                    startGame();
                }
                saveGame();
            }
            return;
        }
        if (state.popup.type === "leaderboard") {
            state.popup = null;
            return;
        }
        if (state.popup.type === "leaderboard_loading") return; // 로딩 중 닫기 차단
        if (state.popupTimer > 15) {
            state.popup = null;
        }
        return;
    }

    // 엔딩
    if (state.scene === "ending") {
        if (state.endingTimer >= 100) {
            state.scene = "farm";
            showMessage("이브이가 한 마리 더 놀러왔다!", 180);
        }
        return;
    }

    // 진화 연출
    if (state.scene === "evolving") {
        if (state.evolvingTimer >= 120) {
            if (allComplete() && !state.endingShown) {
                state.endingShown = true;
                // 보너스 이브이: 현재 이브이를 농장으로 이동
                if (state.currentEevee) {
                    state.farm.push({
                        ...state.currentEevee,
                        evoId: null,
                        sprite: "이브이.png",
                        activity: ACTIVITY_BASE_MAX,
                    });
                    state.currentEevee = null;
                }
                // 전 이브이 기본 스탯 보정
                for (const e of state.farm) {
                    e.activity = Math.min(getActivityMax(), (e.activity || 0) + 10);
                }
                state.scene = "ending";
                state.endingTimer = 0;
            } else {
                finishPostEvolution();
                if (state._base8Alert) {
                    state._base8Alert = false;
                    showMessage("도감에 새로운 페이지가 추가되었다!", 250);
                }
                // 이브이 자동 등장 없음 → 농장으로 복귀, 둥지에서 소환 유도
                state.scene = "farm";
                showMessage("둥지에서 새 이브이를 불러오세요!", 180);
            }
        }
        return;
    }

    // 새 이브이 등장 연출
    if (state.scene === "new_eevee") {
        if (state.newEeveeTimer >= 90) {
            state.scene = "farm";
        }
        return;
    }

    // 타이틀
    if (state.scene === "title") {
        if (hasSave()) {
            const by1 = CH / 2 + 110;
            const by2 = CH / 2 + 160;
            if (hitBox(x, y, CW / 2 - 90, by1, 180, 40)) {
                // 이어하기
                loadGame();
                // 닉네임 없으면 입력 요청
                if (!state.playerName) {
                    openNicknameInput();
                }
                return;
            }
            if (hitBox(x, y, CW / 2 - 90, by2, 180, 36)) {
                // 처음부터 확인 팝업
                state.popup = { type: "confirm_reset" };
                state.popupTimer = 0;
                return;
            }
        } else {
            const by1 = CH / 2 + 110;
            if (hitBox(x, y, CW / 2 - 90, by1, 180, 40)) {
                openNicknameInput();
            }
        }
        return;
    }

    // 패널 열려있을 때
    if (state.panel && state.panelSlide > 0.8) {
        const panelTop = lerp(CH, panelTopTarget(), state.panelSlide);

        if (y < panelTop) {
            // 패널 바깥 클릭 → 닫기
            state.panel = null;
            return;
        }

        // 패널 내부 클릭
        const contentY = panelTop + 30;

        if (state.panel === "explore") {
            // 이브이 선택 단계 (그리드)
            if (state.expeditionSelect) {
                const picked = state.expeditionPicked || [];
                const coopMax = getCoopMax();

                // 출동 버튼
                if (picked.length > 0 && hitBox(x, y, CW / 2 - 80, CH - 50, 100, 30)) {
                    sendExpedition(state.expeditionSelect.locId, [...picked]);
                    state.expeditionPicked = [];
                    return;
                }
                // 뒤로가기
                if (hitBox(x, y, CW / 2 + 30, CH - 50, 60, 30)) {
                    state.expeditionSelect = null;
                    state.expeditionPicked = [];
                    return;
                }

                // 이브이 토글 선택
                const allEe = [];
                if (state.currentEevee && !isOnExpedition("current")) allEe.push("current");
                state.farm.forEach((e, i) => { if (!isOnExpedition(i) && EVOS.find(ev => ev.id === e.evoId)) allEe.push(i); });

                const GRID_COLS = 4;
                const CELL_W = 100, CELL_H = 80;
                const gridLeft = (CW - GRID_COLS * CELL_W) / 2;
                const startY = lerp(CH, panelTopTarget(), state.panelSlide) + 30;
                const gridTop = startY + 38;
                const gridBot = CH - 55;
                for (let i = 0; i < allEe.length; i++) {
                    const col = i % GRID_COLS, row = Math.floor(i / GRID_COLS);
                    const cx = gridLeft + col * CELL_W + CELL_W / 2;
                    const cy = gridTop + row * CELL_H + CELL_H / 2 - (state.eeSelectScroll || 0);
                    if (cy + CELL_H / 2 < gridTop || cy - CELL_H / 2 > gridBot) continue;
                    if (hitBox(x, y, cx - CELL_W / 2 + 4, cy - CELL_H / 2 + 4, CELL_W - 8, CELL_H - 8)) {
                        const idx = picked.indexOf(allEe[i]);
                        if (idx >= 0) {
                            picked.splice(idx, 1); // 해제
                        } else if (picked.length < coopMax) {
                            picked.push(allEe[i]); // 선택
                        }
                        state.expeditionPicked = picked;
                        // 탐색 능력 토스트 표시
                        const selRef = allEe[i];
                        const selEe = selRef === "current" ? null : state.farm[selRef];
                        const selEvo = selEe ? EVOS.find(ev => ev.id === selEe.evoId) : null;
                        if (selEvo && selEvo.abilityTag && idx < 0) {
                            const exploreAbilities = {
                                "explore_fruit2": "열매 드롭 2개 확정!",
                                "explore_speed": "탐색 시간 50% 단축!",
                                "explore_fastest": "탐색 시간 60% 단축!",
                                "explore_rare": "희귀 아이템 확률 2배!",
                                "explore_night": "밤 탐색지 아이템 100%!",
                                "explore_extra": "아이템 추가 1개!",
                                "leafeon": "열매 드롭 확률 UP!",
                                "sylveon": "활동성 소모 없음!",
                            };
                            const msg = exploreAbilities[selEvo.abilityTag];
                            if (msg) state._expAbilityToast = { text: `⚡${selEvo.name}: ${msg}`, timer: 90 };
                        }
                        return;
                    }
                }
                return;
            }

            // 통합 스크롤 영역 클릭 처리
            const py2 = lerp(CH, panelTopTarget(), state.panelSlide) + 30;
            const scrollTop = py2 + 35;
            let curY2 = scrollTop - state.expScroll;

            // 가속 버튼 클릭
            for (let ei = 0; ei < state.expeditions.length; ei++) {
                if (hasItem("가속장치") && hitBox(x, y, CW - 55, curY2 + 2, 28, 18)) {
                    removeItem("가속장치");
                    const exp = state.expeditions[ei];
                    const elapsed = Date.now() - exp.startTime;
                    const remain = exp.duration - elapsed;
                    if (remain > 0) exp.duration -= Math.floor(remain * (1 - 1/1.5));
                    showMessage("⏩ 탐색 가속! (x1.5)", 60);
                    return;
                }
                curY2 += 32;
            }
            if (state.expeditions.length > 0) curY2 += 8;

            // 장소 선택 단계
            if (state.expeditions.length >= getExpSlots()) return;

            const locs = state.turnLocations || [];
            const CELL_W2 = CW / 4, LOC_CELL_H2 = 80;
            const locStartY2 = curY2 + 5;
            // 탐색지 3개
            for (let i = 0; i < locs.length; i++) {
                const cx = CELL_W2 * i + CELL_W2 / 2;
                const cy = locStartY2 + LOC_CELL_H2 / 2;
                if (hitBox(x, y, cx - CELL_W2 / 2, cy - LOC_CELL_H2 / 2, CELL_W2, LOC_CELL_H2)) {
                    doExplore(locs[i]);
                    return;
                }
            }
            // 새로고침 버튼 (4번째 칸)
            const rcx2 = CELL_W2 * 3 + CELL_W2 / 2;
            const rcy2 = locStartY2 + LOC_CELL_H2 / 2;
            if (hitBox(x, y, rcx2 - CELL_W2 / 2, rcy2 - LOC_CELL_H2 / 2, CELL_W2, LOC_CELL_H2)) {
                if ((state.exploreRefresh || 0) > 0) {
                    state.exploreRefresh--;
                    rollTurnLocations();
                    showMessage(`탐색지 새로고침! (${state.exploreRefresh}/${getRefreshMax()})`, 60);
                } else {
                    showMessage("새로고침 횟수가 부족합니다!", 60);
                }
                return;
            }
        } else if (state.panel === "inventory") {
            const listTop = contentY + 20;
            const ITEM_H = 42;
            const HEADER_H = 24;
            const COL_W = (CW - 50) / 2;
            const leftX = 15;
            const rightX = leftX + COL_W + 20;
            const craftable = Object.keys(RECIPES).filter(r => hasItem(RECIPES[r].material, RECIPES[r].count));
            let cy = listTop - state.invScroll;
            for (const name of craftable) {
                if (hitBox(x, y, 20, cy, CW - 40, 32)) { tryCraft(name); return; }
                cy += 38;
            }
            const { fruits, others } = getInventorySections();
            const colStartY = cy;
            // 열매 컬럼 클릭
            for (let i = 0; i < fruits.length; i++) {
                const [name] = fruits[i];
                const bx = leftX, bw = COL_W;
                const by = colStartY + HEADER_H + i * ITEM_H;
                if (by + 38 < listTop) continue;
                if (by > CH) break;
                const dbx = bx + bw - 38;
                if (hitBox(x, y, dbx, by + 5, 34, 26)) { dropItem(name); return; }
            }
            // 아이템 컬럼 클릭
            for (let i = 0; i < others.length; i++) {
                const [name] = others[i];
                const bx = rightX, bw = COL_W;
                const by = colStartY + HEADER_H + i * ITEM_H;
                if (by + 38 < listTop) continue;
                if (by > CH) break;
                const dbx2 = bx + bw - 38;
                if (hitBox(x, y, dbx2, by + 5, 34, 26)) { dropItem(name); return; }
            }
        } else if (state.panel === "dex") {
            // 도감은 클릭 동작 없음
        }
        return;
    }

    // 둥지 클릭
    if (canSummonEevee() && hitBox(x, y, CW / 2 - 80, BTN_Y - 52, 160, 28)) {
        summonEevee();
        return;
    }

    // 바닥 아이템 터치 → 회수 (최우선)
    for (let i = state.farmItems.length - 1; i >= 0; i--) {
        const item = state.farmItems[i];
        const scr = worldToScreen(item.wx, item.wy);
        if (Math.abs(x - scr.sx) < 18 && Math.abs(y - scr.sy) < 18) {
            addItem(item.name);
            state.farmItems.splice(i, 1);
            showMessage(`${itemEmoji(item.name)} ${item.name} 회수!`, 60);
            saveGame();
            return;
        }
    }

    // 현재 이브이 터치 → 아이템 선택 팝업 (파견 중이면 무시)
    if (state.currentEevee && !isOnExpedition("current")) {
        const ce = state.currentEevee;
        const scr = worldToScreen(ce.wx, ce.wy);
        const sz = spriteSize(ce.wy);
        if (Math.abs(x - scr.sx) < sz && y > scr.sy - sz * 1.3 && y < scr.sy + 15) {
            state.popup = { type: "feed_current" };
            state.popupTimer = 0;
            return;
        }
    }

    // 농장 이브이 터치 (파견 중 제외)
    for (let i = state.farm.length - 1; i >= 0; i--) {
        if (isOnExpedition(i)) continue;
        const e = state.farm[i];
        const scr = worldToScreen(e.wx, e.wy);
        const sz = spriteSize(e.wy);
        if (Math.abs(x - scr.sx) < sz && y > scr.sy - sz * 1.3 && y < scr.sy + 15) {
            state.selectedFarmEevee = i;
            state.popup = { type: "feed_farm", farmIdx: i };
            state.popupTimer = 0;
            return;
        }
    }

    // 농장 하단 버튼
    for (const btn of BUTTONS) {
        if (btn.id === "hint" && allComplete()) continue;
        if (hitBox(x, y, btn.x, BTN_Y, btn.w, BTN_H)) {
            if (btn.id === "explore") {
                state.panel = "explore"; state.panelSlide = 0; state.expScroll = 0;
            } else if (btn.id === "bag") {
                state.panel = "inventory"; state.panelSlide = 0; state.invScroll = 0;
                state.bagHighlight = false;
            } else if (btn.id === "hint") {
                getHint();
            } else if (btn.id === "dex") {
                state.panel = "dex"; state.panelSlide = 0; state.dexScroll = 0;
            } else if (btn.id === "rank") {
                if (state.popup && state.popup.type === "leaderboard_loading") return;
                fetchLeaderboard();
            }
            return;
        }
    }
}

/* ═══════════════════════════════════════════
   12. MAIN LOOP
   ═══════════════════════════════════════════ */
function loop() {
    frame++;
    ctx.clearRect(0, 0, CW, CH);

    if (imagesLoaded < totalImages) {
        ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, CW, CH);
        ctx.fillStyle = "#fff"; ctx.font = "16px system-ui";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(`로딩 중... ${imagesLoaded}/${totalImages}`, CW / 2, CH / 2);
        requestAnimationFrame(loop); return;
    }

    handleInput();
    checkExpeditionReturns();
    if (state.scene === "farm") updateDayNight();
    if (state.scene === "farm") updateFarmBattle();

    // 패널 슬라이드 애니메이션
    if (state.panel) {
        state.panelSlide = Math.min(1, state.panelSlide + 0.08);
    } else {
        state.panelSlide = Math.max(0, state.panelSlide - 0.12);
    }

    if (state.scene === "title") {
        drawTitle();
        if (state.popup) drawPopup();
    } else if (state.scene === "evolving") {
        drawEvolving();
    } else if (state.scene === "ending") {
        drawEnding();
    } else if (state.scene === "new_eevee") {
        state.newEeveeTimer++;
        // 농장 배경
        updateFarmEntities();
        ctx.drawImage(getBgCache(), 0, 0);

        // 새 이브이를 왼쪽에서 걸어오게
        const ce = state.currentEevee;
        const t = Math.min(state.newEeveeTimer / 60, 1); // 0~1 (60프레임 이동)
        ce.wy = lerp(1.15, 0.5, t);
        ce.aiState = t < 1 ? "walk" : "idle";
        ce.facing = 1;

        drawFarmEntities();

        // 말풍선
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        if (state.newEeveeTimer > 50) {
            const scr = worldToScreen(ce.wx, ce.wy);
            const alpha = clamp((state.newEeveeTimer - 50) / 20, 0, 1);
            ctx.globalAlpha = alpha;
            // 말풍선 배경
            ctx.fillStyle = "rgba(255,255,255,0.9)";
            roundRect(scr.sx - 40, scr.sy - spriteSize(ce.wy) - 28, 80, 24, 8);
            ctx.fill();
            // 꼬리
            ctx.beginPath();
            ctx.moveTo(scr.sx - 5, scr.sy - spriteSize(ce.wy) - 4);
            ctx.lineTo(scr.sx, scr.sy - spriteSize(ce.wy) + 2);
            ctx.lineTo(scr.sx + 5, scr.sy - spriteSize(ce.wy) - 4);
            ctx.fill();
            // 텍스트
            ctx.fillStyle = "#333"; ctx.font = "bold 12px system-ui";
            ctx.fillText("안녕!", scr.sx, scr.sy - spriteSize(ce.wy) - 16);
            ctx.globalAlpha = 1;
        }

        drawHUD();

        // 안내
        if (state.newEeveeTimer >= 60) {
            const a = Math.sin(frame * 0.05) * 0.3 + 0.7;
            ctx.globalAlpha = a;
            ctx.fillStyle = "#fff"; ctx.font = "15px system-ui";
            ctx.fillText("새 이브이가 놀러왔다!", CW / 2, CH - 100);
            ctx.font = "13px system-ui"; ctx.fillStyle = "#aaa";
            ctx.fillText("터치하여 계속", CW / 2, CH - 75);
            ctx.globalAlpha = 1;
        }
    } else {
        // 농장 (항상 배경 - 캐시 사용)
        updateFarmEntities();
        ctx.drawImage(getBgCache(), 0, 0);
        drawFarmEntities();
        drawMonster();
        drawFruitDestroyFx();
        // 둥지 버튼 (이브이 없을 때 - 하단 버튼 바로 위)
        if (canSummonEevee()) {
            const nx = CW / 2, ny = BTN_Y - 38;
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            roundRect(nx - 80, ny - 14, 160, 28, 8); ctx.fill();
            ctx.strokeStyle = "#FFD54F"; ctx.lineWidth = 1.5;
            roundRect(nx - 80, ny - 14, 160, 28, 8); ctx.stroke();
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.font = "bold 12px system-ui"; ctx.fillStyle = "#FFD54F";
            ctx.fillText(`🥚 이브이 소환 (열매x${getNestCost()})`, nx, ny);
        }
        drawHUD();
        drawFarmButtons();
        drawMessage();

        // 패널 오버레이
        if (state.panelSlide > 0.01) {
            if (state.panel === "explore") drawExplorePanel();
            else if (state.panel === "inventory") drawInventoryPanel();
            else if (state.panel === "dex") drawDexPanel();
        }

        // 팝업
        drawPopup();
    }

    requestAnimationFrame(loop);
}

loop();
</script>
