              ctx.fillStyle = "rgba(200,210,220,0.15)";
              for (let i=0;i<3;i++){
                  ctx.beginPath(); ctx.ellipse(CW/2+Math.sin(t*0.01+i)*40,sceneH*0.6+i*20,120,15,0,0,Math.PI*2); ctx.fill();
              }
              // 드래곤 실루엣 (먼 곳)
              ctx.fillStyle = "rgba(30,40,50,0.3)";
              const dx=CW/2+Math.sin(t*0.015)*30, dy=sceneH*0.2+Math.cos(t*0.02)*10;
              ctx.beginPath(); ctx.ellipse(dx,dy,25,8,0.1,0,Math.PI*2); ctx.fill();
              ctx.beginPath(); ctx.ellipse(dx-20,dy-2,12,18,-0.3,0,Math.PI*2); ctx.fill();
              ctx.beginPath(); ctx.ellipse(dx+20,dy-2,12,18,0.3,0,Math.PI*2); ctx.fill();
            } break;

        default: // 기본
            { ctx.fillStyle = "#2A2A3A"; ctx.fillRect(0,0,CW,sceneH); }
    }
}

function drawPopup() {
    if (!state.popup) return;
    state.popupTimer++;
    const p = state.popup;
    // 팝업 타입별 크기
    const isFeedCurrent = p.type === "feed_current";
    const isFeedFarm = p.type === "feed_farm";
    let pw = 300, ph = 140;
    if (isFeedCurrent) {
        const invFruits = Object.keys(state.inventory).filter(n => FRUITS.includes(n));
        const invOthers = Object.keys(state.inventory).filter(n => !FRUITS.includes(n));
        const frRows = Math.ceil(invFruits.length / 3);
        const otRows = Math.ceil(invOthers.length / 3);
        pw = 320;
        ph = 50; // title + friendship
        if (invFruits.length > 0) ph += 20 + frRows * 36;
        if (invOthers.length > 0) ph += 20 + otRows * 36;
        ph += 10;
    } else if (isFeedFarm) {
        const af = FRUITS.filter(f => hasItem(f));
        const fruitRows = Math.ceil(af.length / 3);
        ph = af.length > 0 ? 90 + fruitRows * 36 : 130;
    } else if (p.type === "cheat") {
        pw = 280; ph = 260;
    } else if (p.type === "confirm_reset") {
        pw = 300; ph = 130;
    }
    const px = (CW - pw) / 2, py = (CH - ph) / 2 - 30;

    // 배경 딤
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(0, 0, CW, CH);

    // 팝업 박스
    ctx.fillStyle = "rgba(30,30,55,0.95)";
    ctx.strokeStyle = "#7B73FF";
    ctx.lineWidth = 2;
    roundRect(px, py, pw, ph, 12);
    ctx.fill(); ctx.stroke();

    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    if (p.type === "exploring") {
        // 팝업 크기
        const epw = 340, eph = 260;
        const epx = (CW - epw) / 2, epy = (CH - eph) / 2 - 30;

        // 배경 딤
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(0, 0, CW, CH);

        // 팝업 박스
        ctx.fillStyle = "rgba(25,25,45,0.95)";
        ctx.strokeStyle = "#7B73FF"; ctx.lineWidth = 2;
        roundRect(epx, epy, epw, eph, 12); ctx.fill(); ctx.stroke();

        // 지역 미니 뷰 (팝업 상단에 작은 풍경)
        ctx.save();
        ctx.beginPath(); ctx.roundRect(epx + 10, epy + 10, epw - 20, 100, 8); ctx.clip();
        ctx.translate(epx + 10, epy + 10);
        ctx.scale((epw - 20) / CW, 100 / (CH - 180));
        drawLocationScene(p.locationId, p.attr);
        ctx.restore();

        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        const EXPLORE_DURATION = 75;
        const cx = epx + epw / 2;

        if (state.popupTimer < EXPLORE_DURATION) {
            // 진행 중
            ctx.fillStyle = "#fff"; ctx.font = "bold 15px system-ui";
            ctx.fillText(`${p.locationName} 탐색 중...`, cx, epy + 130);

            // 진행 바
            const barW = epw - 60, barH = 6;
            const bx = epx + 30, by = epy + 148;
            ctx.fillStyle = "#333"; ctx.fillRect(bx, by, barW, barH);
            ctx.fillStyle = "#FFD54F";
            ctx.fillRect(bx, by, barW * (state.popupTimer / EXPLORE_DURATION), barH);
            ctx.strokeStyle = "#555"; ctx.lineWidth = 0.5; ctx.strokeRect(bx, by, barW, barH);

            // 이브이 걷기
            const eeveeX = cx - 40 + (state.popupTimer / EXPLORE_DURATION) * 80;
            const bounce = Math.sin(state.popupTimer * 0.15) * 2;
            drawSprite("이브이.png", eeveeX, epy + 195 + bounce, 1, 36);

            // 점 애니메이션
            const dots = ".".repeat(Math.floor(state.popupTimer / 15) % 4);
            ctx.fillStyle = "#888"; ctx.font = "14px system-ui";
            ctx.fillText(dots, cx + 75, epy + 130);
        } else {
            // 결과
            ctx.fillStyle = "#FFD54F"; ctx.font = "bold 16px system-ui";
            ctx.fillText(`${p.locationName} 탐색 완료!`, cx, epy + 128);

            ctx.fillStyle = "#fff"; ctx.font = "bold 20px system-ui";
            ctx.fillText(p.itemName, cx, epy + 165);

            const typeColors = {fruit:"#66BB6A",stone:"#FFD54F",shard:"#CE93D8",material:"#90A4AE",special:"#F48FB1"};
            ctx.fillStyle = typeColors[p.itemType] || "#fff"; ctx.font = "12px system-ui";
            const typeNames = {fruit:"열매",stone:"진화석",shard:"조각",material:"재료",special:"특수"};
            ctx.fillText(typeNames[p.itemType] || "", cx, epy + 192);

            const alpha = Math.sin(frame * 0.05) * 0.3 + 0.7;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = "#888"; ctx.font = "13px system-ui";
            ctx.fillText("터치하여 계속", cx, epy + eph - 18);
            ctx.globalAlpha = 1;
        }
        return;
    }

    if (p.type === "hint") {
        drawSprite("이브이.png", px + pw / 2, py + 45, 1, 40);
        ctx.fillStyle = "#E0E0E0"; ctx.font = "14px system-ui";
        ctx.fillText(p.text, px + pw / 2, py + 85);
        ctx.fillStyle = "#777"; ctx.font = "12px system-ui";
        ctx.fillText("터치하여 계속", px + pw / 2, py + 118);
    } else if (p.type === "feed_current") {
        const ee = state.currentEevee;
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 15px system-ui";
        ctx.fillText("이브이에게 아이템 주기", px + pw / 2, py + 22);
        ctx.fillStyle = "#4FC3F7"; ctx.font = "11px system-ui";
        ctx.fillText(`친밀도: ${Math.round(ee.friendship)} / ${friendshipMax()}`, px + pw / 2, py + 40);
        // 열매와 아이템 분리
        const invFruits = Object.entries(state.inventory).filter(([n]) => FRUITS.includes(n));
        const invOthers = Object.entries(state.inventory).filter(([n]) => !FRUITS.includes(n));
        const cols = 3;
        let curY = py + 50;
        // ── 열매 섹션 ──
        if (invFruits.length > 0) {
            ctx.fillStyle = "#8BC34A"; ctx.font = "bold 11px system-ui";
            ctx.fillText("── 열매 ──", px + pw / 2, curY + 10);
            curY += 20;
            for (let i = 0; i < invFruits.length; i++) {
                const [name, count] = invFruits[i];
                const col = i % cols, row = Math.floor(i / cols);
                const fbx = px + 10 + col * 100, fby = curY + row * 36, fbw = 92, fbh = 30;
                let border = "#555";
                if (ee.knownLiked && name === ee.likedFruit) border = "#4CAF50";
                else if (ee.knownDisliked && name === ee.dislikedFruit) border = "#E53935";
                ctx.fillStyle = "rgba(50,50,90,0.9)"; ctx.strokeStyle = border; ctx.lineWidth = border === "#555" ? 1 : 2;
                roundRect(fbx, fby, fbw, fbh, 5); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#fff"; ctx.font = "11px system-ui";
                ctx.fillText(`${itemEmoji(name)} x${count}`, fbx + fbw / 2, fby + fbh / 2);
            }
            curY += Math.ceil(invFruits.length / cols) * 36;
        }
        // ── 아이템 섹션 ──
        if (invOthers.length > 0) {
            ctx.fillStyle = "#FFD54F"; ctx.font = "bold 11px system-ui";
            ctx.fillText("── 아이템 ──", px + pw / 2, curY + 10);
            curY += 20;
            for (let i = 0; i < invOthers.length; i++) {
                const [name, count] = invOthers[i];
                const col = i % cols, row = Math.floor(i / cols);
                const fbx = px + 10 + col * 100, fby = curY + row * 36, fbw = 92, fbh = 30;
                ctx.fillStyle = "rgba(50,50,90,0.9)"; ctx.strokeStyle = "#555"; ctx.lineWidth = 1;
                roundRect(fbx, fby, fbw, fbh, 5); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "#fff"; ctx.font = "11px system-ui";
                ctx.fillText(`${itemEmoji(name)} x${count}`, fbx + fbw / 2, fby + fbh / 2);
            }
        }
    } else if (p.type === "feed_farm") {
        const e = state.farm[p.farmIdx];
        const evo = EVOS.find(ev => ev.id === e.evoId);
        const ename = evo ? evo.name : "이브이";
        // 스프라이트
        drawSprite(e.sprite, px + 30, py + 30, 1, 28);
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 14px system-ui";
        ctx.textAlign = "left";
        ctx.fillText(ename, px + 50, py + 20);
        ctx.fillStyle = "#aaa"; ctx.font = "11px system-ui";
        ctx.fillText(`${evo ? evo.type : ""} 타입`, px + 50, py + 36);
        // 활동성 바
        ctx.textAlign = "center";
        const actR = clamp((e.activity || 0) / ACTIVITY_MAX, 0, 1);
        ctx.fillStyle = "#444"; ctx.fillRect(px + 15, py + 52, pw - 30, 6);
        ctx.fillStyle = actR >= 0.7 ? "#FF9800" : actR >= 0.3 ? "#FFB74D" : "#795548";
        ctx.fillRect(px + 15, py + 52, (pw - 30) * actR, 6);
        ctx.strokeStyle = "#555"; ctx.lineWidth = 0.5; ctx.strokeRect(px + 15, py + 52, pw - 30, 6);
        ctx.fillStyle = "#999"; ctx.font = "10px system-ui";
        ctx.fillText(`활동성 ${Math.round(e.activity || 0)} / ${ACTIVITY_MAX}`, px + pw / 2, py + 70);
        // 열매 버튼들
        const availFruits = FRUITS.filter(f => hasItem(f));
        if (availFruits.length > 0) {
            const cols = 3;
            for (let i = 0; i < availFruits.length; i++) {
                const col = i % cols, row = Math.floor(i / cols);
                const fbx = px + 15 + col * 92, fby = py + 82 + row * 36, fbw = 85, fbh = 30;
                ctx.fillStyle = "rgba(50,50,90,0.9)"; roundRect(fbx, fby, fbw, fbh, 5); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.font = "12px system-ui";
                ctx.fillText(`${itemEmoji(availFruits[i])} x${itemCount(availFruits[i])}`, fbx + fbw / 2, fby + fbh / 2);
            }
        } else {
            ctx.fillStyle = "#666"; ctx.font = "12px system-ui";
            ctx.fillText("줄 수 있는 열매가 없습니다", px + pw / 2, py + 100);
        }
    } else if (p.type === "confirm_rest") {
        const nextTime = state.timeOfDay === "day" ? "밤" : "낮";
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 16px system-ui";
        ctx.fillText(`휴식하고 ${nextTime}으로 넘길까요?`, px + pw / 2, py + 35);
        ctx.fillStyle = "#aaa"; ctx.font = "13px system-ui";
        ctx.fillText(`탐색지가 변경됩니다`, px + pw / 2, py + 60);
        // 확인 버튼 (간격 축소)
        const ybw = (pw - 50) / 2, yby = py + 85, ybh = 34;
        const ybx = px + 20;
        ctx.fillStyle = "#3a7d44"; roundRect(ybx, yby, ybw, ybh, 6); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "bold 14px system-ui";
        ctx.fillText("확인", ybx + ybw / 2, yby + ybh / 2);
        // 취소 버튼
        const nbx = px + pw - 20 - ybw;
        ctx.fillStyle = "#555"; roundRect(nbx, yby, ybw, ybh, 6); ctx.fill();
        ctx.fillStyle = "#ddd";
        ctx.fillText("취소", nbx + ybw / 2, yby + ybh / 2);
    } else if (p.type === "cheat") {
        ctx.fillStyle = "#FF5722"; ctx.font = "bold 15px system-ui";
        ctx.fillText("🔧 DEV CHEAT 🔧", px + pw / 2, py + 22);
        const btns = [
            { label: "모든 아이템 추가", type: "items" },
            { label: "친밀도 MAX", type: "friendship_max" },
            { label: "친밀도 → -1", type: "friendship_zero" },
            { label: "전체 활동성 MAX", type: "stamina" },
            { label: "탐색/휴식 카운트 충전", type: "explore" },
            { label: "기본 8종 해금", type: "unlock_base8" },
        ];
        for (let i = 0; i < btns.length; i++) {
            const bx = px + 15, by = py + 38 + i * 36, bw = pw - 30, bh = 30;
            ctx.fillStyle = "rgba(50,50,90,0.9)"; ctx.strokeStyle = "#FF5722"; ctx.lineWidth = 1;
            roundRect(bx, by, bw, bh, 5); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#fff"; ctx.font = "13px system-ui";
            ctx.fillText(btns[i].label, bx + bw / 2, by + bh / 2);

    } else if (p.type === "confirm_reset") {
        ctx.fillStyle = "#FF5722"; ctx.font = "bold 16px system-ui";
        ctx.fillText("처음부터 시작할까요?", px + pw / 2, py + 30);
        ctx.fillStyle = "#aaa"; ctx.font = "13px system-ui";
        ctx.fillText("모든 진행 상황이 삭제됩니다", px + pw / 2, py + 55);
        // 확인
        const ybw = (pw - 50) / 2, yby = py + 80, ybh = 34;
        const ybx = px + 20;
        ctx.fillStyle = "#c0392b"; roundRect(ybx, yby, ybw, ybh, 6); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "bold 14px system-ui";
        ctx.fillText("삭제하고 시작", ybx + ybw / 2, yby + ybh / 2);
        // 취소
        const nbx = px + pw - 20 - ybw;
        ctx.fillStyle = "#555"; roundRect(nbx, yby, ybw, ybh, 6); ctx.fill();
        ctx.fillStyle = "#ddd";
        ctx.fillText("취소", nbx + ybw / 2, yby + ybh / 2);
    }
}

/* ── 전투 팝업 ── */
function drawBattle() {
    ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, 0, CW, CH);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    const bs = state.battleScene;
    const enemy = state.battleEnemy;
    const pw = 420, ph = bs === "select" ? 585 : 380;
    const px = (CW - pw) / 2, py = (CH - ph) / 2;
    ctx.fillStyle = "rgba(15,15,35,0.95)";
    ctx.strokeStyle = "#FF5722"; ctx.lineWidth = 2;
    roundRect(px, py, pw, ph, 14); ctx.fill(); ctx.stroke();

    if (bs === "select") {
        // 보스 이미지
        ctx.font = "50px system-ui";
        ctx.fillText("👹", CW / 2, py + 45);

        // 스테이지 + 이름
        ctx.fillStyle = "#FF5722"; ctx.font = "bold 14px system-ui";
        ctx.fillText(`⚔ 스테이지 ${state.battleStage}`, CW / 2, py + 78);
        ctx.fillStyle = "#fff"; ctx.font = "bold 15px system-ui";
        ctx.fillText(enemy.name, CW / 2, py + 98);
        ctx.fillStyle = "#aaa"; ctx.font = "11px system-ui";
        ctx.fillText(`${enemy.type}타입`, CW / 2, py + 115);

        // HP 바
        const hpRatio = enemy.hp / enemy.maxHp;
        const barX = px + 30, barY = py + 125, barW = pw - 60, barH = 14;
        ctx.fillStyle = "#222"; roundRect(barX, barY, barW, barH, 4); ctx.fill();
        ctx.fillStyle = hpRatio > 0.5 ? "#4CAF50" : hpRatio > 0.2 ? "#FF9800" : "#F44336";
        roundRect(barX, barY, barW * hpRatio, barH, 4); ctx.fill();
        ctx.strokeStyle = "#555"; ctx.lineWidth = 0.5;
        roundRect(barX, barY, barW, barH, 4); ctx.stroke();
        ctx.fillStyle = "#fff"; ctx.font = "bold 10px system-ui";
        ctx.fillText(`${enemy.hp} / ${enemy.maxHp}`, CW / 2, barY + barH / 2);

        // 안내
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 12px system-ui";
        ctx.fillText("출전할 이브이를 선택하세요", CW / 2, py + 158);

        // 이브이 목록 (데미지 예상 표시)
        const allEevees = [];
        if (state.currentEevee && !isOnExpedition("current")) allEevees.push({ ref: "current", name: "이브이", img: "이브이.png", ...calcBattlePower({ friendship: state.currentEevee.friendship }) });
        state.farm.forEach((e, i) => {
            if (isOnExpedition(i)) return;
            const evo = EVOS.find(ev => ev.id === e.evoId);
            if (evo) allEevees.push({ ref: i, name: evo.name, img: evo.img, ...calcBattlePower(e) });
        });

        const startY = py + 175;
        for (let i = 0; i < allEevees.length && i < 7; i++) {
            const ee = allEevees[i];
            const by = startY + i * 48;
            const mult = typeMultiplier(ee.type, enemy.type);
            const estDmg = Math.floor(ee.power * mult);

            ctx.fillStyle = mult > 1 ? "rgba(46,125,50,0.2)" : mult < 1 ? "rgba(198,40,40,0.15)" : "rgba(50,50,80,0.4)";
            ctx.strokeStyle = mult > 1 ? "#4CAF50" : "#444"; ctx.lineWidth = 1;
            roundRect(px + 12, by, pw - 24, 42, 6); ctx.fill(); ctx.stroke();

            drawSprite(ee.img, px + 38, by + 24, 1, 28);
            ctx.textAlign = "left";
            ctx.fillStyle = "#fff"; ctx.font = "bold 12px system-ui";
            ctx.fillText(ee.name, px + 58, by + 13);
            ctx.fillStyle = "#aaa"; ctx.font = "10px system-ui";
            ctx.fillText(`${ee.type}`, px + 58, by + 29);
            ctx.textAlign = "right";
            ctx.fillStyle = mult > 1 ? "#4CAF50" : mult < 1 ? "#FF5722" : "#ddd";
            ctx.font = "bold 13px system-ui";
            ctx.fillText(`DMG ~${estDmg}`, px + pw - 20, by + 16);
            if (mult !== 1) { ctx.font = "9px system-ui"; ctx.fillText(mult > 1 ? "유리" : "불리", px + pw - 20, by + 30); }
            ctx.textAlign = "center";
        }

        // 돌아가기
        ctx.fillStyle = "#444"; roundRect(CW / 2 - 45, py + ph - 42, 90, 30, 6); ctx.fill();
        ctx.fillStyle = "#ccc"; ctx.font = "13px system-ui";
        ctx.fillText("돌아가기", CW / 2, py + ph - 27);

    } else if (bs === "fighting") {
        state.battleTimer++;
        const t = state.battleTimer;
        const allyEevee = state.battleAlly === "current" ? state.currentEevee : state.farm[state.battleAlly];
        const allyEvo = state.battleAlly === "current" ? null : EVOS.find(e => e.id === allyEevee.evoId);
        const allyImg = allyEvo ? allyEvo.img : "이브이.png";
        const cx = CW / 2, cy = py + ph / 2 - 30;

        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 14px system-ui";
        ctx.fillText(`스테이지 ${state.battleStage} - ${enemy.name}`, cx, py + 22);

        // HP 바 (상단)
        const hpRatio = enemy.hp / enemy.maxHp;
        const barX = px + 30, barY = py + 35, barW = pw - 60, barH = 12;
        ctx.fillStyle = "#222"; roundRect(barX, barY, barW, barH, 3); ctx.fill();
        ctx.fillStyle = hpRatio > 0.5 ? "#4CAF50" : hpRatio > 0.2 ? "#FF9800" : "#F44336";
        roundRect(barX, barY, barW * hpRatio, barH, 3); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "9px system-ui";
        ctx.fillText(`${enemy.hp} / ${enemy.maxHp}`, cx, barY + barH / 2);

        // 3라운드 공방 연출
        const round = Math.floor(t / 30);
        const rt = (t % 30) / 30;
        const allyHome = cx - 80, enemyHome = cx + 80;

        if (round < 3) {
            const isAllyAttack = round === 0 || round === 2;
            const shake = Math.sin(rt * Math.PI * 4) * (1 - rt) * 3;
            let ax, ex;
            if (isAllyAttack) {
                ax = rt < 0.5 ? lerp(allyHome, cx, rt * 2) : lerp(cx, allyHome, (rt - 0.5) * 2);
                ex = enemyHome + (rt > 0.4 && rt < 0.6 ? shake : 0);
            } else {
                ex = rt < 0.5 ? lerp(enemyHome, cx, rt * 2) : lerp(cx, enemyHome, (rt - 0.5) * 2);
                ax = allyHome + (rt > 0.4 && rt < 0.6 ? shake : 0);
            }
            const bounce = Math.sin(rt * Math.PI) * -8;
            drawSprite(allyImg, ax, cy + bounce, 1, 50);
            ctx.font = "36px system-ui";
            ctx.fillText("👹", ex, cy + bounce);

            if (rt > 0.4 && rt < 0.55) {
                ctx.globalAlpha = (0.55 - rt) * 6;
                ctx.font = "bold 28px system-ui"; ctx.fillStyle = "#FFD54F";
                ctx.fillText("💥", isAllyAttack ? enemyHome : allyHome, cy - 15);
                ctx.globalAlpha = 1;
            }
            ctx.fillStyle = "#888"; ctx.font = "11px system-ui";
            ctx.fillText(`${round + 1} / 3`, cx, py + ph - 20);
        } else {
            const resultT = t - 90;
            drawSprite(allyImg, allyHome, cy, 1, 50);
            ctx.font = "36px system-ui";

            if (state.battleResult === "clear") {
                ctx.globalAlpha = Math.max(0, 1 - resultT / 20);
                ctx.fillText("👹", enemyHome, cy + resultT * 0.5);
                ctx.globalAlpha = 1;
                ctx.fillStyle = "#4CAF50"; ctx.font = "bold 24px system-ui";
                ctx.globalAlpha = clamp(resultT / 15, 0, 1);
                ctx.fillText("처치!", cx, cy + 60);
                ctx.font = "bold 16px system-ui";
                ctx.fillText(`-${state.battleDamage} DMG`, cx, cy + 85);
                ctx.globalAlpha = 1;
            } else {
                ctx.fillText("👹", enemyHome, cy);
                ctx.fillStyle = state.battleCrit ? "#FF1744" : "#FF9800";
                ctx.font = `bold ${state.battleCrit ? 24 : 20}px system-ui`;
                ctx.globalAlpha = clamp(resultT / 15, 0, 1);
                ctx.fillText(`${state.battleCrit ? "💥CRIT " : ""}-${state.battleDamage} DMG`, cx, cy + 60);
                ctx.font = "14px system-ui"; ctx.fillStyle = "#aaa";
                ctx.fillText(`남은 HP: ${enemy.hp}`, cx, cy + 85);
                ctx.globalAlpha = 1;
            }

            if (state.battleReward && resultT > 15) {
                ctx.fillStyle = "#FFD54F"; ctx.font = "bold 14px system-ui";
                ctx.fillText(`🎉 ${state.battleReward}`, cx, cy + 110);
            }
            if (resultT > 30) {
                const pa = Math.sin(frame * 0.05) * 0.3 + 0.7;
                ctx.globalAlpha = pa;
                ctx.fillStyle = "#aaa"; ctx.font = "13px system-ui";
                ctx.fillText("터치하여 계속", cx, py + ph - 20);
                ctx.globalAlpha = 1;
            }
        }
    }
}

/* ── 메시지 토스트 ── */
function drawMessage() {
    if (!state.message) return;
    state.message.timer--;
    const alpha = clamp(state.message.timer / 30, 0, 1);
    ctx.globalAlpha = alpha;
    const tw = ctx.measureText(state.message.text).width;
    const mw = Math.min(CW - 40, tw + 40);
    const mx = (CW - mw) / 2;
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    roundRect(mx, 50, mw, 36, 8);
    ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "13px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(state.message.text, CW / 2, 68);
    ctx.globalAlpha = 1;
    if (state.message.timer <= 0) state.message = null;
}

/* ── 진화 연출 (전체화면) ── */
function drawEvolving() {
    const evo = state.evolvingEvo;
    state.evolvingTimer++;

    ctx.fillStyle = "#0a0a1a"; ctx.fillRect(0, 0, CW, CH);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    if (state.evolvingTimer < 60) {
        const flash = Math.sin(state.evolvingTimer * 0.3) * 0.5 + 0.5;
        ctx.globalAlpha = flash;
        drawSprite("이브이.png", CW / 2, CH / 2, 1, 60 + state.evolvingTimer * 0.3);
        ctx.globalAlpha = 1;
        ctx.fillStyle = "#fff"; ctx.font = "bold 20px system-ui";
        ctx.fillText("...?!", CW / 2, CH / 2 + 60);
    } else {
        const alpha = clamp((state.evolvingTimer - 60) / 20, 0, 1);
        ctx.globalAlpha = alpha;
        drawSprite(evo.img, CW / 2, CH / 2, 1, 80);
        ctx.globalAlpha = 1;
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 26px system-ui";
        ctx.fillText(`${evo.name}(으)로 진화!`, CW / 2, CH / 2 + 70);
        ctx.fillStyle = "#aaa"; ctx.font = "15px system-ui";
        ctx.fillText(`${evo.type} 타입`, CW / 2, CH / 2 + 100);

        if (state.evolvingTimer >= 120) {
            const a = Math.sin(frame * 0.05) * 0.3 + 0.7;
            ctx.globalAlpha = a;
            ctx.fillStyle = "#fff"; ctx.font = "16px system-ui";
            ctx.fillText("터치하여 계속", CW / 2, CH / 2 + 150);
            ctx.globalAlpha = 1;
        }
    }
}

/* ── 타이틀 ── */
function drawEnding() {
    state.endingTimer++;
    ctx.fillStyle = "#0a0a1a"; ctx.fillRect(0, 0, CW, CH);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    // 타이틀
    const alpha = clamp(state.endingTimer / 40, 0, 1);
    ctx.globalAlpha = alpha;

    ctx.fillStyle = "#FFD54F"; ctx.font = "bold 28px system-ui";
    ctx.fillText("★ 축하합니다! ★", CW / 2, 80);

    ctx.fillStyle = "#ddd"; ctx.font = "16px system-ui";
    ctx.fillText("모든 이브이 진화형을 수집했습니다!", CW / 2, 115);

    // 이브이 행진
    const evoCount = EVOS.length;
    for (let i = 0; i < evoCount && i < state.endingTimer / 3; i++) {
        const ex = 40 + (i % 9) * 46;
        const ey = 160 + Math.floor(i / 9) * 55;
        const bounce = Math.sin(frame * 0.06 + i * 0.5) * 2;
        drawSprite(EVOS[i].img, ex, ey + bounce, i % 2 === 0 ? 1 : -1, 28);
    }

    // 리더보드
    if (state.endingTimer > 60) {
        const boardAlpha = clamp((state.endingTimer - 60) / 30, 0, 1);
        ctx.globalAlpha = boardAlpha;

        const by = 330;
        ctx.fillStyle = "rgba(30,30,55,0.9)";
        ctx.strokeStyle = "#FFD54F"; ctx.lineWidth = 2;
        roundRect(50, by, CW - 100, 180, 12); ctx.fill(); ctx.stroke();

        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 18px system-ui";
        ctx.fillText("📊 기록", CW / 2, by + 30);

        ctx.fillStyle = "#ddd"; ctx.font = "15px system-ui";
        ctx.textAlign = "left";
        const lx = 90, rx = CW - 90;

        ctx.fillText("🔍 총 탐색 횟수", lx, by + 65);
        ctx.textAlign = "right"; ctx.fillStyle = "#4FC3F7";
        ctx.fillText(`${state.totalExplores}회`, rx, by + 65);

        ctx.textAlign = "left"; ctx.fillStyle = "#ddd";
        ctx.fillText("💤 총 휴식 횟수", lx, by + 95);
        ctx.textAlign = "right"; ctx.fillStyle = "#CE93D8";
        ctx.fillText(`${state.totalRests}회`, rx, by + 95);

        ctx.textAlign = "left"; ctx.fillStyle = "#ddd";
        ctx.fillText("📅 총 턴 수", lx, by + 125);
        ctx.textAlign = "right"; ctx.fillStyle = "#FFD54F";
        ctx.fillText(`${state.turnNumber}턴`, rx, by + 125);

        ctx.textAlign = "left"; ctx.fillStyle = "#ddd";
        ctx.fillText("🐾 수집한 이브이", lx, by + 155);
        ctx.textAlign = "right"; ctx.fillStyle = "#FF69B4";
        ctx.fillText(`${state.collected.size}종`, rx, by + 155);
    }

    // 계속 버튼
    if (state.endingTimer > 100) {
        const a = Math.sin(frame * 0.05) * 0.3 + 0.7;
        ctx.globalAlpha = a;
        ctx.fillStyle = "#fff"; ctx.font = "15px system-ui"; ctx.textAlign = "center";
        ctx.fillText("터치하여 농장으로 돌아가기", CW / 2, CH - 50);
    }
    ctx.globalAlpha = 1;
}

function drawTitle() {
    ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, CW, CH);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    const b = Math.sin(frame * 0.03) * 5;
    drawSprite("이브이.png", CW / 2, CH / 2 - 20 + b, 1, 80);

    ctx.fillStyle = "#FFD54F"; ctx.font = "bold 34px system-ui";
    ctx.fillText("이브이 농장", CW / 2, CH / 2 - 130);
    ctx.fillStyle = "#aaa"; ctx.font = "15px system-ui";
    ctx.fillText("모든 이브이 진화형을 모아보세요!", CW / 2, CH / 2 - 95);

    if (hasSave()) {
        // 이어하기 버튼
        const by1 = CH / 2 + 70;
        ctx.fillStyle = "#3a7d44"; roundRect(CW / 2 - 90, by1, 180, 40, 8); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "bold 16px system-ui";
        ctx.fillText("이어하기", CW / 2, by1 + 20);
        // 처음부터 버튼
        const by2 = CH / 2 + 120;
        ctx.fillStyle = "#555"; roundRect(CW / 2 - 90, by2, 180, 36, 8); ctx.fill();

        ctx.fillStyle = "#fff"; ctx.font = "18px system-ui";

}

/* ── roundRect helper ── */
function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
}

/* ═══════════════════════════════════════════
   11. INPUT HANDLING
   ═══════════════════════════════════════════ */
function handleInput() {
    const click = consumeClick();
    if (!click) return;
    const { x, y } = click;

    // 전투 화면 입력
    if (state.battleScene) {
        if (state.battleScene === "select") {
            // 이브이 선택 (파견 중 제외)
            const allEevees = [];
            if (state.currentEevee && !isOnExpedition("current")) allEevees.push("current");
            state.farm.forEach((e, i) => { if (!isOnExpedition(i) && EVOS.find(ev => ev.id === e.evoId)) allEevees.push(i); });

            const bpw2 = 420, bph2 = 585;
            const bpy2 = (CH - bph2) / 2;
            const bpx2 = (CW - bpw2) / 2;
            const startY = bpy2 + 175;
            for (let i = 0; i < allEevees.length && i < 7; i++) {
                const by = startY + i * 48;
                if (hitBox(x, y, bpx2 + 12, by, bpw2 - 24, 42)) {
                    // 전투 실행 (데미지)
                    state.battleAlly = allEevees[i];
                    const allyEevee = allEevees[i] === "current" ? state.currentEevee : state.farm[allEevees[i]];
                    const result = executeBattle(allyEevee, state.battleEnemy);
                    state.battleDamage = result.damage;
                    state.battleCrit = result.crit || false;
                    state.battleScene = "fighting";
                    state.battleTimer = 0;
                    if (result.killed) {
                        state.battleResult = "clear";
                        state.battleMaxStage = state.battleStage;
                        state.battleReward = applyBattleReward(state.battleStage);
                    } else {
                        state.battleResult = "hit";
                    }
                    // 활동성 소모 (록키온: 없음, 님피아: 절반)
                    const allyEvo = EVOS.find(e => e.id === allyEevee.evoId);
                    const aTag = allyEvo ? allyEvo.abilityTag : "";
                    if (allyEevee.activity !== undefined && aTag !== "battle_noact") {
                        const cost = aTag === "sylveon" ? 2 : 5;
                        allyEevee.activity = Math.max(0, (allyEevee.activity || 0) - cost);
                    }
                    return;
                }
            }
            // 돌아가기 버튼 (팝업 내부 좌표)
            if (hitBox(x, y, CW / 2 - 45, bpy2 + bph2 - 42, 90, 30)) {
                state.battleScene = null;
                return;
            }
            // 팝업 바깥 클릭으로도 닫기
            if (!hitBox(x, y, bpx2, bpy2, bpw2, bph2)) {
                state.battleScene = null;
                return;
            }
        } else if (state.battleScene === "fighting" && state.battleTimer >= 120) {
            if (state.battleResult === "clear") {
                // 클리어 → 다음 보스
                saveGame();
                startBattle();
            } else {
                // 데미지만 줌 → 선택 화면으로 돌아가서 계속 공격 가능
                state.battleScene = "select";
                saveGame();
            }
        }
        return;
    }

    // 팝업 우선
    if (state.popup) {
        if (state.popup.type === "feed_current") {
            const invFruits = Object.entries(state.inventory).filter(([n]) => FRUITS.includes(n));
            const invOthers = Object.entries(state.inventory).filter(([n]) => !FRUITS.includes(n));
            const frRows = Math.ceil(invFruits.length / 3);
            const otRows = Math.ceil(invOthers.length / 3);
            const pw = 320;
            let ph = 50;
            if (invFruits.length > 0) ph += 20 + frRows * 36;
            if (invOthers.length > 0) ph += 20 + otRows * 36;
            ph += 10;
            const px = (CW - pw) / 2, py = (CH - ph) / 2 - 30;
            const cols = 3;
            let curY = py + 50;
            // 열매 클릭 → 팝업 유지
            if (invFruits.length > 0) {
                curY += 20;
                for (let i = 0; i < invFruits.length; i++) {
                    const [name] = invFruits[i];
                    const col = i % cols, row = Math.floor(i / cols);
                    const fbx = px + 10 + col * 100, fby = curY + row * 36, fbw = 92, fbh = 30;
                    if (hitBox(x, y, fbx, fby, fbw, fbh)) {
                        feedItem(name);
                        return;
                    }
                }
                curY += Math.ceil(invFruits.length / cols) * 36;
            }
            // 아이템 클릭 → 팝업 닫기
            if (invOthers.length > 0) {
                curY += 20;
                for (let i = 0; i < invOthers.length; i++) {
                    const [name] = invOthers[i];
                    const col = i % cols, row = Math.floor(i / cols);
                    const fbx = px + 10 + col * 100, fby = curY + row * 36, fbw = 92, fbh = 30;
                    if (hitBox(x, y, fbx, fby, fbw, fbh)) {
                        feedItem(name);
                        state.popup = null;
                        return;
                    }
                }
            }
            if (!hitBox(x, y, px, py, pw, ph)) { state.popup = null; }
            return;
        }
        if (state.popup.type === "feed_farm") {
            const availFruits = FRUITS.filter(f => hasItem(f));
            const fruitRows = Math.ceil(availFruits.length / 3);
            const pw = 300, ph = availFruits.length > 0 ? 90 + fruitRows * 36 : 130;
            const px = (CW - pw) / 2, py = (CH - ph) / 2 - 30;
            if (availFruits.length > 0) {
                const cols = 3;
                for (let i = 0; i < availFruits.length; i++) {
                    const col = i % cols, row = Math.floor(i / cols);
                    const fbx = px + 15 + col * 92, fby = py + 82 + row * 36, fbw = 85, fbh = 30;
                    if (hitBox(x, y, fbx, fby, fbw, fbh)) {
                        feedFarmEevee(state.popup.farmIdx, availFruits[i]);
                        return;
                    }
                }
            }
            if (!hitBox(x, y, px, py, pw, ph)) { state.popup = null; state.selectedFarmEevee = null; }
            return;
        }
        if (state.popup.type === "cheat") {
            const pw = 280, ph = 260;
            const px = (CW - pw) / 2, py = (CH - ph) / 2 - 30;
            const types = ["items","friendship_max","friendship_zero","stamina","explore","unlock_base8"];
            for (let i = 0; i < types.length; i++) {
                const bx = px + 15, by = py + 38 + i * 36, bw = pw - 30, bh = 30;
                if (hitBox(x, y, bx, by, bw, bh)) {
                    applyCheat(types[i]);
                    return;
                }
            }
            if (!hitBox(x, y, px, py, pw, ph)) { state.popup = null; }
            return;
        }
        if (state.popup.type === "confirm_reset") {
            const pw = 300, ph = 130;
            const px = (CW - pw) / 2, py = (CH - ph) / 2 - 30;
            const ybw = (pw - 50) / 2, yby = py + 80, ybh = 34;
            const ybx = px + 20;
            const nbx = px + pw - 20 - ybw;
            if (hitBox(x, y, ybx, yby, ybw, ybh)) {
                // 삭제하고 시작
                deleteSave();
                state.popup = null;
                resetCurrentEevee();
                startGame();
            } else if (hitBox(x, y, nbx, yby, ybw, ybh)) {
                state.popup = null;
            }
            return;
        }
        if (state.popup.type === "confirm_rest") {
            const pw = 300, ph = 140;
            const px = (CW - pw) / 2, py = (CH - ph) / 2 - 40;
            const ybw = (pw - 50) / 2, yby = py + 85, ybh = 34;
            const ybx = px + 20;
            const nbx = px + pw - 20 - ybw;
            if (hitBox(x, y, ybx, yby, ybw, ybh)) {
                state.popup = null; doRest();
            } else if (hitBox(x, y, nbx, yby, ybw, ybh)) {
                state.popup = null;
            }
            return;
        }
        if (state.popup.type === "exploring") {
            if (state.popupTimer >= 75) {
                state.popup = null;
                rollTurnLocations();
            }
            return;
        }
        if (state.popupTimer > 15) {
            state.popup = null;
        }
        return;
    }

    // 엔딩
    if (state.scene === "ending") {
        if (state.endingTimer >= 100) {
            state.scene = "farm";
            showMessage("이브이가 한 마리 더 놀러왔다!", 180);
        }
        return;
    }

    // 진화 연출
    if (state.scene === "evolving") {
        if (state.evolvingTimer >= 120) {
            if (allComplete() && !state.endingShown) {
                state.endingShown = true;
                addFarmEevee("eevee_extra");
                state.farm[state.farm.length - 1].sprite = "이브이.png";
                // 전 이브이 기본 스탯 보정
                for (const e of state.farm) {
                    e.activity = Math.min(ACTIVITY_MAX, (e.activity || 0) + 10);
                }
                state.scene = "ending";
                state.endingTimer = 0;
            } else {
                finishPostEvolution();
                if (state._base8Alert) {
                    state._base8Alert = false;
                    showMessage("도감에 새로운 페이지가 추가되었다!", 250);
                }
                // 이브이 자동 등장 없음 → 농장으로 복귀, 둥지에서 소환 유도
                state.scene = "farm";
                showMessage("둥지에서 새 이브이를 불러오세요!", 180);
            }
        }
        return;
    }

    // 새 이브이 등장 연출
    if (state.scene === "new_eevee") {
        if (state.newEeveeTimer >= 90) {
            state.scene = "farm";
        }
        return;
    }

    // 타이틀
    if (state.scene === "title") {
        if (hasSave()) {
            const by1 = CH / 2 + 70;
            const by2 = CH / 2 + 120;
            if (hitBox(x, y, CW / 2 - 90, by1, 180, 40)) {
                // 이어하기
                loadGame();
                return;
            }
            if (hitBox(x, y, CW / 2 - 90, by2, 180, 36)) {
                // 처음부터 확인 팝업
                state.popup = { type: "confirm_reset" };
                state.popupTimer = 0;
                return;
            }
        } else {
            resetCurrentEevee();
            startGame();
        }
        return;
    }

    // 패널 열려있을 때
    if (state.panel && state.panelSlide > 0.8) {
        const panelTop = lerp(CH, panelTopTarget(), state.panelSlide);

        if (y < panelTop) {
            // 패널 바깥 클릭 → 닫기
            state.panel = null;
            return;
        }

        // 패널 내부 클릭
        const contentY = panelTop + 30;

        if (state.panel === "explore") {
            // 이브이 선택 단계
            if (state.expeditionSelect) {
                const allEe = [];
                if (state.currentEevee && !isOnExpedition("current")) allEe.push("current");
                state.farm.forEach((e, i) => { if (!isOnExpedition(i) && EVOS.find(ev => ev.id === e.evoId)) allEe.push(i); });

                const startY = lerp(CH, panelTopTarget(), state.panelSlide) + 30; // drawPanelBg 리턴값
                for (let i = 0; i < allEe.length; i++) {
                    const by = startY + 38 + i * 46;
                    if (by > CH - 50) break;
                    if (hitBox(x, y, 20, by, CW - 40, 40)) {
                        sendExpedition(state.expeditionSelect.locId, allEe[i]);
                        return;
                    }
                }
                // 뒤로가기
                if (hitBox(x, y, CW / 2 - 40, CH - 50, 80, 30)) {
                    state.expeditionSelect = null;
                    return;
                }
                return;
            }

            // 장소 선택 단계
            if (state.expeditions.length >= state.expeditionSlots) return; // 슬롯 꽉 참

            const py2 = lerp(CH, panelTopTarget(), state.panelSlide) + 30; // drawPanelBg 리턴값
            let curY = py2 + 35;
            // 진행 중 파견 영역 스킵
            curY += state.expeditions.length * 38;

            const locs = state.turnLocations || [];
            for (let i = 0; i < locs.length; i++) {
                const by = curY + 10 + i * 48;
                if (by > CH - 30) break;
                if (hitBox(x, y, 20, by, CW - 40, 42)) {
                    doExplore(locs[i]); // expeditionSelect 설정
                    return;
                }
            }
        } else if (state.panel === "inventory") {
            const listTop = contentY + 20;
            const ITEM_H = 42;
            const HEADER_H = 24;
            const COL_W = (CW - 50) / 2;
            const leftX = 15;
            const rightX = leftX + COL_W + 20;
            const craftable = Object.keys(RECIPES).filter(r => hasItem(RECIPES[r].material, RECIPES[r].count));
            let cy = listTop - state.invScroll;
            for (const name of craftable) {
                if (hitBox(x, y, 20, cy, CW - 40, 32)) { tryCraft(name); return; }
                cy += 38;
            }
            const { fruits, others } = getInventorySections();
            const colStartY = cy;
            // 열매 컬럼 클릭
            for (let i = 0; i < fruits.length; i++) {
                const [name] = fruits[i];
                const bx = leftX, bw = COL_W;
                const by = colStartY + HEADER_H + i * ITEM_H;
                if (by + 38 < listTop) continue;
                if (by > CH) break;
                const dbx = bx + bw - 38;
                if (hitBox(x, y, dbx, by + 5, 34, 26)) { dropItem(name); return; }
            }
            // 아이템 컬럼 클릭
            for (let i = 0; i < others.length; i++) {
                const [name] = others[i];
                const bx = rightX, bw = COL_W;
                const by = colStartY + HEADER_H + i * ITEM_H;
                if (by + 38 < listTop) continue;
                if (by > CH) break;
                const dbx2 = bx + bw - 38;
                if (hitBox(x, y, dbx2, by + 5, 34, 26)) { dropItem(name); return; }
            }
        } else if (state.panel === "dex") {
            // 도감은 클릭 동작 없음
        }
        return;
    }

    // 둥지 클릭
    if (canSummonEevee() && hitBox(x, y, CW / 2 - 70, 310, 140, 60)) {
        summonEevee();
        return;
    }

    // 바닥 아이템 터치 → 회수
    for (let i = state.farmItems.length - 1; i >= 0; i--) {
        const item = state.farmItems[i];
        const scr = worldToScreen(item.wx, item.wy);
        if (Math.abs(x - scr.sx) < 18 && Math.abs(y - scr.sy) < 18) {
            addItem(item.name);
            state.farmItems.splice(i, 1);
            showMessage(`${itemEmoji(item.name)} ${item.name} 회수!`, 60);
            return;
        }
    }

    // 현재 이브이 터치 → 아이템 선택 팝업 (파견 중이면 무시)
    if (state.currentEevee && !isOnExpedition("current")) {
        const ce = state.currentEevee;
        const scr = worldToScreen(ce.wx, ce.wy);
        const sz = spriteSize(ce.wy);
        if (Math.abs(x - scr.sx) < sz * 0.5 && y > scr.sy - sz && y < scr.sy + 5) {
            state.popup = { type: "feed_current" };
            state.popupTimer = 0;
            return;
        }
    }

    // 농장 이브이 터치 (수집된 이브이) — 열매 없어도 정보 팝업
    for (let i = state.farm.length - 1; i >= 0; i--) {
        const e = state.farm[i];
        const scr = worldToScreen(e.wx, e.wy);
        const sz = spriteSize(e.wy) * 1.2;
        if (Math.abs(x - scr.sx) < sz * 0.5 && y > scr.sy - sz && y < scr.sy + 5) {
            state.selectedFarmEevee = i;
            state.popup = { type: "feed_farm", farmIdx: i };
            state.popupTimer = 0;
            return;
        }
    }

    // 농장 하단 버튼
    for (const btn of BUTTONS) {
        if (btn.id === "hint" && allComplete()) continue;
        if (hitBox(x, y, btn.x, BTN_Y, btn.w, BTN_H)) {
            if (btn.id === "battle") {
                startBattle();
            } else if (btn.id === "explore") {
                state.panel = "explore"; state.panelSlide = 0;
            } else if (btn.id === "bag") {
                state.panel = "inventory"; state.panelSlide = 0; state.invScroll = 0;
            } else if (btn.id === "hint") {
                getHint();
            } else if (btn.id === "dex") {
                state.panel = "dex"; state.panelSlide = 0; state.dexScroll = 0;
            } else if (btn.id === "rest") {
                state.popup = { type: "confirm_rest" };
                state.popupTimer = 0;
            }
            return;
        }
    }
}

/* ═══════════════════════════════════════════
   12. MAIN LOOP
   ═══════════════════════════════════════════ */
function loop() {
    frame++;
    ctx.clearRect(0, 0, CW, CH);

    if (imagesLoaded < totalImages) {
        ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0, 0, CW, CH);
        ctx.fillStyle = "#fff"; ctx.font = "16px system-ui";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(`로딩 중... ${imagesLoaded}/${totalImages}`, CW / 2, CH / 2);
        requestAnimationFrame(loop); return;
    }

    handleInput();
    checkExpeditionReturns();

    // 패널 슬라이드 애니메이션
    if (state.panel) {
        state.panelSlide = Math.min(1, state.panelSlide + 0.08);
    } else {
        state.panelSlide = Math.max(0, state.panelSlide - 0.12);
    }

    if (state.scene === "title") {
        drawTitle();
        if (state.popup) drawPopup();
    } else if (state.scene === "evolving") {
        drawEvolving();
    } else if (state.scene === "ending") {
        drawEnding();
    } else if (state.scene === "new_eevee") {
        state.newEeveeTimer++;
        // 농장 배경
        updateFarmEntities();
        ctx.drawImage(getBgCache(), 0, 0);

        // 새 이브이를 왼쪽에서 걸어오게
        const ce = state.currentEevee;
        const t = Math.min(state.newEeveeTimer / 60, 1); // 0~1 (60프레임 이동)
        ce.wy = lerp(1.15, 0.5, t);
        ce.aiState = t < 1 ? "walk" : "idle";
        ce.facing = 1;

        drawFarmEntities();

        // 말풍선
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        if (state.newEeveeTimer > 50) {
            const scr = worldToScreen(ce.wx, ce.wy);
            const alpha = clamp((state.newEeveeTimer - 50) / 20, 0, 1);
            ctx.globalAlpha = alpha;
            // 말풍선 배경
            ctx.fillStyle = "rgba(255,255,255,0.9)";
            roundRect(scr.sx - 40, scr.sy - spriteSize(ce.wy) - 28, 80, 24, 8);
            ctx.fill();
            // 꼬리
            ctx.beginPath();
            ctx.moveTo(scr.sx - 5, scr.sy - spriteSize(ce.wy) - 4);
            ctx.lineTo(scr.sx, scr.sy - spriteSize(ce.wy) + 2);
            ctx.lineTo(scr.sx + 5, scr.sy - spriteSize(ce.wy) - 4);
            ctx.fill();
            // 텍스트
            ctx.fillStyle = "#333"; ctx.font = "bold 12px system-ui";
            ctx.fillText("안녕!", scr.sx, scr.sy - spriteSize(ce.wy) - 16);
            ctx.globalAlpha = 1;
        }

        drawHUD();

        // 안내
        if (state.newEeveeTimer >= 60) {
            const a = Math.sin(frame * 0.05) * 0.3 + 0.7;
            ctx.globalAlpha = a;
            ctx.fillStyle = "#fff"; ctx.font = "15px system-ui";
            ctx.fillText("새 이브이가 놀러왔다!", CW / 2, CH - 100);
            ctx.font = "13px system-ui"; ctx.fillStyle = "#aaa";
            ctx.fillText("터치하여 계속", CW / 2, CH - 75);
            ctx.globalAlpha = 1;
        }
    } else {
        // 농장 (항상 배경 - 캐시 사용)
        updateFarmEntities();
        ctx.drawImage(getBgCache(), 0, 0);
        drawFarmEntities();
        // 둥지 버튼 (이브이 없을 때)
        if (canSummonEevee()) {
            const nx = CW / 2, ny = 340;
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            roundRect(nx - 70, ny - 30, 140, 60, 12); ctx.fill();
            ctx.strokeStyle = "#FFD54F"; ctx.lineWidth = 2;
            roundRect(nx - 70, ny - 30, 140, 60, 12); ctx.stroke();
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.font = "24px system-ui"; ctx.fillStyle = "#FFD54F";
            ctx.fillText("🥚", nx, ny - 5);
            ctx.font = "bold 12px system-ui"; ctx.fillStyle = "#fff";
            ctx.fillText(`이브이 소환 (열매x${NEST_COST})`, nx, ny + 22);
        }
        drawHUD();
        drawFarmButtons();
        drawMessage();

        // 패널 오버레이
        if (state.panelSlide > 0.01) {
            if (state.panel === "explore") drawExplorePanel();
            else if (state.panel === "inventory") drawInventoryPanel();
            else if (state.panel === "dex") drawDexPanel();
        }

        // 팝업
        drawPopup();

        // 전투 팝업 (최상단)
        if (state.battleScene) drawBattle();
    }

    requestAnimationFrame(loop);
}

loop();
</script>
