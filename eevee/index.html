}

/* ═══════════════════════════════════════════
   9. INPUT
   ═══════════════════════════════════════════ */
let clickX = -1, clickY = -1, clicked = false;

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx - rect.left) * (CW / rect.width), y: (cy - rect.top) * (CH / rect.height) };
}

let touchStartY = -1, touchDragging = false;

// 이브이 드래그 관련
let dragEevee = null;  // 드래그 중인 이브이 객체
let dragOffset = { wx: 0, wy: 0 };
let dragMoved = false;  // 실제로 드래그 이동했는지

function screenToWorld(sx, sy) {
    const wy = clamp((sy - FLOOR_TOP) / FLOOR_H, 0, 1);
    const perspective = 0.6 + wy * 0.4;
    const wx = (sx - CW / 2) / ((CW - FLOOR_PAD * 2) * perspective) + 0.5;
    return { wx: clamp(wx, 0.05, 0.95), wy: clamp(wy, 0.05, 0.95) };
}

function findEeveeAtScreen(sx, sy) {
    const allEe = [...state.farm];
    if (state.currentEevee) allEe.push(state.currentEevee);
    for (const e of allEe) {
        const scr = worldToScreen(e.wx, e.wy);
        const size = spriteSize(e.wy);
        if (Math.abs(sx - scr.sx) < size * 0.6 && Math.abs(sy - scr.sy) < size * 0.8) {
            return e;
        }
    }
    return null;
}

let mouseDragY = -1, mouseDragging = false;
canvas.addEventListener("mousedown", e => {
    if (state.popup && state.popup.type === "nickname_input") {
        e.preventDefault(); // 캔버스가 focus를 뺏지 않도록
        // "시작!" 버튼 클릭 체크
        const p = getPos(e);
        const pw = 300, ph = 150;
        const px = (CW - pw) / 2, py = BTN_Y - ph - 10;
        const buf = state._nicknameBuffer || "";
        if (buf.length >= 2 && hitBox(p.x, p.y, px + pw / 2 - 50, py + 108, 100, 30)) {
            state.playerName = buf;
            if (!state.playerId) state.playerId = generatePlayerId();
            state.popup = null;
            closeNicknameInput();
            if (state.scene === "title") { resetCurrentEevee(); startGame(); }
            saveGame();
        }
        return;
    }
    const p = getPos(e);
    clickX = p.x; clickY = p.y;
    mouseDragY = p.y;
    mouseDragging = false;
    if (state.scene === "farm" && !state.panel && !state.popup) {
        const ee = findEeveeAtScreen(p.x, p.y);
        if (ee) {
            dragEevee = ee;
            dragMoved = false;
            const w = screenToWorld(p.x, p.y);
            dragOffset.wx = ee.wx - w.wx;
            dragOffset.wy = ee.wy - w.wy;
        }
    }
});
canvas.addEventListener("mousemove", e => {
    const p = getPos(e);
    if (dragEevee) {
        dragMoved = true;
        const w = screenToWorld(p.x, p.y);
        dragEevee.wx = clamp(w.wx + dragOffset.wx, 0.05, 0.95);
        dragEevee.wy = clamp(w.wy + dragOffset.wy, 0.05, 0.95);
        dragEevee.vx = 0; dragEevee.vy = 0;
        dragEevee.aiState = "idle"; dragEevee.aiTimer = 60;
    } else if (mouseDragY >= 0 && (state.panel === "inventory" || state.panel === "dex" || state.panel === "explore")) {
        const dy = mouseDragY - p.y;
        if (Math.abs(dy) > 5) {
            mouseDragging = true;
            if (state.panel === "inventory") state.invScroll += dy;
            else if (state.panel === "dex") state.dexScroll += dy;
            else if (state.panel === "explore" && state.expeditionSelect) state.eeSelectScroll += dy;
            else if (state.panel === "explore") state.expScroll += dy;
            mouseDragY = p.y;
        }
    }
});
canvas.addEventListener("mouseup", () => {
    if (dragEevee) {
        dragEevee.aiTimer = 60;
        if (!dragMoved) clicked = true;
        dragEevee = null;
    } else if (!mouseDragging) { clicked = true; }
    mouseDragY = -1; mouseDragging = false;
});
canvas.addEventListener("touchstart", e => {
    if (state.popup && state.popup.type === "nickname_input") {
        // touchend에서 처리
        return;
    }
    e.preventDefault();
    const p = getPos(e);
    clickX = p.x; clickY = p.y;
    touchStartY = p.y; touchDragging = false;
    if (state.scene === "farm" && !state.panel && !state.popup) {
        const ee = findEeveeAtScreen(p.x, p.y);
        if (ee) {
            dragEevee = ee;
            dragMoved = false;
        const w = screenToWorld(p.x, p.y);
            dragOffset.wx = ee.wx - w.wx;
            dragOffset.wy = ee.wy - w.wy;
        }
    }
}, { passive: false });
canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    if (dragEevee) {
        dragMoved = true;
        touchDragging = true;
        const p = getPos(e);
        const w = screenToWorld(p.x, p.y);
        dragEevee.wx = clamp(w.wx + dragOffset.wx, 0.05, 0.95);
        dragEevee.wy = clamp(w.wy + dragOffset.wy, 0.05, 0.95);
        dragEevee.vx = 0; dragEevee.vy = 0;
        dragEevee.aiState = "idle"; dragEevee.aiTimer = 60;
    } else if ((state.panel === "inventory" || state.panel === "dex" || state.panel === "explore") && touchStartY >= 0) {
        const p = getPos(e);
        const dy = touchStartY - p.y;
        if (Math.abs(dy) > 8) {
            touchDragging = true;
            if (state.panel === "inventory") state.invScroll += dy;
            else if (state.panel === "dex") state.dexScroll += dy;
            else if (state.panel === "explore" && state.expeditionSelect) state.eeSelectScroll += dy;
            else if (state.panel === "explore") state.expScroll += dy;
            touchStartY = p.y;
        }
    }
}, { passive: false });
canvas.addEventListener("touchend", e => {
    e.preventDefault();
    // 닉네임 입력 중 "시작!" 버튼 처리
    if (state.popup && state.popup.type === "nickname_input") {
        const touch = e.changedTouches[0];
        if (touch) {
            const rect = canvas.getBoundingClientRect();
            const tx = (touch.clientX - rect.left) * (CW / rect.width);
            const ty = (touch.clientY - rect.top) * (CH / rect.height);
            const pw = 300, ph = 150;
            const px = (CW - pw) / 2, py = BTN_Y - ph - 10;
            const buf = state._nicknameBuffer || "";
            if (buf.length >= 2 && hitBox(tx, ty, px + pw / 2 - 50, py + 108, 100, 30)) {
                state.playerName = buf;
                if (!state.playerId) state.playerId = generatePlayerId();
                state.popup = null;
                closeNicknameInput();
                if (state.scene === "title") { resetCurrentEevee(); startGame(); }
                saveGame();
            } else {
                nickInput.focus();
            }
        }
        touchStartY = -1; touchDragging = false;
        return;
    }
    if (dragEevee) {
        dragEevee.aiTimer = 60;
        if (!dragMoved) clicked = true;
        dragEevee = null;
    } else if (!touchDragging) clicked = true;
    touchStartY = -1; touchDragging = false;
});
canvas.addEventListener("wheel", e => {
    if (state.panel === "inventory") { state.invScroll += e.deltaY * 0.5; e.preventDefault(); }
    else if (state.panel === "dex") { state.dexScroll += e.deltaY * 0.5; e.preventDefault(); }
    else if (state.panel === "explore" && state.expeditionSelect) { state.eeSelectScroll += e.deltaY * 0.5; e.preventDefault(); }
    else if (state.panel === "explore") { state.expScroll += e.deltaY * 0.5; e.preventDefault(); }
}, { passive: false });

function consumeClick() {
    if (!clicked) return null;
    clicked = false;
    return { x: clickX, y: clickY };
}

/* ── 개발자 치트코드 (키 시퀀스: eevee) ── */
let cheatBuf = "";
document.addEventListener("keydown", e => {
    // 닉네임 입력 중이면 HTML input에 위임 (키 가로채지 않음)
    if (state.popup && state.popup.type === "nickname_input") {
        return;
    }

    cheatBuf += e.key.toLowerCase();
    if (cheatBuf.length > 10) cheatBuf = cheatBuf.slice(-10);
    if (cheatBuf.endsWith("eevee") || cheatBuf.endsWith("ㄷㄷㅍㄷㄷ")) {
        cheatBuf = "";
        state.popup = { type: "cheat" };
        state.popupTimer = 0;
    }
});

function applyCheat(type) {
    const ee = state.currentEevee;
    if (type === "items") {
        // 모든 열매 100개
        for (const f of FRUITS) addItem(f, 100);
        // 진화용 아이템
        for (const name of ["물의돌","불꽃의돌","천둥의돌","리본","이끼바위조각","얼음바위조각","태양조각","달조각","다이버섯","이브이나이트","용의비늘","부드러운모래","바람깃털","독바늘","벌레껍질"]) addItem(name, 10);
        showMessage("🔧 모든 아이템 추가!", 90);
    } else if (type === "friendship_max") {
        if (ee) ee.friendship = FRIENDSHIP.max;
        showMessage("🔧 친밀도 MAX!", 90);
    } else if (type === "friendship_zero") {
        if (ee) ee.friendship = -1;
        showMessage("🔧 친밀도 → -1!", 90);
    } else if (type === "stamina") {
        // 전 이브이 활동성 MAX
        for (const e of state.farm) e.activity = getActivityMax();
        showMessage("🔧 전체 활동성 MAX!", 90);
    } else if (type === "explore") {
        if (ee) { ee.exploreCount = 25; ee.repeatCount = 6; }
        state.totalExplores = Math.max(state.totalExplores, 15);
        showMessage("🔧 탐색 카운트 충전!", 90);
    } else if (type === "unlock_base8") {
        for (const evo of EVOS.slice(0, 8)) state.collected.add(evo.id);
        showMessage("🔧 기본 8종 해금!", 90);
    } else if (type === "unlock_all") {
        for (const evo of EVOS) {
            state.collected.add(evo.id);
            if (!state.farm.find(e => e.evoId === evo.id)) addFarmEevee(evo.id);
        }
        showMessage("🔧 전체 해금!", 90);
    }
    state.popup = null;
    saveGame();
}

function hitBox(cx, cy, bx, by, bw, bh) {
    return cx >= bx && cx <= bx + bw && cy >= by && cy <= by + bh;
}

/* ═══════════════════════════════════════════
   10. RENDERING
   ═══════════════════════════════════════════ */
let frame = 0;

/* ── 배경 ── */
function drawBackground() {
    const isNight = state.timeOfDay === "night";

    // 하늘
    const skyGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_TOP + 40);
    if (isNight) {
        skyGrad.addColorStop(0,"#050510");
        skyGrad.addColorStop(0.4,"#0a0a20");
        skyGrad.addColorStop(1,"#141430");
    } else {
        skyGrad.addColorStop(0,"#4A90D9");
        skyGrad.addColorStop(0.5,"#7EC8E3");
        skyGrad.addColorStop(1,"#C5E8F0");
    }
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, CW, FLOOR_TOP + 40);

    // 구름 (낮)
    if (!isNight) {
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        for (let i = 0; i < 4; i++) {
            const cx = ((i * 157 + frame * 0.05) % (CW + 100)) - 50;
            const cy = 30 + i * 25;
            ctx.beginPath();
            ctx.ellipse(cx, cy, 35 + i * 5, 12, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx + 20, cy - 5, 25, 10, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath();
            ctx.ellipse(cx - 15, cy + 2, 20, 8, 0, 0, Math.PI * 2); ctx.fill();
        }
    }

    // 별 (밤)
    if (isNight) {
        ctx.fillStyle = "#fff";
        for (let i = 0; i < 60; i++) {
            const sx = (i * 137 + 50) % CW;
            const sy = (i * 97 + 10) % (FLOOR_TOP - 30) + 10;
            const twinkle = 0.15 + Math.sin(frame * 0.02 + i * 2.7) * 0.25;
            ctx.globalAlpha = twinkle;
            const sr = i % 7 === 0 ? 2 : 1;
            ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        // 달 + 달빛
        ctx.fillStyle = "rgba(245,230,200,0.08)";
        ctx.beginPath(); ctx.arc(CW - 60, 50, 50, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#F5E6CC";
        ctx.beginPath(); ctx.arc(CW - 60, 50, 22, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#E8D8B8";
        ctx.beginPath(); ctx.arc(CW - 55, 45, 18, 0, Math.PI * 2); ctx.fill();
    } else {
        // 태양 + 광선
        ctx.fillStyle = "rgba(255,215,0,0.08)";
        ctx.beginPath(); ctx.arc(70, 50, 55, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "rgba(255,215,0,0.15)";
        ctx.beginPath(); ctx.arc(70, 50, 38, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#FFD700";
        ctx.beginPath(); ctx.arc(70, 50, 24, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#FFF176";
        ctx.beginPath(); ctx.arc(70, 50, 14, 0, Math.PI * 2); ctx.fill();
    }

    // 원경 산 (레이어드)
    ctx.fillStyle = isNight ? "#0e0e20" : "#6B9E6B";
    for (let i = 0; i < 6; i++) {
        const mx = i * 110 + 20;
        ctx.beginPath();
        ctx.ellipse(mx, FLOOR_TOP + 25, 90, 55, 0, Math.PI, 0);
        ctx.fill();
    }
    ctx.fillStyle = isNight ? "#151528" : "#7DB87D";
    for (let i = 0; i < 5; i++) {
        const mx = i * 130 + 60;
        ctx.beginPath();
        ctx.ellipse(mx, FLOOR_TOP + 22, 75, 40, 0, Math.PI, 0);
        ctx.fill();
    }

    // 나무 실루엣 (울타리 뒤)
    const treeColor = isNight ? "#0c1a10" : "#3E8B3E";
    const trunkColor = isNight ? "#1a1510" : "#6B4226";
    const trees = [50, 140, 350, 430];
    for (const tx of trees) {
        // 줄기
        ctx.fillStyle = trunkColor;
        ctx.fillRect(tx - 3, FLOOR_TOP - 15, 6, 20);
        // 잎
        ctx.fillStyle = treeColor;
        ctx.beginPath(); ctx.arc(tx, FLOOR_TOP - 25, 18, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(tx - 10, FLOOR_TOP - 18, 14, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(tx + 10, FLOOR_TOP - 18, 14, 0, Math.PI * 2); ctx.fill();
    }
}

/* ── 쿼터뷰 바닥 ── */
function drawFloor() {
    const isNight = state.timeOfDay === "night";

    // 바닥 (사다리꼴 - 원근)
    const topW = CW * 0.55, botW = CW * 0.95;
    const topL = (CW - topW) / 2, topR = topL + topW;
    const botL = (CW - botW) / 2, botR = botL + botW;

    const floorGrad = ctx.createLinearGradient(0, FLOOR_TOP, 0, FLOOR_BOT);
    if (isNight) { floorGrad.addColorStop(0,"#1a3020"); floorGrad.addColorStop(1,"#2a4030"); }
    else { floorGrad.addColorStop(0,"#5DAA68"); floorGrad.addColorStop(1,"#4CAF50"); }

    ctx.fillStyle = floorGrad;
    ctx.beginPath();
    ctx.moveTo(topL, FLOOR_TOP);
    ctx.lineTo(topR, FLOOR_TOP);
    ctx.lineTo(botR, FLOOR_BOT);
    ctx.lineTo(botL, FLOOR_BOT);
    ctx.closePath();
    ctx.fill();

    // 잔디 패치 (랜덤 색상 변화)
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(topL, FLOOR_TOP); ctx.lineTo(topR, FLOOR_TOP);
    ctx.lineTo(botR, FLOOR_BOT); ctx.lineTo(botL, FLOOR_BOT);
    ctx.closePath();
    ctx.clip();

    // 잔디 얼룩
    for (let i = 0; i < 25; i++) {
        const t = (i * 71 + 13) % 100 / 100; // wy
        const s = (i * 53 + 7) % 100 / 100;  // wx
        const gy = FLOOR_TOP + t * FLOOR_H;
        const perspective = 0.6 + t * 0.4;
        const gx = CW / 2 + (s - 0.5) * (CW - FLOOR_PAD * 2) * perspective;
        const patchSize = 15 + t * 20;
        ctx.fillStyle = isNight
            ? `rgba(${30 + i % 3 * 5},${55 + i % 4 * 5},${35 + i % 3 * 5},0.4)`
            : `rgba(${60 + i % 3 * 10},${150 + i % 5 * 10},${60 + i % 3 * 10},0.3)`;
        ctx.beginPath();
        ctx.ellipse(gx, gy, patchSize, patchSize * 0.4, (i * 0.5) % Math.PI, 0, Math.PI * 2);
        ctx.fill();
    }

    // 잔디 풀 꼬리 (작은 V 모양)
    for (let i = 0; i < 40; i++) {
        const t = (i * 37 + 19) % 100 / 100;
        const s = (i * 61 + 3) % 100 / 100;
        const gy = FLOOR_TOP + t * FLOOR_H;
        const perspective = 0.6 + t * 0.4;
        const gx = CW / 2 + (s - 0.5) * (CW - FLOOR_PAD * 2) * perspective;
        const grassH = 4 + t * 4;
        ctx.strokeStyle = isNight ? "rgba(80,140,80,0.3)" : "rgba(50,120,50,0.35)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(gx - 2, gy); ctx.lineTo(gx, gy - grassH); ctx.lineTo(gx + 2, gy);
        ctx.stroke();
    }

    // 작은 꽃 (낮만)
    if (!isNight) {
        const flowerColors = ["#FFE082","#F48FB1","#CE93D8","#FFF"];
        for (let i = 0; i < 12; i++) {
            const t = (i * 43 + 27) % 100 / 100;
            const s = (i * 67 + 11) % 100 / 100;
            const gy = FLOOR_TOP + t * FLOOR_H;
            const perspective = 0.6 + t * 0.4;
            const gx = CW / 2 + (s - 0.5) * (CW - FLOOR_PAD * 2) * perspective;
            const fsize = 2 + t * 2;
            ctx.fillStyle = flowerColors[i % flowerColors.length];
            ctx.beginPath(); ctx.arc(gx, gy, fsize, 0, Math.PI * 2); ctx.fill();
        }
    }

    // 돌멩이
    for (let i = 0; i < 6; i++) {
        const t = (i * 59 + 41) % 100 / 100;
        const s = (i * 83 + 17) % 100 / 100;
        const gy = FLOOR_TOP + t * FLOOR_H;
        const perspective = 0.6 + t * 0.4;
        const gx = CW / 2 + (s - 0.5) * (CW - FLOOR_PAD * 2) * perspective;
        ctx.fillStyle = isNight ? "rgba(60,60,50,0.5)" : "rgba(160,155,140,0.5)";
        ctx.beginPath();
        ctx.ellipse(gx, gy, 3 + t * 2, 2 + t * 1, i * 0.7, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();

    // 울타리 (가로대 2줄)
    const fenceColor = isNight ? "#3a2a1a" : "#A07030";
    const fenceDark = isNight ? "#2a1a0a" : "#7A5520";

    // 왼쪽 울타리
    for (let i = 0; i <= 5; i++) {
        const t = i / 5;
        const ly = FLOOR_TOP + t * FLOOR_H;
        const lx = lerp(topL, botL, t);
        // 기둥
        const postH = 16 + t * 6;
        ctx.fillStyle = fenceDark;
        ctx.fillRect(lx - 3, ly - postH, 5, postH + 2);
        ctx.fillStyle = fenceColor;
        ctx.fillRect(lx - 2, ly - postH, 3, postH);
    }
    // 왼쪽 가로대
    ctx.strokeStyle = fenceColor; ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i <= 5; i++) {
        const t = i / 5;
        const ly = FLOOR_TOP + t * FLOOR_H - 8 - t * 3;
        const lx = lerp(topL, botL, t);
        i === 0 ? ctx.moveTo(lx, ly) : ctx.lineTo(lx, ly);
    }
    ctx.stroke();
    ctx.beginPath();
    for (let i = 0; i <= 5; i++) {
        const t = i / 5;
        const ly = FLOOR_TOP + t * FLOOR_H - 14 - t * 4;
        const lx = lerp(topL, botL, t);
        i === 0 ? ctx.moveTo(lx, ly) : ctx.lineTo(lx, ly);
    }
    ctx.stroke();

    // 오른쪽 울타리
    for (let i = 0; i <= 5; i++) {
        const t = i / 5;
        const ry = FLOOR_TOP + t * FLOOR_H;
        const rx = lerp(topR, botR, t);
        const postH = 16 + t * 6;
        ctx.fillStyle = fenceDark;
        ctx.fillRect(rx - 2, ry - postH, 5, postH + 2);
        ctx.fillStyle = fenceColor;
        ctx.fillRect(rx - 1, ry - postH, 3, postH);
    }
    ctx.strokeStyle = fenceColor; ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i <= 5; i++) {
        const t = i / 5;
        const ry = FLOOR_TOP + t * FLOOR_H - 8 - t * 3;
        const rx = lerp(topR, botR, t);
        i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
    }
    ctx.stroke();
    ctx.beginPath();
    for (let i = 0; i <= 5; i++) {
        const t = i / 5;
        const ry = FLOOR_TOP + t * FLOOR_H - 14 - t * 4;
        const rx = lerp(topR, botR, t);
        i === 0 ? ctx.moveTo(rx, ry) : ctx.lineTo(rx, ry);
    }
    ctx.stroke();

    // 뒤쪽 울타리
    ctx.strokeStyle = fenceColor; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(topL, FLOOR_TOP - 8); ctx.lineTo(topR, FLOOR_TOP - 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(topL, FLOOR_TOP - 14); ctx.lineTo(topR, FLOOR_TOP - 14); ctx.stroke();
    for (let i = 0; i <= 6; i++) {
        const px = topL + (topW / 6) * i;
        ctx.fillStyle = fenceDark;
        ctx.fillRect(px - 2, FLOOR_TOP - 18, 4, 20);
        ctx.fillStyle = fenceColor;
        ctx.fillRect(px - 1, FLOOR_TOP - 17, 2, 18);
    }

    // 바닥 아래 (앞면 흙 - 레이어드)
    const dirtGrad = ctx.createLinearGradient(0, FLOOR_BOT, 0, FLOOR_BOT + 16);
    if (isNight) { dirtGrad.addColorStop(0,"#2a2018"); dirtGrad.addColorStop(1,"#1a1008"); }
    else { dirtGrad.addColorStop(0,"#8B7355"); dirtGrad.addColorStop(1,"#6B5335"); }
    ctx.fillStyle = dirtGrad;
    ctx.fillRect(botL, FLOOR_BOT, botW, 16);
    // 흙 디테일
    ctx.fillStyle = isNight ? "rgba(60,40,20,0.3)" : "rgba(120,90,50,0.3)";
    for (let i = 0; i < 10; i++) {
        const dx = botL + (i * 47 + 15) % Math.floor(botW);
        ctx.beginPath(); ctx.arc(dx, FLOOR_BOT + 6 + (i % 3) * 3, 3, 0, Math.PI * 2); ctx.fill();
    }
}

/* ── 스프라이트 ── */
// 스프라이트 기본 방향 (1=오른쪽, -1=왼쪽)
const SPRITE_DEFAULT_FACING = {
    "이브이.png": -1, "샤미드.png": -1, "쥬피썬더.png": -1, "부스터.png": -1,
    "에브이.png": 1, "블래키.png": -1, "리피아.png": -1, "글레이시아.png": -1,
    "님피아.png": -1, "왕이브이.png": -1, "이브이메가.png": -1, "이브이격투.png": -1,
    "이브이고스트.png": 1, "이브이드래곤.png": -1, "이브이땅.png": 1,
    "이브이바위.png": -1, "이브이비행.png": -1, "이브이강철.png": -1,
};

function drawSprite(imgName, sx, sy, facing, size) {
    const img = images[imgName];
    if (!img || !img.complete) return;
    const w = size;
    const h = w * (img.height / img.width);
    const defaultDir = SPRITE_DEFAULT_FACING[imgName] || -1;
    ctx.save();
    ctx.translate(sx, sy);
    if (facing !== defaultDir) ctx.scale(-1, 1);
    ctx.drawImage(img, -w / 2, -h, w, h);
    ctx.restore();
}

/* ── 농장 엔티티 렌더 ── */
function drawFarmEntities() {
    // 모든 엔티티 수집 + wy 정렬
    const entities = [];

    // 현재 이브이 (파견 중이면 숨김)
    if (state.currentEevee && !isOnExpedition("current")) {
        const ce = state.currentEevee;
        entities.push({ type: "current", wx: ce.wx, wy: ce.wy, facing: ce.facing, sprite: "이브이.png", aiState: ce.aiState });
    }

    // 수집된 이브이 (파견 중이면 숨김)
    for (let fi = 0; fi < state.farm.length; fi++) {
        if (isOnExpedition(fi)) continue;
        const e = state.farm[fi];
        entities.push({ type: "farm", wx: e.wx, wy: e.wy, facing: e.facing, sprite: e.sprite, aiState: e.aiState, activity: e.activity || 0 });
    }

    // 바닥 아이템
    for (const item of state.farmItems) {
        entities.push({ type: "item", wx: item.wx, wy: item.wy, name: item.name });
    }

    // wy 기준 정렬 (뒤 → 앞)
    entities.sort((a, b) => a.wy - b.wy);

    for (const ent of entities) {
        const { sx, sy } = worldToScreen(ent.wx, ent.wy);
        const baseSize = spriteSize(ent.wy);
        const size = ent.type === "farm" ? baseSize * 1.2 : baseSize;

        if (ent.type === "item") {
            ctx.globalAlpha = 1;
            const isFruit = FRUITS.includes(ent.name);
            const isize = isFruit ? (14 + ent.wy * 10) : (16 + ent.wy * 12);
            // 그림자
            ctx.fillStyle = "#00000040";
            const shadowR = isFruit ? 10 : 13;
            ctx.beginPath(); ctx.ellipse(sx, sy + 5, shadowR, 4, 0, 0, Math.PI * 2); ctx.fill();
            // 반짝이 이펙트 (피격 안 받은 열매만)
            if (isFruit && !ent.damaged) {
                const sparkT = frame * 0.05 + ent.wx * 50;
                const sparkAlpha = 0.3 + Math.sin(sparkT) * 0.3;
                const sparkR = isize * 0.7 + Math.sin(sparkT * 1.3) * 3;
                ctx.globalAlpha = sparkAlpha;
                ctx.fillStyle = "rgba(255,255,200,0.5)";
                ctx.beginPath(); ctx.arc(sx, sy - 2, sparkR, 0, Math.PI * 2); ctx.fill();
                // 작은 별 파티클
                for (let si = 0; si < 3; si++) {
                    const sa = sparkT * 0.7 + si * (Math.PI * 2 / 3);
                    const sr = isize * 0.5 + Math.sin(sparkT + si) * 4;
                    const spx = sx + Math.cos(sa) * sr;
                    const spy = sy - 2 + Math.sin(sa) * sr * 0.6;
                    ctx.fillStyle = "#fff";
                    ctx.globalAlpha = 0.4 + Math.sin(sparkT + si * 2) * 0.4;
                    ctx.font = `${4 + Math.sin(sparkT + si) * 2}px system-ui`;
                    ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText("✦", spx, spy);
                }
                ctx.globalAlpha = 1;
            }
            // 피격 열매: 깜빡임
            if (isFruit && ent.damaged) {
                ctx.globalAlpha = 0.5 + Math.sin(frame * 0.3) * 0.3;
            }
            // 아이템류 테두리
            if (!isFruit) {
                ctx.fillStyle = "rgba(100,180,255,0.15)";
                ctx.strokeStyle = "rgba(100,180,255,0.6)";
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(sx, sy - 2, isize * 0.55, 0, Math.PI * 2);
                ctx.fill(); ctx.stroke();
            }
            // 이모지
            ctx.font = `${isize}px system-ui`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillStyle = "#000";
            ctx.fillText(itemEmoji(ent.name), sx, sy - 1);
            ctx.globalAlpha = 1;
        } else {
            // 그림자
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.beginPath(); ctx.ellipse(sx, sy + 2, size * 0.35, size * 0.12, 0, 0, Math.PI * 2); ctx.fill();

            // 바운스
            let bounce = 0;
            if (ent.aiState === "walk") bounce = Math.sin(frame * 0.1 + ent.wx * 100) * 2;
            if (ent.aiState === "sleep") bounce = 1;

            drawSprite(ent.sprite, sx, sy - bounce, ent.facing, size);

            // 수면 z
            if (ent.aiState === "sleep") {
                ctx.fillStyle = "#fff";
                ctx.globalAlpha = 0.4 + Math.sin(frame * 0.03) * 0.2;
                ctx.font = `${10 + ent.wy * 4}px system-ui`;
                ctx.textAlign = "center";
                ctx.fillText("z", sx + size * 0.3, sy - size * 0.6 + Math.sin(frame * 0.02) * 4);
                ctx.globalAlpha = 1;
            }

            // 현재 이브이: 친밀도 바 (파랑/핑크) + 하트
            if (ent.type === "current") {
                const heartSize = 8;
                const barW = size * 0.6, barH = 4;
                const barX = sx - barW / 2 + heartSize + 2, barY = sy - size * 0.9;
                // 하트 아이콘
                ctx.fillStyle = "#FF69B4";
                ctx.font = `${heartSize}px system-ui`;
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText("♥", barX - heartSize / 2 - 2, barY + barH / 2);
                // 바
                const adjBarW = barW - heartSize - 2;
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.fillRect(barX, barY, adjBarW, barH);
                const ratio = clamp(state.currentEevee.friendship / FRIENDSHIP.max, 0, 1);
                ctx.fillStyle = ratio >= 1 ? "#FF69B4" : "#4FC3F7";
                ctx.fillRect(barX, barY, adjBarW * ratio, barH);
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.lineWidth = 0.5;
                ctx.strokeRect(barX, barY, adjBarW, barH);
            }

            // 진화 이브이: 활동성 바 (주황)
            if (ent.type === "farm" && typeof ent.activity !== "undefined") {
                const barW = size * 0.5, barH = 3;
                const barX = sx - barW / 2, barY = sy - size * 0.85;
                ctx.fillStyle = "rgba(0,0,0,0.35)";
                ctx.fillRect(barX, barY, barW, barH);
                const ratio = clamp(ent.activity / getActivityMax(), 0, 1);
                ctx.fillStyle = ratio >= 0.7 ? "#FF9800" : ratio >= 0.3 ? "#FFB74D" : "#795548";
                ctx.fillRect(barX, barY, barW * ratio, barH);
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.lineWidth = 0.5;
                ctx.strokeRect(barX, barY, barW, barH);
            }
        }
    }

    // 피드백 애니메이션
    if (state.feedbackAnim) {
        const fb = state.feedbackAnim;
        fb.timer--;
        const alpha = clamp(fb.timer / 40, 0, 1);
        const yOff = (70 - fb.timer) * 0.7;
        ctx.globalAlpha = alpha;
        ctx.font = "24px system-ui";
        ctx.textAlign = "center";
        if (fb.type === "liked") {
            ctx.fillStyle = "#FF69B4"; ctx.fillText("♥", fb.x, fb.y - yOff);
            if (fb.delta) { ctx.font = "bold 14px system-ui"; ctx.fillText(`+${fb.delta}`, fb.x, fb.y - yOff + 20); }
        }
        else if (fb.type === "disliked") {
            ctx.fillStyle = "#FF4444"; ctx.fillText("💢", fb.x, fb.y - yOff);
            if (fb.delta) { ctx.font = "bold 14px system-ui"; ctx.fillText(`${fb.delta}`, fb.x, fb.y - yOff + 20); }
        }
        else if (fb.type === "neutral") {
            ctx.fillStyle = "#4FC3F7"; ctx.fillText("~", fb.x, fb.y - yOff);
            if (fb.delta) { ctx.font = "bold 14px system-ui"; ctx.fillText(`+${fb.delta}`, fb.x, fb.y - yOff + 20); }
        }
        else { ctx.fillStyle = "#aaa"; ctx.fillText("...", fb.x, fb.y - yOff); }
        ctx.globalAlpha = 1;
        if (fb.timer <= 0) state.feedbackAnim = null;
    }
}

/* ── HUD ── */
function drawHUD() {
    const isNight = state.timeOfDay === "night";
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    roundRect(0, 0, CW, 50, 0);
    ctx.fill();

    ctx.textBaseline = "middle";
    ctx.font = "bold 13px system-ui";
    ctx.textAlign = "left";
    ctx.fillStyle = isNight ? "#B0BEC5" : "#FFD54F";
    ctx.fillText(isNight ? "🌙 밤" : "☀️ 낮", 10, 14);

    // 낮밤 경과 바
    const dnElapsed = Date.now() - lastDayNightCheck;
    const dnRatio = clamp(dnElapsed / DAY_NIGHT_INTERVAL, 0, 1);
    const dnRemain = Math.max(0, Math.ceil((DAY_NIGHT_INTERVAL - dnElapsed) / 1000));
    const barX = 52, barW = 80, barH = 6, barYpos = 11;
    ctx.fillStyle = "#333"; roundRect(barX, barYpos, barW, barH, 3); ctx.fill();
    const dnColor = isNight ? "#5C6BC0" : "#FFA726";
    const nextIcon = isNight ? "☀️" : "🌙";
    ctx.fillStyle = dnColor; roundRect(barX, barYpos, barW * dnRatio, barH, 3); ctx.fill();
    ctx.fillStyle = "#aaa"; ctx.font = "9px system-ui";
    ctx.fillText(nextIcon, barX + barW + 5, 14);

    ctx.fillStyle = "#ddd"; ctx.font = "12px system-ui";

    // 전투 진행 표시
    ctx.fillStyle = "#aaa"; ctx.font = "11px system-ui"; ctx.textAlign = "left";
    const fighters = getFighterCount();
    const explorers = getExplorerCount();
    ctx.fillText(`⚔${fighters}  🏃${explorers}`, 10, 36);

    ctx.textAlign = "center";
    ctx.fillText(`${totalEevees()}마리`, CW / 2, 14);

    ctx.textAlign = "right";
    ctx.fillStyle = "#aaa";
    const dexTotal = base8Complete() ? EVOS.length : 8;
    ctx.fillText(`도감 ${state.collected.size}/${dexTotal}`, CW - 10, 14);

    // 탐색 출정 중 표시
    if (state.expeditions && state.expeditions.length > 0) {
        const now = Date.now();
        for (let i = 0; i < state.expeditions.length; i++) {
            const exp = state.expeditions[i];
            const loc = LOCATIONS.find(l => l.id === exp.locId);
            const elapsed = now - exp.startTime;
            const ratio = clamp(elapsed / exp.duration, 0, 1);
            const remaining = Math.max(0, Math.ceil((exp.duration - elapsed) / 1000));

            const ey = 56 + i * 28;
            ctx.fillStyle = "rgba(0,0,0,0.4)";
            roundRect(8, ey, CW - 16, 24, 5); ctx.fill();

            // 이브이 이름 + 장소
            ctx.textAlign = "left"; ctx.fillStyle = "#ccc"; ctx.font = "10px system-ui";
            ctx.fillText(`🏃 ${exp.eeveeName} → ${loc ? loc.name : "?"}`, 14, ey + 9);

            // 남은 시간
            ctx.textAlign = "right"; ctx.fillStyle = "#aaa"; ctx.font = "10px system-ui";
            ctx.fillText(`${remaining}초`, CW - 14, ey + 9);

            // 프로그레스 바
            ctx.fillStyle = "#333"; ctx.fillRect(14, ey + 17, CW - 28, 3);
            ctx.fillStyle = "#4CAF50"; ctx.fillRect(14, ey + 17, (CW - 28) * ratio, 3);
        }
    }
}

/* ── 하단 버튼 ── */
const BTN_Y = CH - 62;
const BTN_H = 42;
const BUTTONS = [
    { id:"explore", label:"탐색",  x:10,  w:85 },
    { id:"bag",     label:"가방",  x:103, w:85 },
    { id:"hint",    label:"힌트",  x:196, w:85 },
    { id:"dex",     label:"도감",  x:289, w:85 },
    { id:"rank",    label:"🏆랭킹", x:382, w:88 },
];

function drawFarmButtons() {
    // 버튼 배경
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(0, CH - 72, CW, 72);

    ctx.textBaseline = "middle";
    for (const btn of BUTTONS) {
        const disabled = (btn.id === "hint" && state.hintUsed);
        const hide = btn.id === "hint" && allComplete();
        if (hide) continue;

        const highlight = btn.id === "bag" && state.bagHighlight;
        if (highlight) {
            const glow = Math.sin(frame * 0.08) * 0.3 + 0.7;
            ctx.fillStyle = `rgba(255,215,0,${glow * 0.2})`;
            ctx.strokeStyle = `rgba(255,215,0,${glow})`; ctx.lineWidth = 2.5;
        } else {
            ctx.fillStyle = disabled ? "rgba(40,40,60,0.8)" : "rgba(50,50,90,0.9)";
            ctx.strokeStyle = disabled ? "#444" : "#7B73FF"; ctx.lineWidth = 1.5;
        }
        roundRect(btn.x, BTN_Y, btn.w, BTN_H, 8);
        ctx.fill(); ctx.stroke();

        ctx.fillStyle = disabled ? "#555" : highlight ? "#FFD54F" : "#fff";
        ctx.font = "bold 13px system-ui";
        ctx.textAlign = "center";
        ctx.fillText(btn.label, btn.x + btn.w / 2, BTN_Y + BTN_H / 2);
    }
}

/* ── 패널 (하단 슬라이드) ── */
const PANEL_H = { explore: 380, inventory: 420, dex: 420 };
function panelH() { return (state.panel && PANEL_H[state.panel]) || 420; }
function panelTopTarget() { return CH - panelH(); }

function drawPanelBg() {
    const py = lerp(CH, panelTopTarget(), state.panelSlide);
    ctx.fillStyle = "rgba(20,20,40,0.93)";
    roundRect(0, py, CW, panelH() + 20, 16);
    ctx.fill();
    ctx.strokeStyle = "#555";
    ctx.lineWidth = 1;
    roundRect(0, py, CW, panelH() + 20, 16);
    ctx.stroke();

    // 손잡이
    ctx.fillStyle = "#666";
    ctx.beginPath();
    ctx.roundRect(CW / 2 - 20, py + 8, 40, 4, 2);
    ctx.fill();

    // 닫기 안내
    ctx.fillStyle = "#555";
    ctx.font = "11px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    ctx.fillText("바깥 터치로 닫기", CW / 2, py + 16);

    return py + 30;
}

    snow:    { emoji:"❄️", color:"#90CAF9", bg:"rgba(144,202,249,0.15)" },
    temple:  { emoji:"⛩️", color:"#CE93D8", bg:"rgba(206,147,216,0.15)" },
    tower:   { emoji:"🏚️", color:"#78909C", bg:"rgba(120,144,156,0.15)" },
    den:     { emoji:"🕳️", color:"#E57373", bg:"rgba(229,115,115,0.15)" },
    ruins:   { emoji:"🏛️", color:"#7B73FF", bg:"rgba(123,115,255,0.15)" },
    valley:  { emoji:"🐉", color:"#4DB6AC", bg:"rgba(77,182,172,0.15)" },
    swamp:   { emoji:"🧪", color:"#9C27B0", bg:"rgba(156,39,176,0.15)" },
    nest:    { emoji:"🐛", color:"#8BC34A", bg:"rgba(139,195,74,0.15)" },
    cave:    { emoji:"⛏️", color:"#A1887F", bg:"rgba(161,136,127,0.15)" },
    sky:     { emoji:"🌤️", color:"#81D4FA", bg:"rgba(129,212,250,0.15)" },
};

function drawExplorePanel() {
    const startY = drawPanelBg();
    const py = startY;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";

    // 이브이 선택 단계 (그리드)
    if (state.expeditionSelect) {
        ctx.fillStyle = "#FFD54F"; ctx.font = "bold 16px system-ui";
        ctx.fillText(`${state.expeditionSelect.locName} 탐색`, CW / 2, py);
        ctx.fillStyle = "#aaa"; ctx.font = "12px system-ui";
        const coopMax = getCoopMax();
        const picked = state.expeditionPicked || [];
        ctx.fillText(`파견할 이브이 선택 (${picked.length}/${coopMax})`, CW / 2, py + 20);

        const allEe = [];
        if (state.currentEevee && !isOnExpedition("current")) allEe.push({ ref: "current", name: "이브이", img: "이브이.png", type: "무", act: state.currentEevee.activity || 0 });
        state.farm.forEach((e, i) => {
            if (isOnExpedition(i)) return;
            const evo = EVOS.find(ev => ev.id === e.evoId);
            if (evo) allEe.push({ ref: i, name: evo.name, img: evo.img, type: evo.type, act: e.activity || 0 });
        });

        const loc = LOCATIONS.find(l => l.id === state.expeditionSelect.locId);
        const GRID_COLS = 4;
        const CELL_W = 100, CELL_H = 80;
        const gridLeft = (CW - GRID_COLS * CELL_W) / 2;
        const gridTop = py + 38;
        const gridBot = CH - 55;
        const rows = Math.ceil(allEe.length / GRID_COLS);
        const totalGridH = rows * CELL_H;
        const maxScroll = Math.max(0, totalGridH - (gridBot - gridTop));
        state.eeSelectScroll = clamp(state.eeSelectScroll, 0, maxScroll);

        ctx.save();
        ctx.beginPath();
        ctx.rect(0, gridTop, CW, gridBot - gridTop);
        ctx.clip();
        for (let i = 0; i < allEe.length; i++) {
            const ee = allEe[i];
            const col = i % GRID_COLS, row = Math.floor(i / GRID_COLS);
            const cx = gridLeft + col * CELL_W + CELL_W / 2;
            const cy = gridTop + row * CELL_H + CELL_H / 2 - state.eeSelectScroll;
            if (cy + CELL_H / 2 < gridTop || cy - CELL_H / 2 > gridBot) continue;
            const typeMatch = loc && loc.attr === ee.type;
            // 셀 배경 (선택됨 강조)
            const isPicked = picked.includes(ee.ref);
            ctx.fillStyle = isPicked ? "rgba(255,215,0,0.3)" : typeMatch ? "rgba(46,125,50,0.25)" : "rgba(50,50,80,0.6)";
            ctx.strokeStyle = isPicked ? "#FFD54F" : typeMatch ? "#4CAF50" : "#444"; ctx.lineWidth = isPicked ? 2 : 1;
            roundRect(cx - CELL_W / 2 + 4, cy - CELL_H / 2 + 4, CELL_W - 8, CELL_H - 8, 8);
            ctx.fill(); ctx.stroke();
            // 스프라이트
            drawSprite(ee.img, cx, cy - 8, 1, 30);
            // 이름
            ctx.fillStyle = "#fff"; ctx.font = "bold 10px system-ui";
            ctx.textAlign = "center";
            ctx.fillText(ee.name, cx, cy + 24);
            // 활동성 바
            const actR = clamp(ee.act / ACTIVITY_BASE_MAX, 0, 1);
            const abx = cx - CELL_W / 2 + 10, aby = cy + 28, abw = CELL_W - 20, abh = 4;
            ctx.fillStyle = "#333"; roundRect(abx, aby, abw, abh, 2); ctx.fill();
            ctx.fillStyle = actR >= 1 ? "#4FC3F7" : actR >= 0.7 ? "#FF9800" : actR >= 0.3 ? "#FFB74D" : "#795548";
            roundRect(abx, aby, abw * actR, abh, 2); ctx.fill();
            // 타입 매치 표시
            if (typeMatch) {
                ctx.fillStyle = "#4CAF50"; ctx.font = "bold 8px system-ui";
                ctx.fillText("★보너스", cx, cy + 38);
            }
        }
        ctx.restore();

        // 스크롤 인디케이터
        if (maxScroll > 0) {
            const barH = Math.max(20, (gridBot - gridTop) * (gridBot - gridTop) / totalGridH);
            const barY = gridTop + (state.eeSelectScroll / maxScroll) * (gridBot - gridTop - barH);
            ctx.fillStyle = "rgba(255,255,255,0.15)";
            ctx.fillRect(CW - 6, barY, 3, barH);
        }

        // 출동 버튼 + 뒤로가기
        if (picked.length > 0) {
            ctx.fillStyle = "#3a7d44"; roundRect(CW / 2 - 80, CH - 50, 100, 30, 6); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = "bold 12px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(`출동! (${picked.length})`, CW / 2 - 30, CH - 35);
        }
        ctx.fillStyle = "#555"; roundRect(CW / 2 + 30, CH - 50, 60, 30, 6); ctx.fill();
        ctx.fillStyle = "#ccc"; ctx.font = "12px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("뒤로", CW / 2 + 60, CH - 35);

        // 탐색 능력 토스트
        if (state._expAbilityToast && state._expAbilityToast.timer > 0) {
            state._expAbilityToast.timer--;
            const t = state._expAbilityToast;
            ctx.globalAlpha = clamp(t.timer / 30, 0, 1);
            ctx.fillStyle = "rgba(76,175,80,0.9)";
            roundRect(CW / 2 - 130, py + 30, 260, 24, 6); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = "bold 11px system-ui";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(t.text, CW / 2, py + 42);
            ctx.globalAlpha = 1;
        }
        return;
    }

    // 장소 선택 단계
    ctx.fillStyle = "#FFD54F"; ctx.font = "bold 18px system-ui";
    ctx.fillText("탐색 출동", CW / 2, py);

    // 파견 상태
    ctx.fillStyle = "#aaa"; ctx.font = "12px system-ui";
    ctx.fillText(`파견 ${state.expeditions.length} / ${getExpSlots()}`, CW / 2, py + 20);

    // 통합 스크롤 영역 시작
    const scrollTop = py + 35;
    const scrollBot = CH - 10;

    // 컨텐츠 총 높이 계산
    const expH = state.expeditions.length > 0 ? state.expeditions.length * 32 + 8 : 0;
    const slotFullH = (state.expeditions.length >= getExpSlots()) ? 30 : 0;
    const locs = state.turnLocations || [];
    const LOC_CELL_H = 80;
    const locH = (state.expeditions.length < getExpSlots()) ? LOC_CELL_H + 10 : 0; // 4칸 1줄
    const totalContentH = expH + slotFullH + locH;
    const maxExpScroll = Math.max(0, totalContentH - (scrollBot - scrollTop));
    state.expScroll = clamp(state.expScroll, 0, maxExpScroll);

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, scrollTop, CW, scrollBot - scrollTop);
    ctx.clip();

    let curY = scrollTop - state.expScroll;

    // 진행 중인 파견 표시 (컴팩트)
    for (const exp of state.expeditions) {
        const loc = LOCATIONS.find(l => l.id === exp.locId);
        const elapsed = Date.now() - exp.startTime;
        const ratio = Math.min(elapsed / exp.duration, 1);
        const remaining = Math.max(0, Math.ceil((exp.duration - elapsed) / 1000));

        ctx.fillStyle = "rgba(50,80,50,0.4)"; roundRect(20, curY, CW - 40, 26, 5); ctx.fill();
        ctx.textAlign = "left"; ctx.fillStyle = "#4CAF50"; ctx.font = "10px system-ui";
        ctx.fillText(`🏃 ${exp.eeveeName} → ${loc ? loc.name : "?"}`, 30, curY + 10);
        // 진행 바
        ctx.fillStyle = "#333"; ctx.fillRect(30, curY + 19, CW - 70, 3);
        ctx.fillStyle = "#4CAF50"; ctx.fillRect(30, curY + 19, (CW - 70) * ratio, 3);
        ctx.textAlign = "right"; ctx.fillStyle = "#aaa"; ctx.font = "9px system-ui";
        ctx.fillText(`${remaining}초`, CW - 60, curY + 10);
        // 가속 버튼
        if (hasItem("가속장치") && remaining > 0) {
            ctx.fillStyle = "#FF9800"; roundRect(CW - 55, curY + 2, 28, 18, 4); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = "bold 8px system-ui"; ctx.textAlign = "center";
            ctx.fillText("⏩", CW - 41, curY + 11);
        }
        ctx.textAlign = "center";
        curY += 32;
    }
    if (state.expeditions.length > 0) curY += 8;

    // 슬롯 꽉 찼으면 안내
    if (state.expeditions.length >= getExpSlots()) {
        ctx.textAlign = "center"; ctx.fillStyle = "#FF5722"; ctx.font = "13px system-ui";
        ctx.fillText("파견 슬롯이 가득 찼습니다", CW / 2, curY + 12);
        curY += 30;
    }

    // 탐색지 목록 (4칸: 탐색지 3개 + 새로고침 1개)
    if (state.expeditions.length < getExpSlots()) {
        const GRID_COLS = 4, CELL_W = CW / GRID_COLS;
        const locStartY = curY + 5;
        // 탐색지 3개
        for (let i = 0; i < locs.length; i++) {
            const loc = locs[i];
            const style = LOC_STYLE[loc.id] || { emoji:"📍", color:"#888", bg:"rgba(80,80,80,0.15)" };
            const cx = CELL_W * i + CELL_W / 2;
            const cy = locStartY + LOC_CELL_H / 2;

            const R = 28;
            ctx.fillStyle = style.bg;
            ctx.beginPath(); ctx.arc(cx, cy - 8, R, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = style.color; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx, cy - 8, R, 0, Math.PI * 2); ctx.stroke();
            ctx.font = "20px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(style.emoji, cx, cy - 7);
            ctx.fillStyle = "#fff"; ctx.font = "bold 10px system-ui";
            ctx.fillText(loc.name, cx, cy + 26);
            ctx.fillStyle = style.color; ctx.font = "8px system-ui";
            const dispDur = Math.ceil((loc.dur || 30) * (1 + (state.monsterStage || 0) * 0.06));
            ctx.fillText(`${loc.attr}·${dispDur}초`, cx, cy + 37);
        }
        // 새로고침 버튼 (4번째 칸)
        const rcx = CELL_W * 3 + CELL_W / 2;
        const rcy = locStartY + LOC_CELL_H / 2;
        const refreshLeft = (state.exploreRefresh || 0);
        const canRefresh = refreshLeft > 0;
        ctx.fillStyle = canRefresh ? "rgba(100,100,200,0.2)" : "rgba(50,50,50,0.3)";
        ctx.beginPath(); ctx.arc(rcx, rcy - 8, 28, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = canRefresh ? "#7B73FF" : "#444"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(rcx, rcy - 8, 28, 0, Math.PI * 2); ctx.stroke();
        ctx.font = "20px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("🔄", rcx, rcy - 7);
        ctx.fillStyle = canRefresh ? "#fff" : "#666"; ctx.font = "bold 10px system-ui";
        ctx.fillText("새로고침", rcx, rcy + 26);
        ctx.fillStyle = canRefresh ? "#7B73FF" : "#555"; ctx.font = "9px system-ui";
        ctx.fillText(`${refreshLeft}/${getRefreshMax()}`, rcx, rcy + 37);
    }

    ctx.restore();

    // 스크롤 인디케이터
    if (maxExpScroll > 0) {
        const barH = Math.max(20, (scrollBot - scrollTop) * (scrollBot - scrollTop) / totalContentH);
        const barY = scrollTop + (state.expScroll / maxExpScroll) * (scrollBot - scrollTop - barH);
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        ctx.fillRect(CW - 6, barY, 3, barH);
    }
}

function getInventorySections() {
    const items = Object.entries(state.inventory);
    const fruits = items.filter(([n]) => FRUITS.includes(n));
    const others = items.filter(([n]) => !FRUITS.includes(n));
    return { fruits, others };
}

function drawInventoryPanel() {
    const startY = drawPanelBg();
    const py = startY;

    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#FFD54F"; ctx.font = "bold 18px system-ui";
    ctx.fillText("가방", CW / 2, py);

    const { fruits, others } = getInventorySections();
    const craftable = Object.keys(RECIPES).filter(r => hasItem(RECIPES[r].material, RECIPES[r].count));
    const ee = state.currentEevee;

    const listTop = py + 20;
    const listBot = CH - 10;
    const COL_W = (CW - 50) / 2;
    const ITEM_H = 42;
    const HEADER_H = 24;
    const craftH = craftable.length * 38;

    // 총 높이 계산 (제작 + 좌우 컬럼 중 긴 쪽)
    const leftH = HEADER_H + fruits.length * ITEM_H;
    const rightH = HEADER_H + others.length * ITEM_H;
    const columnsH = Math.max(leftH, rightH);
    const totalH = craftH + columnsH;
    const maxScroll = Math.max(0, totalH - (listBot - listTop));
    state.invScroll = clamp(state.invScroll, 0, maxScroll);

    ctx.save();
    ctx.beginPath(); ctx.rect(0, listTop, CW, listBot - listTop); ctx.clip();

    let y = listTop - state.invScroll;

    // 제작
    for (const name of craftable) {
        const bx = 20, bw = CW - 40, bh = 32;
        if (y + bh > listTop - 40 && y < listBot) {
            ctx.fillStyle = "rgba(62,39,35,0.9)"; ctx.strokeStyle = "#FF8F00"; ctx.lineWidth = 1;
            roundRect(bx, y, bw, bh, 6); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#FF8F00"; ctx.font = "bold 12px system-ui"; ctx.textAlign = "center";
            ctx.fillText(`🔨 ${itemEmoji(name)} ${name} 제작 (${itemEmoji(RECIPES[name].material)}x${RECIPES[name].count})`, CW / 2, y + 16);
        }
        y += 38;
    }

    if (fruits.length === 0 && others.length === 0) {
        ctx.fillStyle = "#666"; ctx.font = "13px system-ui"; ctx.textAlign = "center";
        ctx.fillText("아이템이 없습니다", CW / 2, y + 40);
    }

    const colStartY = y;
    const leftX = 15;
    const rightX = leftX + COL_W + 20;

    // 열매 헤더
    const totalFruitCount = fruits.reduce((s, [, c]) => s + c, 0);
    ctx.fillStyle = "#8BC34A"; ctx.font = "bold 13px system-ui"; ctx.textAlign = "left";
    ctx.fillText(`── 열매 (${totalFruitCount}) ──`, leftX + 10, colStartY + 12);

    // 아이템 헤더
    ctx.fillStyle = "#64B5F6"; ctx.font = "bold 13px system-ui"; ctx.textAlign = "left";
    ctx.fillText("── 아이템 ──", rightX + 10, colStartY + 12);

    // 열매 컬럼 (좌)
    for (let i = 0; i < fruits.length; i++) {
        const [name, count] = fruits[i];
        const bx = leftX, bw = COL_W, bh = 38;
        const by = colStartY + HEADER_H + i * ITEM_H;
        if (by + bh < listTop - 10) continue;
        if (by > listBot + 10) break;

        let borderColor = "#444";
        if (ee) {
            if (ee.knownLiked && name === ee.likedFruit) borderColor = "#4CAF50";
            else if (ee.knownDisliked && name === ee.dislikedFruit) borderColor = "#E53935";
        }

        ctx.fillStyle = "rgba(50,50,80,0.8)";
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = borderColor === "#444" ? 1 : 2.5;
        roundRect(bx, by, bw, bh, 5); ctx.fill(); ctx.stroke();

        ctx.textAlign = "left"; ctx.fillStyle = "#ddd"; ctx.font = "12px system-ui";
        ctx.fillText(`${itemEmoji(name)} ${name} x${count}`, bx + 6, by + 13);

        if (ee) {
            if (ee.knownLiked && name === ee.likedFruit) {
                ctx.fillStyle = "#4CAF50"; ctx.font = "bold 9px system-ui";
                ctx.fillText("♥좋아함", bx + 6, by + 28);
            } else if (ee.knownDisliked && name === ee.dislikedFruit) {
                ctx.fillStyle = "#E53935"; ctx.font = "bold 9px system-ui";
                ctx.fillText("💢싫어함", bx + 6, by + 28);
            }
        }

        // 버리기
        const dbx = bx + bw - 38, dbw = 34;
        ctx.fillStyle = "#555"; roundRect(dbx, by + 5, dbw, 26, 4); ctx.fill();
        ctx.fillStyle = "#ccc"; ctx.font = "bold 10px system-ui"; ctx.textAlign = "center";
        ctx.fillText("버리기", dbx + dbw / 2, by + 18);
    }

    // 아이템 컬럼 (우)
    for (let i = 0; i < others.length; i++) {
        const [name, count] = others[i];
        const bx = rightX, bw = COL_W, bh = 38;
        const by = colStartY + HEADER_H + i * ITEM_H;
        if (by + bh < listTop - 10) continue;
        if (by > listBot + 10) break;

        ctx.fillStyle = "rgba(50,50,80,0.8)";
        ctx.strokeStyle = "#555"; ctx.lineWidth = 1;
        roundRect(bx, by, bw, bh, 5); ctx.fill(); ctx.stroke();

        ctx.textAlign = "left"; ctx.fillStyle = "#ddd"; ctx.font = "12px system-ui";
        ctx.fillText(`${itemEmoji(name)} ${name} x${count}`, bx + 6, by + 13);

        // 버리기
        const dbx2 = bx + bw - 38, dbw2 = 34;
        ctx.fillStyle = "#555"; roundRect(dbx2, by + 5, dbw2, 26, 4); ctx.fill();
        ctx.fillStyle = "#ccc"; ctx.font = "bold 10px system-ui"; ctx.textAlign = "center";
        ctx.fillText("버리기", dbx2 + dbw2 / 2, by + 18);
    }

    ctx.restore();

    // 스크롤바
    if (maxScroll > 0) {
        const sbH = (listBot - listTop) * ((listBot - listTop) / totalH);
        const sbY = listTop + (state.invScroll / maxScroll) * ((listBot - listTop) - sbH);
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        roundRect(CW - 8, sbY, 4, sbH, 2); ctx.fill();
    }
}

function drawDexPanel() {
    const startY = drawPanelBg();
    const py = startY;

    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#FFD54F"; ctx.font = "bold 18px system-ui";
    ctx.fillText("진화 도감", CW / 2, py);

    const showPost = base8Complete();
    // 해금 순서대로 정렬
    const DEX_ORDER = ["vaporeon","jolteon","flareon","espeon","umbreon","leafeon","glaceon","sylveon",
        "gmax","mega","fighting","ghost","ground","rock","flying","poison","bug","dragon","steel"];
    const sorted = DEX_ORDER.map(id => EVOS.find(e => e.id === id)).filter(Boolean);
    const list = showPost ? sorted : sorted.slice(0, 8);
    const ITEM_H = 70;
    const listTop = py + 20;
    const listBot = CH - 25;
    const contentH = list.length * ITEM_H;
    const viewH = listBot - listTop;
    const maxScroll = Math.max(0, contentH - viewH);
    state.dexScroll = clamp(state.dexScroll, 0, maxScroll);

    ctx.save();
    ctx.beginPath(); ctx.rect(0, listTop, CW, viewH); ctx.clip();

    for (let i = 0; i < list.length; i++) {
        const evo = list[i];
        const by = listTop + i * ITEM_H - state.dexScroll;
        if (by + ITEM_H < listTop || by > listBot) continue;

        const collected = state.collected.has(evo.id);

        // 카드 배경
        ctx.fillStyle = collected ? "rgba(50,50,100,0.6)" : "rgba(30,30,50,0.5)";
        ctx.strokeStyle = collected ? "#6C63FF" : "#333"; ctx.lineWidth = 1;
        roundRect(10, by, CW - 20, ITEM_H - 4, 8); ctx.fill(); ctx.stroke();

        if (collected) {
            // 스프라이트
            drawSprite(evo.img, 40, by + 32, 1, 36);

            // 이름 + 타입
            ctx.textAlign = "left";
            ctx.fillStyle = "#fff"; ctx.font = "bold 13px system-ui";
            ctx.fillText(evo.name, 65, by + 14);
            ctx.fillStyle = "#aaa"; ctx.font = "10px system-ui";
            ctx.fillText(`${evo.type}타입`, 65, by + 28);

            // 고유 능력
            ctx.fillStyle = "#CE93D8"; ctx.font = "bold 9px system-ui";
            ctx.fillText(`⚡${evo.ability}`, 65, by + 42);

            // 팜 이브이 정보 찾기
            const farmEe = state.farm.find(e => e.evoId === evo.id);
            if (farmEe) {
                // 상태
                const onExp = isOnExpedition(state.farm.indexOf(farmEe));
                ctx.textAlign = "right";
                ctx.fillStyle = onExp ? "#FF9800" : "#4CAF50";
                ctx.font = "bold 9px system-ui";
                ctx.fillText(onExp ? "🏃탐색 중" : "⚔전투 중", CW - 20, by + 12);

                // 활동성 바
                const actR = clamp((farmEe.activity || 0) / getActivityMax(), 0, 1);
                const barX = CW - 120, barY = by + 22, barW = 95, barH = 6;
                ctx.fillStyle = "#333"; roundRect(barX, barY, barW, barH, 2); ctx.fill();
                ctx.fillStyle = actR >= 1 ? "#4FC3F7" : actR >= 0.7 ? "#FF9800" : actR >= 0.3 ? "#FFB74D" : "#795548";
                roundRect(barX, barY, barW * actR, barH, 2); ctx.fill();
                ctx.textAlign = "right"; ctx.fillStyle = "#aaa"; ctx.font = "8px system-ui";
                ctx.fillText(`활동성 ${Math.round(farmEe.activity || 0)}`, CW - 20, by + 38);

                // 좋아하는/싫어하는 열매
                ctx.textAlign = "left"; ctx.font = "9px system-ui";
                ctx.fillStyle = "#4CAF50";
                ctx.fillText(`♥${itemEmoji(farmEe.likedFruit)}`, 65, by + 56);
                ctx.fillStyle = "#E53935";
                ctx.fillText(`💢${itemEmoji(farmEe.dislikedFruit)}`, 95, by + 56);

                // DPS
                const dps = calcEeveeDPS(farmEe);
                ctx.textAlign = "right"; ctx.fillStyle = "#FF5722"; ctx.font = "bold 9px system-ui";
                ctx.fillText(`DPS ${dps.toFixed(1)}`, CW - 20, by + 56);
            }
            ctx.textAlign = "center";
        } else {
            // 미수집
            ctx.fillStyle = "#444"; ctx.font = "bold 28px system-ui"; ctx.textAlign = "center";
            ctx.fillText("?", CW / 2, by + 32);
        }
    }

    ctx.restore();

    // 하단 수집 현황
    ctx.fillStyle = "#888"; ctx.font = "12px system-ui"; ctx.textAlign = "center";
    const total = showPost ? EVOS.length : 8;
    ctx.fillText(`${state.collected.size} / ${total}`, CW / 2, CH - 10);
}
